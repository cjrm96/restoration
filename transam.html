<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1970 Ponteac Trans Am — Stage Viewer</title>
<style>
    body {
        background-color: #17120f;
        color: #efe2c6;
        font-family: Georgia, serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        margin: 0;
    }
    .car-section {
        margin-bottom: 60px;
        width: 100%;
        max-width: 1800px;
    }
    .section-title {
        border-bottom: 2px solid #4b4036;
        padding-bottom: 10px;
        margin-bottom: 20px;
        color: #d19a3f;
    }
    .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: flex-start;
    }
    .preview-card {
        background: #241d17;
        border: 1px solid #4b4036;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    .preview-card-title {
        margin-bottom: 12px;
        font-weight: bold;
        color: #a99b84;
        font-size: 14px;
        letter-spacing: 0.5px;
    }
    svg {
        width: 340px;
        height: 190px;
        background: linear-gradient(180deg, #6a6256 0%, #433c33 100%);
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
</style>
</head>
<body>

<h1>Car Guy Simulator — 1970 Ponteac Trans Am</h1>
<p style="margin-bottom: 40px; color: #a99b84;">Dev team: Copy the transamSprite function from the source of this file and place it next to f100Sprite.</p>

<div id="appRoot" style="width: 100%; max-width: 1800px;"></div>

<script>
// ---------------------------------------------------------
// HELPER: Wheel Renderer (Already in game)
// ---------------------------------------------------------
function pixelWheel(cx, cy, color, rim, spoke) {
    return `<rect x="${cx - 12}" y="${cy - 12}" width="24" height="24" fill="#111214"/><rect x="${cx - 10}" y="${cy - 10}" width="20" height="20" fill="${color}"/><rect x="${cx - 6}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx + 2}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx - 10}" y="${cy - 6}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 10}" y="${cy + 2}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 4}" y="${cy - 4}" width="8" height="8" fill="${rim}"/>`;
}

// ---------------------------------------------------------
// 1970 PONTEAC TRANS AM
// Silhouette signatures vs the Cameron: body-colored endura
// nose with no chrome bumper, black front air dam, shaker
// scoop poking through the hood, wraparound rear glass in a
// fastback sail panel, ducktail rear spoiler, blacked-out
// rocker instead of chrome, subtle fender-arch flares.
// ---------------------------------------------------------
function transamSprite(stageLevel, colors) {
    const { baseColor: body, roofColor: roof, windowColor: glass, trimColor: chrome, wheelColor: wheel, wheelSpoke: spoke, wheelHub: hub, wheelTire: tire, primerColor: primer, rustColor: rusty, shadowColor: dark } = colors;
    const yo = -stageLevel * 2;
    const gY = 124+yo, rkY = 116+yo, bT = 108+yo, hY = 102+yo, aP = 84+yo, rfY = 80+yo, wY = 128+yo;

    if (stageLevel <= 0) {
        return `<g shape-rendering="crispEdges">
            <rect x="130" y="${rfY+4}" width="56" height="6" fill="${primer}"/>
            <rect x="112" y="${aP+6}" width="26" height="14" fill="#2c3137"/>
            <rect x="140" y="${aP+6}" width="44" height="14" fill="#2c3137"/>
            <rect x="184" y="${aP+6}" width="34" height="14" fill="${rusty}"/>
            <rect x="44" y="${hY+4}" width="72" height="4" fill="${rusty}"/>
            <rect x="72" y="${hY}" width="18" height="4" fill="#16181c"/>
            <rect x="214" y="${hY+6}" width="42" height="4" fill="${primer}"/>
            <rect x="44" y="${bT}" width="234" height="10" fill="${rusty}"/>
            <rect x="274" y="${bT}" width="12" height="14" fill="${primer}"/>
            <rect x="34" y="${bT+2}" width="10" height="16" fill="${primer}"/>
            <rect x="44" y="${bT+10}" width="34" height="14" fill="${primer}"/>
            <rect x="106" y="${bT+10}" width="120" height="14" fill="${rusty}"/>
            <rect x="254" y="${bT+10}" width="24" height="14" fill="${primer}"/>
            <rect x="44" y="${rkY+16}" width="234" height="4" fill="${rusty}"/>
            <rect x="44" y="${gY+4}" width="240" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(92, wY+2, "#3a342f", "#2a241f", "#1c1815")}
            ${pixelWheel(240, wY+2, "#3a342f", "#2a241f", "#1c1815")}
        </g>`;
    }
    if (stageLevel === 1) {
        return `<g shape-rendering="crispEdges">
            <rect x="130" y="${rfY+2}" width="56" height="6" fill="${roof}"/>
            <rect x="112" y="${aP+4}" width="26" height="14" fill="${glass}"/>
            <rect x="140" y="${aP+4}" width="44" height="14" fill="${glass}"/>
            <rect x="184" y="${aP+4}" width="34" height="14" fill="${primer}"/>
            <rect x="186" y="${aP+6}" width="18" height="12" fill="${glass}"/>
            <rect x="44" y="${hY+2}" width="72" height="4" fill="${primer}"/>
            <rect x="72" y="${hY-2}" width="18" height="4" fill="#16181c"/>
            <rect x="214" y="${hY+4}" width="42" height="4" fill="${body}"/>
            <rect x="44" y="${bT}" width="130" height="10" fill="${body}"/>
            <rect x="174" y="${bT}" width="104" height="10" fill="${primer}"/>
            <rect x="274" y="${bT}" width="12" height="14" fill="${body}"/>
            <rect x="34" y="${bT+2}" width="10" height="16" fill="${primer}"/>
            <rect x="44" y="${bT+10}" width="34" height="14" fill="${primer}"/>
            <rect x="106" y="${bT+10}" width="120" height="14" fill="${body}"/>
            <rect x="254" y="${bT+10}" width="24" height="14" fill="${body}"/>
            <rect x="44" y="${rkY+16}" width="234" height="4" fill="#1c1f24" opacity="0.5"/>
            <rect x="44" y="${gY+4}" width="240" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(92, wY+2, tire, "#565d63", "#34383d")}
            ${pixelWheel(240, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 2) {
        return `<g shape-rendering="crispEdges">
            <rect x="130" y="${rfY}" width="56" height="6" fill="${roof}"/>
            <rect x="112" y="${aP+2}" width="26" height="14" fill="${glass}"/>
            <rect x="140" y="${aP+2}" width="44" height="14" fill="${glass}"/>
            <rect x="184" y="${aP+2}" width="34" height="14" fill="${body}"/>
            <rect x="186" y="${aP+4}" width="18" height="12" fill="${glass}"/>
            <rect x="44" y="${hY}" width="72" height="4" fill="${body}"/>
            <rect x="70" y="${hY-5}" width="22" height="5" fill="${primer}"/>
            <rect x="214" y="${hY+2}" width="42" height="4" fill="${body}"/>
            <rect x="250" y="${hY-2}" width="36" height="4" fill="${body}"/>
            <rect x="44" y="${bT}" width="234" height="10" fill="${body}"/>
            <rect x="274" y="${bT}" width="12" height="14" fill="${body}"/>
            <rect x="34" y="${bT+2}" width="10" height="16" fill="${body}"/>
            <rect x="36" y="${bT+3}" width="6" height="5" fill="#111827"/>
            <rect x="44" y="${bT+10}" width="34" height="14" fill="${body}"/>
            <rect x="106" y="${bT+10}" width="120" height="14" fill="${body}"/>
            <rect x="254" y="${bT+10}" width="24" height="14" fill="${body}"/>
            <rect x="281" y="${bT+4}" width="4" height="5" fill="#f25c54"/>
            <rect x="44" y="${rkY+16}" width="234" height="4" fill="#1c1f24"/>
            <rect x="44" y="${gY+4}" width="240" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(92, wY+2, wheel, hub, spoke)}
            ${pixelWheel(240, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 3) {
        return `<g shape-rendering="crispEdges">
            <rect x="130" y="${rfY}" width="56" height="6" fill="${roof}"/>
            <rect x="112" y="${aP+2}" width="26" height="14" fill="${glass}"/>
            <rect x="140" y="${aP+2}" width="44" height="14" fill="${glass}"/>
            <rect x="184" y="${aP+2}" width="34" height="14" fill="${body}"/>
            <rect x="186" y="${aP+4}" width="18" height="12" fill="${glass}"/>
            <rect x="44" y="${hY}" width="72" height="4" fill="${body}"/>
            <rect x="70" y="${hY-5}" width="22" height="5" fill="#20242a"/>
            <rect x="74" y="${hY-7}" width="14" height="2" fill="#20242a"/>
            <rect x="214" y="${hY+2}" width="42" height="4" fill="${body}"/>
            <rect x="250" y="${hY-2}" width="36" height="4" fill="${body}"/>
            <rect x="282" y="${hY+2}" width="4" height="6" fill="${body}"/>
            <rect x="44" y="${bT}" width="234" height="10" fill="${body}"/>
            <rect x="274" y="${bT}" width="12" height="14" fill="${body}"/>
            <rect x="34" y="${bT+2}" width="10" height="16" fill="${body}"/>
            <rect x="36" y="${bT+3}" width="6" height="5" fill="#111827"/>
            <rect x="37" y="${bT+9}" width="4" height="4" fill="#fff8e7"/>
            <rect x="34" y="${bT+16}" width="12" height="5" fill="#16181c"/>
            <rect x="44" y="${bT+10}" width="34" height="14" fill="${body}"/>
            <rect x="106" y="${bT+10}" width="120" height="14" fill="${body}"/>
            <rect x="254" y="${bT+10}" width="24" height="14" fill="${body}"/>
            <rect x="76" y="${bT+7}" width="32" height="3" fill="${body}"/>
            <rect x="224" y="${bT+7}" width="32" height="3" fill="${body}"/>
            <rect x="280" y="${bT+2}" width="6" height="10" fill="#16181c"/>
            <rect x="281" y="${bT+4}" width="4" height="5" fill="#f25c54"/>
            <rect x="44" y="${rkY+16}" width="234" height="4" fill="#1c1f24"/>
            <rect x="44" y="${gY+4}" width="240" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(92, wY+2, wheel, hub, spoke)}
            ${pixelWheel(240, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    return `<g shape-rendering="crispEdges">
        <rect x="130" y="${rfY}" width="56" height="6" fill="${roof}"/>
        <rect x="112" y="${aP+2}" width="26" height="14" fill="${glass}"/>
        <rect x="140" y="${aP+2}" width="44" height="14" fill="${glass}"/>
        <rect x="184" y="${aP+2}" width="34" height="14" fill="${body}"/>
        <rect x="186" y="${aP+4}" width="18" height="12" fill="${glass}"/>
        <rect x="44" y="${hY}" width="72" height="4" fill="${body}"/>
        <rect x="70" y="${hY-5}" width="22" height="5" fill="#20242a"/>
        <rect x="74" y="${hY-7}" width="14" height="2" fill="#20242a"/>
        <rect x="50" y="${hY+1}" width="12" height="2" fill="${roof}"/>
        <rect x="214" y="${hY+2}" width="42" height="4" fill="${body}"/>
        <rect x="250" y="${hY-2}" width="36" height="4" fill="${body}"/>
        <rect x="282" y="${hY+2}" width="4" height="6" fill="${body}"/>
        <rect x="44" y="${bT}" width="234" height="10" fill="${body}"/>
        <rect x="274" y="${bT}" width="12" height="14" fill="${body}"/>
        <rect x="34" y="${bT+2}" width="10" height="16" fill="${body}"/>
        <rect x="36" y="${bT+3}" width="6" height="5" fill="#111827"/>
        <rect x="37" y="${bT+9}" width="4" height="4" fill="#fff8e7"/>
        <rect x="34" y="${bT+16}" width="12" height="5" fill="#16181c"/>
        <rect x="44" y="${bT+10}" width="34" height="14" fill="${body}"/>
        <rect x="106" y="${bT+10}" width="120" height="14" fill="${body}"/>
        <rect x="254" y="${bT+10}" width="24" height="14" fill="${body}"/>
        <rect x="76" y="${bT+7}" width="32" height="3" fill="${body}"/>
        <rect x="224" y="${bT+7}" width="32" height="3" fill="${body}"/>
        <rect x="280" y="${bT+2}" width="6" height="10" fill="#16181c"/>
        <rect x="281" y="${bT+4}" width="4" height="5" fill="#f25c54"/>
        <rect x="44" y="${rkY+16}" width="234" height="4" fill="#1c1f24"/>
        <rect x="48" y="${hY-1}" width="60" height="1" fill="#ffffff" opacity="0.45"/>
        <rect x="134" y="${rfY+1}" width="44" height="1" fill="#ffffff" opacity="0.45"/>
        <rect x="44" y="${gY+4}" width="240" height="4" fill="${dark}" opacity="0.8"/>
        ${pixelWheel(92, wY+2, wheel, hub, spoke)}
        ${pixelWheel(240, wY+2, wheel, hub, spoke)}
    </g>`;
}

// ---------------------------------------------------------
// RUNTIME RENDER LOGIC
// ---------------------------------------------------------
const car = {
    id: "transam",
    name: "1970 Ponteac Trans Am",
    func: transamSprite,
    colors: { baseColor: "#d8a528", roofColor: "#3b2818", trimColor: "#f5e0a4", wheelColor: "#3b2818", shadowColor: "#231405" }
};

const commonColors = {
    wheelSpoke: "#cf6f00", wheelHub: "#ffd7a6", wheelTire: "#1A1A1A",
    primerColor: "#7f848b", rustColor: "#8a4517", shadowColor: "#2e3d4d", windowColor: "#4b5967"
};

const labels = ["Stage 0: Barn Find", "Stage 1: Project", "Stage 2: Driver", "Stage 3: Restored", "Stage 4: Show Car"];
const root = document.getElementById("appRoot");

const section = document.createElement('div');
section.className = 'car-section';
section.innerHTML = `<h2 class="section-title">${car.name}</h2><div class="grid"></div>`;
const grid = section.querySelector('.grid');

for (let stage = 0; stage <= 4; stage++) {
    let sc = { ...commonColors, ...car.colors };
    if (stage < 2) sc.wheelTire = "#23262b";
    if (stage === 0) sc.windowColor = "#2c3137";

    const svg = `<svg viewBox="0 0 340 190"><g transform="translate(0, 10)">${car.func(stage, sc)}</g></svg>`;
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `<div class="preview-card-title">${labels[stage]}</div>${svg}`;
    grid.appendChild(card);
}
root.appendChild(section);
</script>
</body>
</html>
