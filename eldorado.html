<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1959 Caddilack Eldorando — Stage Viewer</title>
<style>
    body {
        background-color: #17120f;
        color: #efe2c6;
        font-family: Georgia, serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        margin: 0;
    }
    .car-section {
        margin-bottom: 60px;
        width: 100%;
        max-width: 1800px;
    }
    .section-title {
        border-bottom: 2px solid #4b4036;
        padding-bottom: 10px;
        margin-bottom: 20px;
        color: #d19a3f;
    }
    .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: flex-start;
    }
    .preview-card {
        background: #241d17;
        border: 1px solid #4b4036;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    .preview-card-title {
        margin-bottom: 12px;
        font-weight: bold;
        color: #a99b84;
        font-size: 14px;
        letter-spacing: 0.5px;
    }
    svg {
        width: 340px;
        height: 190px;
        background: linear-gradient(180deg, #6a6256 0%, #433c33 100%);
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
</style>
</head>
<body>

<h1>Car Guy Simulator — 1959 Caddilack Eldorando</h1>
<p style="margin-bottom: 40px; color: #a99b84;">Dev team: Copy the eldoradoSprite function from the source of this file and place it next to f100Sprite.</p>

<div id="appRoot" style="width: 100%; max-width: 1800px;"></div>

<script>
// ---------------------------------------------------------
// HELPER: Wheel Renderer (Already in game)
// ---------------------------------------------------------
function pixelWheel(cx, cy, color, rim, spoke) {
    return `<rect x="${cx - 12}" y="${cy - 12}" width="24" height="24" fill="#111214"/><rect x="${cx - 10}" y="${cy - 10}" width="20" height="20" fill="${color}"/><rect x="${cx - 6}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx + 2}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx - 10}" y="${cy - 6}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 10}" y="${cy + 2}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 4}" y="${cy - 4}" width="8" height="8" fill="${rim}"/>`;
}

// ---------------------------------------------------------
// 1959 CADDILACK ELDORANDO
// Silhouette signatures: longest body in the game (bumper to
// bumper past both edges of the belair footprint), low thin
// flat-top roof with wraparound glass, long flat hood AND long
// rear deck, rear fins that climb in three steps to twin bullet
// taillights, dual stacked headlights, and a wide chrome panel
// on the lower rear quarter.
// ---------------------------------------------------------
function eldoradoSprite(stageLevel, colors) {
    const { baseColor: body, roofColor: roof, windowColor: glass, trimColor: chrome, wheelColor: wheel, wheelSpoke: spoke, wheelHub: hub, wheelTire: tire, primerColor: primer, rustColor: rusty, shadowColor: dark } = colors;
    const yo = -stageLevel * 2;
    const gY = 124+yo, rkY = 116+yo, bY = 106+yo, rfY = 80+yo, aP = 86+yo, wY = 128+yo;

    if (stageLevel <= 0) {
        return `<g shape-rendering="crispEdges">
            <rect x="118" y="${rfY+4}" width="74" height="5" fill="${primer}"/>
            <rect x="108" y="${aP+4}" width="14" height="20" fill="#2c3137"/>
            <rect x="126" y="${aP+4}" width="52" height="20" fill="#2c3137"/>
            <rect x="182" y="${aP+4}" width="16" height="20" fill="${rusty}"/>
            <rect x="34" y="${bY}" width="74" height="4" fill="${primer}"/>
            <rect x="198" y="${bY}" width="48" height="4" fill="${rusty}"/>
            <rect x="240" y="${bY-4}" width="58" height="4" fill="${rusty}"/>
            <rect x="258" y="${bY-8}" width="40" height="4" fill="${primer}"/>
            <rect x="274" y="${bY-12}" width="12" height="4" fill="${rusty}"/>
            <rect x="28" y="${bY+4}" width="270" height="10" fill="${rusty}"/>
            <rect x="28" y="${bY+14}" width="60" height="12" fill="${primer}"/>
            <rect x="116" y="${bY+14}" width="114" height="12" fill="${rusty}"/>
            <rect x="260" y="${bY+14}" width="38" height="12" fill="${primer}"/>
            <rect x="28" y="${rkY+14}" width="270" height="4" fill="${rusty}"/>
            <rect x="16" y="${bY+8}" width="14" height="12" fill="${primer}"/>
            <rect x="296" y="${bY+8}" width="14" height="12" fill="${rusty}"/>
            <rect x="24" y="${gY+4}" width="284" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(100, wY+2, "#3a342f", "#2a241f", "#1c1815")}
            ${pixelWheel(244, wY+2, "#3a342f", "#2a241f", "#1c1815")}
        </g>`;
    }
    if (stageLevel === 1) {
        return `<g shape-rendering="crispEdges">
            <rect x="118" y="${rfY+2}" width="74" height="5" fill="${roof}"/>
            <rect x="108" y="${aP+2}" width="14" height="20" fill="${glass}"/>
            <rect x="126" y="${aP+2}" width="52" height="20" fill="${glass}"/>
            <rect x="182" y="${aP+2}" width="16" height="20" fill="${primer}"/>
            <rect x="34" y="${bY-2}" width="74" height="4" fill="${primer}"/>
            <rect x="198" y="${bY-2}" width="48" height="4" fill="${body}"/>
            <rect x="240" y="${bY-6}" width="58" height="4" fill="${body}"/>
            <rect x="258" y="${bY-10}" width="40" height="4" fill="${primer}"/>
            <rect x="274" y="${bY-14}" width="24" height="4" fill="${primer}"/>
            <rect x="28" y="${bY+2}" width="130" height="10" fill="${body}"/>
            <rect x="158" y="${bY+2}" width="140" height="10" fill="${primer}"/>
            <rect x="28" y="${bY+12}" width="60" height="12" fill="${primer}"/>
            <rect x="116" y="${bY+12}" width="114" height="12" fill="${body}"/>
            <rect x="260" y="${bY+12}" width="38" height="12" fill="${body}"/>
            <rect x="28" y="${rkY+14}" width="270" height="4" fill="${chrome}" opacity="0.5"/>
            <rect x="16" y="${bY+6}" width="14" height="12" fill="${chrome}" opacity="0.5"/>
            <rect x="296" y="${bY+6}" width="14" height="12" fill="${chrome}" opacity="0.5"/>
            <rect x="24" y="${gY+4}" width="284" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(100, wY+2, tire, "#565d63", "#34383d")}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 2) {
        return `<g shape-rendering="crispEdges">
            <rect x="118" y="${rfY}" width="74" height="5" fill="${roof}"/>
            <rect x="108" y="${aP}" width="14" height="20" fill="${glass}"/>
            <rect x="126" y="${aP}" width="52" height="20" fill="${glass}"/>
            <rect x="182" y="${aP}" width="16" height="20" fill="${glass}"/>
            <rect x="34" y="${bY-4}" width="74" height="4" fill="${body}"/>
            <rect x="198" y="${bY-4}" width="48" height="4" fill="${body}"/>
            <rect x="240" y="${bY-8}" width="58" height="4" fill="${body}"/>
            <rect x="258" y="${bY-12}" width="40" height="4" fill="${body}"/>
            <rect x="274" y="${bY-16}" width="24" height="4" fill="${body}"/>
            <rect x="28" y="${bY}" width="270" height="10" fill="${body}"/>
            <rect x="28" y="${bY+10}" width="60" height="14" fill="${body}"/>
            <rect x="116" y="${bY+10}" width="114" height="14" fill="${body}"/>
            <rect x="260" y="${bY+10}" width="38" height="14" fill="${body}"/>
            <rect x="28" y="${rkY+14}" width="270" height="4" fill="${chrome}"/>
            <rect x="16" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
            <rect x="296" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
            <rect x="24" y="${gY+4}" width="284" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(100, wY+2, wheel, hub, spoke)}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 3) {
        return `<g shape-rendering="crispEdges">
            <rect x="118" y="${rfY}" width="74" height="5" fill="${roof}"/>
            <rect x="108" y="${aP-1}" width="90" height="1" fill="${chrome}"/>
            <rect x="108" y="${aP}" width="14" height="20" fill="${glass}"/>
            <rect x="126" y="${aP}" width="52" height="20" fill="${glass}"/>
            <rect x="182" y="${aP}" width="16" height="20" fill="${glass}"/>
            <rect x="34" y="${bY-4}" width="74" height="4" fill="${body}"/>
            <rect x="198" y="${bY-4}" width="48" height="4" fill="${body}"/>
            <rect x="240" y="${bY-8}" width="58" height="4" fill="${body}"/>
            <rect x="258" y="${bY-12}" width="40" height="4" fill="${body}"/>
            <rect x="274" y="${bY-16}" width="24" height="4" fill="${body}"/>
            <rect x="274" y="${bY-17}" width="24" height="1" fill="${chrome}"/>
            <rect x="291" y="${bY-12}" width="7" height="5" fill="${chrome}"/>
            <rect x="292" y="${bY-11}" width="5" height="3" fill="#f2413a"/>
            <rect x="291" y="${bY-6}" width="7" height="5" fill="${chrome}"/>
            <rect x="292" y="${bY-5}" width="5" height="3" fill="#f2413a"/>
            <rect x="28" y="${bY}" width="270" height="10" fill="${body}"/>
            <rect x="28" y="${bY+10}" width="60" height="14" fill="${body}"/>
            <rect x="116" y="${bY+10}" width="114" height="14" fill="${body}"/>
            <rect x="260" y="${bY+10}" width="38" height="14" fill="${body}"/>
            <rect x="28" y="${bY+4}" width="270" height="2" fill="${chrome}"/>
            <rect x="260" y="${bY+14}" width="38" height="8" fill="${chrome}"/>
            <rect x="28" y="${rkY+14}" width="270" height="4" fill="${chrome}"/>
            <rect x="16" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
            <rect x="296" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
            <rect x="30" y="${bY+1}" width="4" height="4" fill="#fff8e7"/>
            <rect x="36" y="${bY+1}" width="4" height="4" fill="#fff8e7"/>
            <rect x="24" y="${gY+4}" width="284" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(100, wY+2, wheel, hub, spoke)}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    return `<g shape-rendering="crispEdges">
        <rect x="118" y="${rfY}" width="74" height="5" fill="${roof}"/>
        <rect x="108" y="${aP-1}" width="90" height="1" fill="${chrome}"/>
        <rect x="108" y="${aP}" width="14" height="20" fill="${glass}"/>
        <rect x="126" y="${aP}" width="52" height="20" fill="${glass}"/>
        <rect x="182" y="${aP}" width="16" height="20" fill="${glass}"/>
        <rect x="34" y="${bY-4}" width="74" height="4" fill="${body}"/>
        <rect x="198" y="${bY-4}" width="48" height="4" fill="${body}"/>
        <rect x="240" y="${bY-8}" width="58" height="4" fill="${body}"/>
        <rect x="258" y="${bY-12}" width="40" height="4" fill="${body}"/>
        <rect x="274" y="${bY-16}" width="24" height="4" fill="${body}"/>
        <rect x="274" y="${bY-17}" width="24" height="1" fill="${chrome}"/>
        <rect x="291" y="${bY-12}" width="7" height="5" fill="${chrome}"/>
        <rect x="292" y="${bY-11}" width="5" height="3" fill="#f2413a"/>
        <rect x="291" y="${bY-6}" width="7" height="5" fill="${chrome}"/>
        <rect x="292" y="${bY-5}" width="5" height="3" fill="#f2413a"/>
        <rect x="28" y="${bY}" width="270" height="10" fill="${body}"/>
        <rect x="28" y="${bY+10}" width="60" height="14" fill="${body}"/>
        <rect x="116" y="${bY+10}" width="114" height="14" fill="${body}"/>
        <rect x="260" y="${bY+10}" width="38" height="14" fill="${body}"/>
        <rect x="28" y="${bY+4}" width="270" height="2" fill="${chrome}"/>
        <rect x="260" y="${bY+14}" width="38" height="8" fill="${chrome}"/>
        <rect x="266" y="${bY+17}" width="26" height="2" fill="#fff8e7"/>
        <rect x="28" y="${rkY+14}" width="270" height="4" fill="${chrome}"/>
        <rect x="16" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
        <rect x="296" y="${bY+6}" width="14" height="12" fill="${chrome}"/>
        <rect x="30" y="${bY+1}" width="4" height="4" fill="#fff8e7"/>
        <rect x="36" y="${bY+1}" width="4" height="4" fill="#fff8e7"/>
        <rect x="40" y="${bY-3}" width="64" height="1" fill="#ffffff" opacity="0.5"/>
        <rect x="122" y="${rfY+1}" width="66" height="1" fill="#ffffff" opacity="0.5"/>
        <rect x="242" y="${bY-7}" width="50" height="1" fill="#ffffff" opacity="0.4"/>
        <rect x="24" y="${gY+4}" width="284" height="4" fill="${dark}" opacity="0.8"/>
        <circle cx="100" cy="${wY+2}" r="11" fill="#F5F5F5"/>
        <circle cx="244" cy="${wY+2}" r="11" fill="#F5F5F5"/>
        ${pixelWheel(100, wY+2, wheel, hub, spoke)}
        ${pixelWheel(244, wY+2, wheel, hub, spoke)}
    </g>`;
}

// ---------------------------------------------------------
// RUNTIME RENDER LOGIC
// ---------------------------------------------------------
const car = {
    id: "eldorado",
    name: "1959 Caddilack Eldorando",
    func: eldoradoSprite,
    colors: { baseColor: "#e09cc4", roofColor: "#dde6f5", trimColor: "#fceaf2", wheelColor: "#a0d5e8", shadowColor: "#3a1d2c" }
};

const commonColors = {
    wheelSpoke: "#cf6f00", wheelHub: "#ffd7a6", wheelTire: "#1A1A1A",
    primerColor: "#7f848b", rustColor: "#8a4517", shadowColor: "#2e3d4d", windowColor: "#4b5967"
};

const labels = ["Stage 0: Barn Find", "Stage 1: Project", "Stage 2: Driver", "Stage 3: Restored", "Stage 4: Show Car"];
const root = document.getElementById("appRoot");

const section = document.createElement('div');
section.className = 'car-section';
section.innerHTML = `<h2 class="section-title">${car.name}</h2><div class="grid"></div>`;
const grid = section.querySelector('.grid');

for (let stage = 0; stage <= 4; stage++) {
    let sc = { ...commonColors, ...car.colors };
    if (stage < 2) sc.wheelTire = "#23262b";
    if (stage === 0) sc.windowColor = "#2c3137";

    const svg = `<svg viewBox="0 0 340 190"><g transform="translate(0, 10)">${car.func(stage, sc)}</g></svg>`;
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `<div class="preview-card-title">${labels[stage]}</div>${svg}`;
    grid.appendChild(card);
}
root.appendChild(section);
</script>
</body>
</html>
