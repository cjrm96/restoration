      function maybeRollEvent() {
        if (state.pendingScene || state.pendingEvent) return;
        if (Math.random() < 0.22) {
          const ev =
            CAR_CULTURE_EVENTS[
              Math.floor(Math.random() * CAR_CULTURE_EVENTS.length)
            ];
          queueScene({
            title: ev.title,
            emoji: ev.emoji,
            text: ev.text,
            choices: ev.choices,
          });
          return;
        }
        if (Math.random() > 0.32) return;
        const ev =
          WEEKLY_EVENTS[Math.floor(Math.random() * WEEKLY_EVENTS.length)];
        queueWeeklyEvent(ev);
      }

      function resolveEvent(payForFix) {
        const ev = state.pendingEvent;
        if (!ev) return;
        const car = currentCar();

        if (ev.type === "good") {
          if (ev.cashGain) {
            state.money += ev.cashGain;
          }
          if (ev.followersGain) {
            state.followers += ev.followersGain;
            clampFollowers();
          }
          if (ev.statBoost) {
            car[ev.statBoost.cat] = clamp(
              car[ev.statBoost.cat] + ev.statBoost.amt,
            );
          }
        } else {
          if (ev.choice) {
            if (payForFix) {
              if (state.money >= ev.cost) state.money -= ev.cost;
              else applyEventPenalty(ev, car); // can't afford the fix, so take the hit
            } else {
              applyEventPenalty(ev, car);
            }
          } else {
            applyEventPenalty(ev, car);
          }
        }

        state.pendingEvent = null;
        processEventQueue();
        drainWeekAdvanceQueue("queued");
        checkMilestones();
        checkGameOver();
        saveGame();
        requestRender("full");
      }

      function applyEventPenalty(ev, car) {
        if (ev.penalty) {
          car[ev.penalty.cat] = clamp(car[ev.penalty.cat] - ev.penalty.amt);
        }
        if (ev.also) {
          car[ev.also.cat] = clamp(car[ev.also.cat] - ev.also.amt);
        }
        if (ev.fuelLoss) {
          state.fuel = Math.max(0, state.fuel - ev.fuelLoss);
        }
        if (ev.paycheckSlip) {
          state.paycheckProgress = Math.max(
            0,
            state.paycheckProgress - ev.paycheckSlip,
          );
        }
      }

      /* ═══════════════════════════════════════════
     MILESTONES
  ═══════════════════════════════════════════ */
      function checkMilestones() {
        const m = state.milestones;
        const car = currentCar();
        const overall = car ? getOverall(car) : 0;
        const unlocked = [];

        if (!m.firstShow && state.history.length >= 1) {
          m.firstShow = true;
          unlocked.push("🏁 First Show entered!");
        }
        if (!m.hit50 && overall >= 50) {
          m.hit50 = true;
          unlocked.push("⭐ Reached 50 overall!");
          maybeAddBuckReaction("hit50");
        }
        if (
          !m.wonRegional &&
          state.history.some((h) => h.place === 1 && h.tier === "Regional")
        ) {
          m.wonRegional = true;
          unlocked.push("🥇 Won a Regional!");
        }
        if (!m.threeSponsors && activeSponsors().length >= 3) {
          m.threeSponsors = true;
          unlocked.push("🤝 Three sponsors active!");
          maybeAddBuckReaction("firstSponsor");
        }
        if (
          !m.homeGarage &&
          workshopIdx() >= WORKSPACE_LEVELS.findIndex((w) => w.id === "garage")
        ) {
          m.homeGarage = true;
          unlocked.push("🏠 Home Garage unlocked!");
          maybeAddBuckReaction("homeGarage");
        }
        if (
          !m.wonNational &&
          (state.won ||
            state.history.some(
              (h) => h.tier === "National" && h.place === 1,
            ))
        ) {
          m.wonNational = true;
          unlocked.push("🏆 Won the National Show!");
        }

        unlocked.forEach((msg) => toast(`Milestone: ${msg}`, "ok"));
      }

      /* ═══════════════════════════════════════════
     GAME OVER / BROKE CHECK
  ═══════════════════════════════════════════ */
      function checkGameOver() {
        if (state.gameOver) return;
        const weeksUntilPay = PAYCHECK_CYCLE - state.paycheckProgress;
        const cantAffordAnything = state.money < 40; // cheapest part
        const payTooFarOut = weeksUntilPay > 2;
        const noFuel = state.fuel < 4;
        if (cantAffordAnything && payTooFarOut && noFuel && state.week > 4) {
          state.gameOver = true;
        }
      }

      function restartGame() {
        Object.assign(state, makeDefaultState());
        localStorage.removeItem(SAVE_KEY);
        requestRender("full");
      }

      function continueSeason() {
        const car = currentCar();
        // Surface the winter storage damage as a click-through notice
        // before clearing it — the recap screen no longer shows it inline.
        if (
          Array.isArray(state.winterStorageReport) &&
          state.winterStorageReport.length
        ) {
          pushNotice(
            `Pulled the cover off after the off-season. ${state.winterStorageReport.join(" · ")}.`,
            "bad",
          );
        }
        state.seasonWrap = false;
        state.week = 1;
        state.view = "workshop";
        state.result = null;
        state.pendingAdvanceReason = null;
        state.postShowWeekLocked = false;
        state.enteredShowsThisWeek = [];
        state.winterStorageReport = [];
        state.seasonStats = {
          moneyStart: state.money,
          moneyEarned: 0,
          showsEntered: 0,
          bestPlace: null,
          bestTier: null,
          startOverall: car ? getOverall(car) : 0,
        };
        saveGame();
        requestRender("full");
      }

      /* ═══════════════════════════════════════════
     WEEK ADVANCE
  ═══════════════════════════════════════════ */
      function performWeekAdvance(reason = "time") {
        resolveCompletedRestorations(false);
        state.pendingAdvanceReason = null;
        const previousWeek = state.week;
        const missedSocialPost = state.creatorPostedWeek !== previousWeek;
        state.week += 1;
        state.weekStartMoney = state.money;
        state.enteredShowsThisWeek = [];
        state.polishesThisWeek = 0;
        state.rival.score = getRivalBaseScore();
        state.postShowWeekLocked = false;

        if (state.week > state.seasonLength) {
          applyWinterStorageDamage();
          state.seasonWrap = true;
          return;
        }

        // Tool truck tab — charged weekly, not per paycheck (snap-it truck shows up
        // every week regardless).
        if (state.toolTruckBalance > 0) {
          const truckPay = Math.min(
            state.toolTruckPayment || 90,
            state.toolTruckBalance,
          );
          state.toolTruckBalance -= truckPay;
          state.money -= truckPay;
          recordMoneyChange(-truckPay, "Tool truck weekly");
        }
        // Pawn ticket on the wedding ring — slow weekly bleed
        if (state.ringPawnBalance > 0) {
          const ringPay = Math.min(
            state.ringPawnPayment || 50,
            state.ringPawnBalance,
          );
          state.ringPawnBalance -= ringPay;
          state.money -= ringPay;
          recordMoneyChange(-ringPay, "Pawn shop weekly");
        }

        state.paycheckProgress += 1;
        if (state.paycheckProgress >= PAYCHECK_CYCLE) {
          state.paycheckProgress = 0;
          let paycheckNet = PAYCHECK_AMOUNT;
          let loanNotes = [];
          if (state.bankLoanBalance > 0) {
            const payment = Math.min(
              state.bankLoanPayment,
              state.bankLoanBalance,
            );
            state.bankLoanBalance -= payment;
            paycheckNet -= payment;
            loanNotes.push(`$${fmt(payment)} bank payment`);
          }
          if (state.sharkLoanBalance > 0) {
            const payment = Math.min(
              state.sharkLoanPayment,
              state.sharkLoanBalance,
            );
            state.sharkLoanBalance -= payment;
            paycheckNet -= payment;
            loanNotes.push(`$${fmt(payment)} shark payment`);
          }
          state.money += paycheckNet;
          recordMoneyChange(paycheckNet, "Weekly paycheck");
          const loanNote = loanNotes.length
            ? ` after ${loanNotes.join(" + ")}`
            : "";
          toast(
            `Week ${state.week}. Payday hit — $${fmt(paycheckNet)} cleared${loanNote}.`,
            "ok",
          );
        } else {
          toast(`Week ${state.week} — ${reason}.`, "ok");
        }

        maybeTriggerRivalBeat();
        maybeRollEvent();
        maybeTriggerGarageMoment();
        maybeGenerateMarketplaceOffer();
        maybeTriggerFollowerPayout();
        maybeOfferBrandDeal();
        maybeOfferCollab();
        maybeOfferRingPawn();
        maybeTriggerBirthday();
        if (missedSocialPost) {
          toast(
            "You rolled into a new week without dropping any content. The algorithm forgot you for a minute.",
            "event-bad",
          );
        }
        checkMilestones();
        checkGameOver();
      }

      function drainWeekAdvanceQueue(reason = "time") {
        if (state.weekAdvanceInProgress || state.gameOver || state.seasonWrap)
          return;
        if (!state.weekAdvanceQueue) return;
        if (!canAdvanceWeekCheck(true)) {
          state.weekAdvanceQueue = 0;
          return;
        }
        state.weekAdvanceInProgress = true;
        try {
          while (
            state.weekAdvanceQueue > 0 &&
            !state.gameOver &&
            !state.seasonWrap
          ) {
            state.weekAdvanceQueue -= 1;
            performWeekAdvance(reason);
          }
        } finally {
          state.weekAdvanceInProgress = false;
        }
        processEventQueue();
        saveGame();
        requestRender("full");
      }

      function advanceWeek(reason = "time") {
        state.weekAdvanceQueue = (state.weekAdvanceQueue || 0) + 1;
        drainWeekAdvanceQueue(reason);
      }

      function buyTool(id) {
        const tool = TOOLS_LIST.find((t) => t.id === id);
        const check = canOwnTool(tool);
        if (!check.ok) return toast(check.msg, "err");
        state.money -= tool.cost;
        recordMoneyChange(-tool.cost, `Tool purchase: ${tool.name}`);
        state.ownedTools.push(tool.id);
        if (!state.firstToolPurchased) {
          state.firstToolPurchased = true;
          state.money += 40;
          recordMoneyChange(40, "First real tool purchase rebate");
          toast(
            "First real tool in the box. You sold enough random junk to get $40 back.",
            "event-good",
          );
        }
        checkMilestones();
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }

      function buyFuel(amount) {
        const room = MAX_FUEL - state.fuel;
        const actual = Math.min(amount, room);
        if (actual <= 0) return toast("Fuel tank is already full.", "err");
        const cost = actual * FUEL_PRICE;
        if (state.money < cost)
          return toast("Not enough cash for fuel.", "err");
        state.money -= cost;
        recordMoneyChange(-cost, `Fuel purchase (${actual} gal)`);
        state.fuel += actual;
        saveGame();
        requestRender(state.view === "shows" ? "full" : "chrome");
      }

      function upgradeWorkspace() {
        const next = nextWorkshop();
        if (!next) return toast("Already maxed out.", "err");
        if (state.money < next.cost) return toast("Not enough cash.", "err");
        state.money -= next.cost;
        recordMoneyChange(-next.cost, `Workspace upgrade: ${next.name}`);
        state.workshopLevel = next.id;
        checkMilestones();
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }


      function upgradeToolStorage() {
        const next = nextToolStorage();
        if (!next) return toast("Tool storage is already maxed out.", "err");
        if (state.money < next.cost) return toast("Not enough cash.", "err");
        state.money -= next.cost;
        state.toolStorageLevel = next.id;
        toast(
          `${next.name} rolled in. Restorations will finish faster now.`,
          "ok",
        );
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }

      function canOwnTool(tool) {
        const wd = toolStorageData();
        if (state.ownedTools.includes(tool.id))
          return { ok: false, msg: "Already own this." };
        if (state.money < tool.cost)
          return { ok: false, msg: "Not enough cash." };
        if (state.ownedTools.length >= wd.maxTools)
          return { ok: false, msg: `${wd.name} is out of tool space.` };
        if (
          getWorkspaceIndex(state.workshopLevel) <
          getWorkspaceIndex(tool.workshop)
        ) {
          const req = WORKSPACE_LEVELS.find(
            (w) => w.id === tool.workshop,
          )?.name;
          return { ok: false, msg: `Requires ${req}.` };
        }
        return { ok: true };
      }

      function getDiscount(part) {
        let d = 0;
        const sp = activeSponsors();
        if (sp.find((s) => s.id === 3) && part.category === "paint")
          d = Math.max(d, 0.2);
        if (sp.find((s) => s.id === 4) && part.category === "transmission")
          d = Math.max(d, 0.15);
        if (sp.find((s) => s.id === 5) && part.category === "brakes")
          d = Math.max(d, 0.15);
        if (sp.find((s) => s.id === 7)) d = Math.max(d, 0.15);
        return d;
      }

      function mechanicDiscount() {
        const t = (state.mechanic && state.mechanic.trust) || 0;
        if (t >= 8) return 0.15;
        if (t >= 5) return 0.1;
        if (t >= 3) return 0.05;
        return 0;
      }

      function partCost(p, method) {
        const base =
          method === "diy"
            ? p.diy
            : p.shop != null
              ? p.shop
              : Math.round(p.diy * p.mult);
        let cost = base * (1 - getDiscount(p));
        if (method === "shop") cost *= 1 - mechanicDiscount();
        return Math.round(cost);
      }

      function installPart(id, method, isFree = false) {
        startRestoration(id, method, isFree);
      }

      /* ═══════════════════════════════════════════
     SOCIAL
  ═══════════════════════════════════════════ */
      function calcCreatorReward(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return { cash: 0, followers: 0 };
        const car = currentCar();
        const overall = car ? getOverall(car) : 0;
        const qualityMult = 0.5 + overall / 100;
        const ms = activeSponsors().find((s) => s.socialBoost);
        const sponsorMult = ms ? 1 + ms.socialBoost : 1;
        const cashRaw = Math.max(cfg.cashMin, state.followers * cfg.cashRate);
        const cash = Math.min(cfg.cashCap, Math.round(cashRaw * qualityMult * sponsorMult));
        const folRaw = cfg.followerFlat + state.followers * cfg.followerRate;
        const followers = Math.min(cfg.followerCap, Math.max(1, Math.round(folRaw * qualityMult * sponsorMult)));
        return { cash, followers };
      }

      function creatorPostBlockedReason(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return "Unknown post type.";
        if (state.creatorPostedWeek === state.week) return "Already dropped content this week.";
        if (cfg.moneyCost && state.money < cfg.moneyCost) return `Need $${cfg.moneyCost} for props.`;
        if (cfg.fuelCost && state.fuel < cfg.fuelCost) return `Need ${cfg.fuelCost} gal for b-roll.`;
        if (type === "youtube") {
          const car = currentCar();
          if (!car || !roadworthy(car)) return "Car must be roadworthy to film a MotorTube build.";
        }
        return null;
      }

      function doCreatorPost(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return;
        const blocked = creatorPostBlockedReason(type);
        if (blocked) return toast(blocked, "err");
        const { cash, followers } = calcCreatorReward(type);
        const variance = 0.85 + Math.random() * 0.4;
        const finalCash = Math.max(1, Math.round(cash * variance));
        const finalFollowers = Math.max(1, Math.round(followers * variance));
        if (cfg.moneyCost) state.money -= cfg.moneyCost;
        if (cfg.fuelCost) state.fuel -= cfg.fuelCost;
        state.money += finalCash;
        state.followers += finalFollowers;
        clampFollowers();
        state.totalCreatorEarnings = (state.totalCreatorEarnings || 0) + finalCash;
        state.creatorPostedWeek = state.week;
        recordMoneyChange(finalCash - (cfg.moneyCost || 0), `${cfg.label} payout`);
        addGarageLore(type === "youtube" ? 3 : type === "reel" ? 2 : 1);
        toast(
          `${cfg.emoji} ${cfg.label} went live. +$${fmt(finalCash)} · +${fmtF(finalFollowers)} followers.`,
          "event-good",
        );
        checkMilestones();
        saveGame();
        requestRender("full");
      }

      function doCollab() {
        if (!state.collabAvailable) return;
        if (state.creatorPostedWeek === state.week)
          return toast("You already dropped content this week.", "err");
        const gained = 1000;
        state.followers += gained;
        clampFollowers();
        state.collabAvailable = false;
        state.creatorPostedWeek = state.week;
        addGarageLore(4);
        toast(
          `🤝 Collab dropped. The other creator's audience showed up. +${fmtF(gained)} followers.`,
          "event-good",
        );
        checkMilestones();
        saveGame();
        requestRender("full");
      }

      const POLISH_ACTIONS = {
        engine: { verb: "Dyno Tune", emoji: "📈" },
        transmission: { verb: "Shift Recalibrate", emoji: "⚙️" },
        brakes: { verb: "Pad Bed-In", emoji: "🛑" },
        suspension: { verb: "Alignment Tweak", emoji: "📐" },
        wheels: { verb: "Spin Balance", emoji: "⚪" },
        tires: { verb: "Pressure Dial-In", emoji: "💨" },
        electrical: { verb: "Ground Rework", emoji: "⚡" },
        differential: { verb: "Diff Lash Setup", emoji: "🔩" },
        body: { verb: "Wet Sand Pass", emoji: "💧" },
        paint: { verb: "Cut and Buff", emoji: "✨" },
        interior: { verb: "Detail Clean", emoji: "🧴" },
        chrome: { verb: "Chrome Polish Pass", emoji: "✨" },
      };
      const POLISH_PER_WEEK = 3;
      const POLISH_COST = 80;
      const POLISH_GAIN = 3;

      function getCategoryCompletion(car, cat) {
        if (!car) return null;
        const partsInCat = PARTS.filter((p) => p.category === cat);
        if (!partsInCat.length) return null;
        const installed = new Set(car.installedParts || []);
        const allDone = partsInCat.every((p) => installed.has(p.id));
        return { allDone, current: car[cat] || 0 };
      }

      function polishCategory(cat) {
        const car = currentCar();
        if (!car) return toast("No car in the garage to polish.", "err");
        const status = getCategoryCompletion(car, cat);
        if (!status || !status.allDone)
          return toast(
            "Need every part installed in that category before fine-tuning.",
            "err",
          );
        if (car[cat] >= 100) return toast("That category is maxed out.", "err");
        if ((state.polishesThisWeek || 0) >= POLISH_PER_WEEK)
          return toast(
            `Out of fine-tuning time this week (${POLISH_PER_WEEK} per week).`,
            "err",
          );
        if (state.money < POLISH_COST)
          return toast(`Need $${POLISH_COST} for the supplies.`, "err");
        state.money -= POLISH_COST;
        car[cat] = Math.min(100, car[cat] + POLISH_GAIN);
        state.polishesThisWeek = (state.polishesThisWeek || 0) + 1;
        recordMoneyChange(-POLISH_COST, `Fine tune: ${CAT_LABELS[cat]}`);
        playSfx("wrench");
        toast(
          `${POLISH_ACTIONS[cat]?.verb || "Polished"} on ${CAT_LABELS[cat]}. +${POLISH_GAIN} (${car[cat]}/100).`,
          "ok",
        );
        saveGame();
        requestRender("full");
      }

      function buyFakeFollowers() {
        if (state.fakeFollowersBought)
          return toast("Already pulled that stunt. Can't do it twice.", "err");
        const car = currentCar();
        if (!car || !roadworthy(car))
          return toast(
            "Need a roadworthy build — can't fake credibility you don't have.",
            "err",
          );
        const cost = 200;
        if (state.money < cost)
          return toast(`Need $${cost} up front. Don't have it.`, "err");
        state.money -= cost;
        state.fakeFollowersBought = true;
        state.followers += 1000;
        clampFollowers();
        recordMoneyChange(-cost, "Bought followers");
        pushNotice(
          "💀 Thousand new followers overnight. Every one of them named like a Wi-Fi password. Don't tell your sponsors you bought fake followers — they definitely check this stuff.",
          "good",
        );
        checkMilestones();
        saveGame();
        requestRender("full");
      }

      function maybeOfferCollab() {
        if (state.collabAvailable) return;
        if (state.followers < 200) return; // need at least some audience
        if (Math.random() < 0.08) {
          state.collabAvailable = true;
          toast(
            "🤝 A scene creator hit you up about a collab video. Check the Social tab.",
            "event-good",
          );
        }
      }

      function maybeTriggerBirthday() {
        if (state.birthdayReceived) return;
        if (state.week < 13) return;
        if (modalBusy()) return;
        if (Math.random() > 0.3) return; // ~30% chance per week once eligible
        state.birthdayReceived = true;
        state.money += 1000;
        recordMoneyChange(1000, "Birthday card");
        const line = state.weddingRingPawned
          ? "🎂 Happy birthday. Found a card on the workbench with $1,000 inside and a note in her handwriting: 'for the truck. NOT the ring.' She's been watching this whole thing closer than you thought."
          : state.wifeCarSold
            ? "🎂 Happy birthday. Card on the workbench with $1,000 inside and a note: 'for the truck. Please.' Not a lot of other context, but you'll take it."
            : "🎂 Happy birthday. Found a card on the workbench with $1,000 inside and a note that just says 'for the truck.' Can't argue with that.";
        pushNotice(line, "good");
      }

      function maybeOfferRingPawn() {
        if (state.weddingRingPawned) return;
        if (!state.wifeCarSold) return;
        // Player has to be all-in: every loan tapped, every dollar borrowed
        // already. Ring pawn is the move when there's nothing left to sell.
        if (state.bankLoanBalance <= 0) return;
        if (state.sharkLoanBalance <= 0) return;
        if (state.toolTruckBalance <= 0) return;
        if (modalBusy()) return;
        if (Math.random() > 0.35) return;
        queueScene({
          id: "ring_pawn_offer",
          title: "The pawn shop is open late",
          emoji: "💍",
          text: "It's 10:47 PM. You're standing across the street from a pawn shop you've driven past a hundred times and never thought about. Three loans out, the wife's car already gone, and the bank account thirty bucks deep. Your wedding ring has been sitting on the dresser since you started painting last weekend. She probably wouldn't even notice tonight.",
          choices: [
            {
              label: "Pawn the ring · +$5,000",
              money: 5000,
              ringPawnAccept: true,
              note: "The pawnbroker counted out fifty hundred-dollar bills without making eye contact. You signed a slip that said you'd pay $6,000 to get the ring back. He smiled when he locked it in the case. He's seen this before.",
              noteTone: "event-bad",
            },
            {
              label: "Walk away — some things aren't for sale",
              lore: 12,
              note: "You sat in the truck for ten minutes, then drove home. The ring's still on the dresser. You'll figure something else out, or you won't, but at least you'll have that.",
              noteTone: "event-good",
            },
          ],
        });
      }

      function maybeOfferBrandDeal() {
        if (state.pendingBrandDeal) return;
        if (state.followers < BRAND_DEAL_MIN_FOLLOWERS) return;
        if (state.freePart) return;
        const chance = Math.min(0.22, 0.06 + state.followers / 60000);
        if (Math.random() > chance) return;
        const brand = BRAND_DEAL_BRANDS[Math.floor(Math.random() * BRAND_DEAL_BRANDS.length)];
        state.pendingBrandDeal = {
          brand,
          offeredWeek: state.week,
          followerBonus: Math.max(10, Math.round(state.followers * 0.015)),
        };
        toast(`📦 ${brand} slid into your DMs with a brand deal.`, "event-good");
      }

      function acceptBrandDeal() {
        const deal = state.pendingBrandDeal;
        if (!deal) return;
        if (state.freePart) return toast("Claim the free part you already have first.", "err");
        state.freePart = true;
        state.followers += deal.followerBonus;
        clampFollowers();
        addGarageLore(2);
        state.pendingBrandDeal = null;
        toast(
          `Deal locked with ${deal.brand}. Free Budget part waiting in the shop. +${fmtF(deal.followerBonus)} followers.`,
          "event-good",
        );
        checkMilestones();
        saveGame();
        requestRender("full");
      }

      function declineBrandDeal() {
        const deal = state.pendingBrandDeal;
        if (!deal) return;
        addGarageLore(1);
        state.pendingBrandDeal = null;
        toast(`Passed on ${deal.brand}. Staying independent — for now.`, "ok");
        saveGame();
        requestRender("full");
      }

      function maybeTriggerFollowerPayout() {
        const tier = FOLLOWER_PAYOUT_TIERS.find((entry) => state.followers >= entry.min);
        if (!tier || Math.random() > tier.chance) return;
        let payout = randInt(tier.minCash, tier.maxCash);
        const mediaSponsor = activeSponsors().find((s) => s.socialBoost);
        if (mediaSponsor) payout = Math.round(payout * 1.15);
        state.money += payout;
        recordMoneyChange(payout, "Follower brand deal");
        toast(
          `Your following landed a ${tier.label}. +$${fmt(payout)} this week.`,
          "event-good",
        );
      }

      /* ═══════════════════════════════════════════
     SHOWS + RIVAL
  ═══════════════════════════════════════════ */
      function beginShowEntry(showId) {
        if (state.showLoading || state.showStage) return;
        // First-Local glove-box scene: fires once, before the player's very
        // first Local show. Player picks pay-it-forward or bribe-the-judge.
        const showPeek = getCurrentShows().find((s) => s.id === showId);
        const firstLocal =
          showPeek &&
          showPeek.tier === "Local" &&
          !state.gloveBoxFound &&
          !state.history.some((h) => h.tier === "Local");
        if (firstLocal) {
          state.gloveBoxFound = true;
          const fee = showPeek.fee;
          queueScene({
            id: "glove_box_first_local",
            title: "$" + fee + " in the glove box",
            emoji: "💵",
            text: `You're rolling in early, getting in line for the registration table. Reaching for the parking pass, your hand finds a folded $${fee} bill wedged behind it. You don't remember putting it there. The registration line ahead has Mike from down the street, looking at his wallet like it owes him money. Off to the side, the head judge is alone for a second.`,
            choices: [
              {
                label: `Cover Mike's entry — kid's been working on his truck for years`,
                followers: 25,
                lore: 8,
                gloveBoxAction: { showId: showId },
                note: "Mike couldn't believe it. Said he'd pay you back, both of you knew he wouldn't, both of you were okay with it. Word travels in this scene — somebody is going to remember this for a long time.",
                noteTone: "event-good",
              },
              {
                label: `Slip the head judge $${fee} — see what happens`,
                lore: 6,
                gloveBoxAction: { showId: showId, bribe: true },
                note: "He pocketed it without a word and walked off. You felt clever for about ten seconds. The judging today might tilt your way. The scene picks up on this stuff eventually, but today is today.",
                noteTone: "event-bad",
              },
              {
                label: `Pocket the cash, ignore both of them`,
                money: fee,
                lore: 2,
                gloveBoxAction: { showId: showId },
                note: `You found $${fee} and kept $${fee}. The simplest decision of the day.`,
                noteTone: "event-good",
              },
            ],
          });
          requestRender("full");
          return;
        }
        state.showLoading = true;
        state.pendingShowId = showId;
        playSfx("engineRev");
        enterShow(showId);
        state.pendingShowId = null;
      }

      function enterShow(showId) {
        resolveCompletedRestorations(false);
        const show = getCurrentShows().find((s) => s.id === showId);
        const car = currentCar();
        const fuelNeed = show.fuel;
        const sponsors = activeSponsors();

        if (!car) return toast("Buy a car first.", "err");
        if (show.weeksUntil !== 0)
          return toast(
            `That show starts in ${show.weeksUntil} week(s).`,
            "err",
          );
        if (
          show.enteredThisWeek ||
          state.enteredShowsThisWeek.includes(show.id)
        )
          return toast("You've already entered this show this week.", "err");
        if (hasActiveRestorations(car.id))
          return toast(
            "You cannot take the car to a show while restoration work is still in progress.",
            "err",
          );
        if (!roadworthy(car)) return toast("Not roadworthy yet.", "err");
        const localSponsor = sponsors.find(
          (s) => s.freeLocalEntry && show.tier === "Local",
        );
        const entryFee = localSponsor ? 0 : show.fee;
        if (state.money < entryFee)
          return toast("Not enough for the entry fee.", "err");
        if (state.fuel < fuelNeed)
          return toast(`Need ${fuelNeed} gal for this trip.`, "err");
        if (getOverall(car) < show.minScore)
          return toast(`Need ${show.minScore}+ overall.`, "err");

        const effectiveCar = { ...currentCar() };
        const effectiveOverall = getOverall(effectiveCar);
        const bribeBoost = state.bribeActive ? 15 : 0;
        if (state.bribeActive) state.bribeActive = false;
        // Variance shrinks as the build gets tighter. A 30-overall daily
        // driver swings ±10 (genuine dice roll); a 95+ show car swings
        // ±3 (clean builds perform consistently).
        const playerVariance = Math.max(
          3,
          13 - effectiveOverall * 0.11,
        );
        const myScore = clamp(
          effectiveOverall +
            (Math.random() * playerVariance * 2 - playerVariance) +
            bribeBoost,
        );

        // Competitor max scales with the player's build. Below 80 overall,
        // competitors can roll up to 90 (genuine threat). At 90+, comps cap
        // a little under the player's overall so a top-tier build doesn't
        // lose to a stranger who got lucky.
        const compMax =
          effectiveOverall >= 80
            ? Math.min(95, Math.max(80, effectiveOverall - 3))
            : 90;
        let compPool = [...COMPS]
          .sort(() => Math.random() - 0.5)
          .slice(0, 4)
          .map((name) => ({
            name,
            score: clamp(
              show.minScore + 5 + Math.random() * (compMax - show.minScore),
            ),
          }));
        let buckInShow = false;
        // Buck shows up at every show, but his Cars & Coffee energy is
        // casual — same Stallion, no trophy chase. Buck stays competitive
        // with the player but his variance also tightens at high tiers.
        const buckBase = getRivalBaseScore();
        const buckVariance = Math.max(3, 8 - effectiveOverall * 0.04);
        const buckScore = clamp(
          buckBase +
            (Math.random() * buckVariance * 2 - buckVariance) -
            (show.tier === "Cars & Coffee" ? 4 : 0),
        );
        compPool.push({
          name: "Buck's '67 Stallion",
          score: buckScore,
          isRival: true,
        });
        buckInShow = true;
        state.rival.showsEntered++;
        state.rival.score = Math.min(95, buckBase + 2);

        const all = [
          ...compPool,
          {
            name: `Your ${effectiveCar.year} ${effectiveCar.make} ${effectiveCar.model}`,
            score: myScore,
            isPlayer: true,
          },
        ].sort((a, b) => b.score - a.score);

        const place = all.findIndex((e) => e.isPlayer) + 1;
        const buckPlace = buckInShow
          ? all.findIndex((e) => e.isRival) + 1
          : null;
        state.rival.lastPlace = buckPlace;
        if (buckPlace) {
          pushRivalNote(
            `Buck finished ${placeLabel(buckPlace)} at ${show.name}.`,
          );
        }

        const basePrize = show.prizes[place - 1] || 0;
        let bonusCash = 0;
        if (show.tier !== "Cars & Coffee") {
          sponsors.forEach((s) => {
            if (s.cashPerShow) bonusCash += s.cashPerShow;
          });
        }
        let prizeBonus = 0;
        sponsors.forEach((s) => {
          if (s.prizePct) prizeBonus += s.prizePct;
          if (s.nationalPrizePct && show.tier === "National")
            prizeBonus += s.nationalPrizePct;
        });

        const totalPrize = basePrize + Math.round(basePrize * prizeBonus);
        const totalEarned = totalPrize + bonusCash;

        state.money = state.money - entryFee + totalEarned;
        recordMoneyChange(totalEarned - entryFee, `${show.name} payout`);
        state.fuel = Math.max(0, state.fuel - fuelNeed);

        const gained = show.followers[place - 1] || 0;
        const newFollowers = state.followers + gained;
        let showReward = null;
        if (show.tier === "Cars & Coffee") {
          showReward = getCarsAndCoffeeReward();
        }

        const snapon = SPONSORS.find((s) => s.id === 6);
        let toolGifted = null;
        if (
          state.followers < snapon.req &&
          newFollowers >= snapon.req &&
          !state.giftedTools.includes("t17")
        ) {
          if (
            !state.ownedTools.includes("t17") &&
            state.ownedTools.length < workshopData().maxTools
          ) {
            state.ownedTools = [...new Set([...state.ownedTools, "t17"])];
          }
          state.giftedTools.push("t17");
          toolGifted = "Chrome Buffer (Snap-it gift)";
        }

        if (show.tier !== "Cars & Coffee" && sponsors.find((s) => s.freePart))
          state.freePart = true;
        state.followers = newFollowers;
        clampFollowers();
        state.lastShowTier = show.tier;
        state.lastShowPlace = place;
        state.enteredShowsThisWeek.push(show.id);

        state.seasonStats.moneyEarned += totalEarned - entryFee;
        state.seasonStats.showsEntered++;
        if (
          !state.seasonStats.bestPlace ||
          place < state.seasonStats.bestPlace ||
          (place === state.seasonStats.bestPlace &&
            ["National", "Regional", "Local"].indexOf(show.tier) <
              ["National", "Regional", "Local"].indexOf(
                state.seasonStats.bestTier || "Local",
              ))
        ) {
          state.seasonStats.bestPlace = place;
          state.seasonStats.bestTier = show.tier;
        }

        const arrivalLine =
          show.tier === "Cars & Coffee"
            ? "You rolled in early, parked crooked, and immediately started pretending the idle sounded intentional."
            : show.tier === "Local"
              ? "Main Street is closed off, sawhorses up, somebody's already plugged in their boom box. Local crowd's already gathering."
              : show.tier === "Regional"
                ? "You can feel the room tighten up now. Fewer jokes, more measuring tape energy."
                : "This is the big stage now. Every panel gap feels like public information.";
        const judgingLine = randomShowComment();
        state.result = {
          show: show.name,
          tier: show.tier,
          week: state.week,
          car: `${effectiveCar.year} ${effectiveCar.make} ${effectiveCar.model}`,
          place,
          score: myScore,
          prize: totalPrize,
          bonusCash,
          fee: entryFee,
          localSponsorCovered: !!localSponsor,
          fuelUsed: fuelNeed,
          net: totalEarned - entryFee,
          gained,
          standings: all,
          toolGifted,
          buckPlace,
          showReward,
          arrivalLine,
          judgingLine,
        };
        state.history.unshift(state.result);
        state.view = "result";
        state.postShowWeekLocked = true;
        state.showCinematicData = {
          arrivalLine,
          judgingComments: pickJudgingComments(effectiveCar, buckPlace, buckInShow),
          buckLine: pickBuckResultLine(place, buckPlace, buckInShow),
          revealReaction: pickRevealReaction(place),
        };
        state.showStage = "arriving";

        if (place === 1 && show.tier === "National" && effectiveOverall >= 90) {
          state.won = true;
          state.pendingVictoryTrigger = true;
        } else if (place === 1 && show.tier === "National") {
          // Won the National at under 90 overall — no trophy build, but the
          // season still ends here. Cinematic plays through, then the season
          // wrap fires.
          state.pendingNationalEnd = true;
        }
        if (place === 1) {
          pushRivalNote(
            `You just beat the field at ${show.name}. Buck is going to hear about this.`,
          );
          if (show.tier === "Local") maybeAddBuckReaction("firstLocalWin");
        }
        if (buckInShow && state.buck) {
          if (place < buckPlace) state.buck.beatenCount = (state.buck.beatenCount || 0) + 1;
          else if (place > buckPlace) state.buck.lostToCount = (state.buck.lostToCount || 0) + 1;
        }
        if (show.tier === "Cars & Coffee" && state.buck && !state.buck.metOnce) {
          maybeTriggerBuckIntro();
        }
        checkMilestones();
        saveGame();
        advanceWeek("after show");
      }

      function advanceShowStage() {
        if (state.showStage === "arriving") {
          state.showStage = "judging";
          playSfx("swoosh");
        } else if (state.showStage === "judging") {
          state.showStage = "reveal";
          const place = (state.result && state.result.place) || 99;
          if (place === 1) {
            playSfx("applause");
            setTimeout(() => playSfx("success"), 180);
          } else if (place <= 3) {
            playSfx("applause");
          } else if (place <= 5) {
            playSfx("ding");
          } else {
            playSfx("swoosh");
          }
        } else {
          state.showStage = null;
          state.showCinematicData = null;
          state.showLoading = false;
          playSfx("click");
          if (state.pendingVictoryTrigger) {
            state.pendingVictoryTrigger = false;
            triggerVictory();
          } else if (state.pendingNationalEnd) {
            state.pendingNationalEnd = false;
            state.seasonWrap = true;
            toast(
              "National's done. The trophy's yours, the season closes out here.",
              "event-good",
            );
          } else {
            processEventQueue();
            drainWeekAdvanceQueue("queued");
          }
        }
        saveGame();
        requestRender("full");
      }

      function buyCar(id) {
        const c = BUYABLE_CARS.find((x) => x.id === id);
        if (state.money < c.price) return toast("Not enough cash.", "err");
        if (state.cars.find((x) => x.id === c.id))
          return toast("Already in your garage.", "err");
        const { price, ...data } = c;
        state.money -= price;
        recordMoneyChange(
          -price,
          `Vehicle purchase: ${c.year} ${c.make} ${c.model}`,
        );
        state.cars.push({ ...data, installedParts: [] });
        state.carId = c.id;
        state.view = "workshop";
        saveGame();
        requestRender("full");
      }

      function panel(title, body, subtitle = "", accent = "#c99842") {
        return `<div class="panel"><div class="panel-header"><div><div class="panel-title" style="color:${accent}">${title}</div>${subtitle ? `<div class="panel-sub">${subtitle}</div>` : ""}</div><div class="dots"><div class="dot"></div><div class="dot"></div></div></div>${body}</div>`;
      }
      function heroPanel(kicker, title, sub, body, tone = "gold") {
        const toneCls = tone === "blue" ? "hero-blue" : "";
        return `<div class="hero-panel ${toneCls}"><div class="hero-panel-kicker">${kicker}</div><div class="hero-panel-title">${title}</div>${sub ? `<div class="hero-panel-sub">${sub}</div>` : ""}${body}</div>`;
      }
      function tab(label, active, onclick) {
        return `<button class="tab ${active ? "active" : ""}" onclick="${onclick}">${label}</button>`;
      }
      function button(
        label,
        onclick,
        disabled = false,
        extraClass = "",
        style = "",
      ) {
        return `<button class="btn ${extraClass}" style="${style}" onclick="${onclick}" ${disabled ? "disabled" : ""}>${label}</button>`;
      }
      function gauge(label, value, max, color = "#c99842") {
        const pct = Math.max(0, Math.min(1, value / max));
        return `<div>${label ? `<div class="gauge-label"><span>${label}</span><span style="color:var(--text);font-weight:bold">${value}/${max}</span></div>` : ""}<div class="gauge-wrap"><div class="gauge-fill" style="width:${pct * 100}%;background:linear-gradient(90deg,${color} 0%,${color}CC 100%)"></div></div></div>`;
      }
      function chalkRow(k, v, cls = "") {
        return `<div class="row"><span class="row-k">${k}</span><span class="row-v ${cls}">${v}</span></div>`;
      }

      function renderUpcomingBar() {
        const { nextShow, nextShowText } = getUpcomingSummary();
        const totalLoan = state.bankLoanBalance + state.sharkLoanBalance;
        const loanLine =
          totalLoan > 0
            ? chalkRow("Loan Balance", `$${fmt(totalLoan)}`, "warn")
            : chalkRow("Loan", "None");
        const moneyClass = state.lastMoneyDelta >= 0 ? "good" : "bad";
        const moneyLine = state.lastMoneyReason
          ? chalkRow(
              "Last Money Move",
              `${state.lastMoneyDelta >= 0 ? "+" : "-"}$${fmt(Math.abs(state.lastMoneyDelta))}`,
              moneyClass,
            )
          : "";
        return panel(
          "Upcoming",
          `${chalkRow("Current Week", `${state.week}/${state.seasonLength}`)}${chalkRow("Paycheck", `${PAYCHECK_CYCLE - state.paycheckProgress} week(s)`)}${chalkRow("Next Event", nextShowText, nextShow.weeksUntil === 0 ? "good" : "warn")}${chalkRow("Scene Rep", getReputationTitle(currentCar()))}${loanLine}${moneyLine}${state.lastMoneyReason ? `<div class="tiny muted" style="margin-top:4px">${state.lastMoneyReason}</div>` : ""}`,
          "Compact season timeline",
          "#7da0c2",
        );
      }

      function pixelWheel(cx, cy, color, rim, spoke) {
        return `<rect x="${cx - 12}" y="${cy - 12}" width="24" height="24" fill="#111214"/><rect x="${cx - 10}" y="${cy - 10}" width="20" height="20" fill="${color}"/><rect x="${cx - 6}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx + 2}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx - 10}" y="${cy - 6}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 10}" y="${cy + 2}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 4}" y="${cy - 4}" width="8" height="8" fill="${rim}"/>`;
      }

      function f100Sprite(stageLevel, colors) {
        const body = colors.baseColor;
        const roof = colors.roofColor;
        const glass = colors.windowColor;
        const chrome = colors.trimColor;
        const tire = colors.wheelTire;
        const wheel = colors.wheelColor;
        const spoke = colors.wheelSpoke;
        const hub = colors.wheelHub;
        const primer = colors.primerColor;
        const rusty = colors.rustColor;
        const dark = colors.shadowColor;

        if (stageLevel <= 0) {
          return `<g shape-rendering="crispEdges">

      function escapeHtmlAttr(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function normalizeBackdropSrcdoc(srcdoc, scale = 1, yOffset = 0) {
        if (!srcdoc) return "";
        const shell = `
<style id="cg-backdrop-normalize">
html,body{margin:0!important;width:100%!important;height:100%!important;overflow:hidden!important;background:#0f0c0a!important;}
body{position:relative!important;display:block!important;}
.scene{position:absolute!important;left:50%!important;bottom:${yOffset}px!important;top:auto!important;transform:translateX(-50%) scale(${scale})!important;transform-origin:center bottom!important;margin:0!important;box-sizing:border-box!important;max-width:none!important;max-height:none!important;}
</style>
`;
        return srcdoc.replace(/<\/head>/i, `${shell}</head>`);
      }

      function artBackdropFrame(srcdoc, title, scale = 1, yOffset = 0) {
        if (!srcdoc) return "";
        return `<iframe class="art-backdrop-frame" title="${title || "Scene backdrop"}" aria-hidden="true" tabindex="-1" loading="eager" srcdoc="${escapeHtmlAttr(normalizeBackdropSrcdoc(srcdoc, scale, yOffset))}"></iframe><div class="art-backdrop-shade"></div>`;

        const val = Math.max(0, Math.min(1, parseFloat(v) || 0));

        if (val > 0 && !musicPlaying) startMusic();
        if (val === 0 && musicPlaying) stopMusic();
        const lbl = document.getElementById("musicVolLabel");
        if (lbl) lbl.textContent = Math.round(val * 100) + "%";
        saveGame();
      }
      function setSfxVolumeFromSlider(v) {
        const val = Math.max(0, Math.min(1, parseFloat(v) || 0));
        state.settings.sfxVolume = val;
        applyAudioSettings();
        const lbl = document.getElementById("sfxVolLabel");
        if (lbl) lbl.textContent = Math.round(val * 100) + "%";
        if (val > 0) playSfx("click");
        saveGame();
      }
      function togglePause() {
        if (state.settings.paused) {
          // Unpause: push all active task finish times forward by the elapsed pause duration
          const pauseElapsed = Date.now() - (state.pausedAt || Date.now());
          if (pauseElapsed > 0) {
            (state.activeRestorations || []).forEach((task) => {
              if (!task.completed) {
                task.startTime += pauseElapsed;
                task.finishTime += pauseElapsed;
              }
            });
          }
          state.settings.paused = false;
          state.pausedAt = 0;
          toast("Resumed", "ok");
        } else {
          state.settings.paused = true;
          state.pausedAt = Date.now();
          toast("Paused", "ok");
        }
        saveGame();
        requestRender("modal");
      }
      function replayTutorial() {
        state.tutorialComplete = false;
        state.tutorialStep = 0;
        state.settingsOpen = false;
        saveGame();
        requestRender("full");
      }
      function isFullscreenSupported() {
        const el = document.documentElement;
        return !!(
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.mozRequestFullScreen ||
          el.msRequestFullscreen
        );
      }
      function isInFullscreen() {
        return !!(
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.mozFullScreenElement ||
          document.msFullscreenElement
        );
      }
      function toggleFullscreen() {
        if (!isFullscreenSupported()) return;
        if (isInFullscreen()) {
          const exit =
            document.exitFullscreen ||
            document.webkitExitFullscreen ||
            document.mozCancelFullScreen ||
            document.msExitFullscreen;
          if (exit) exit.call(document);
        } else {
          const el = document.documentElement;
          const req =
            el.requestFullscreen ||
            el.webkitRequestFullscreen ||
            el.mozRequestFullScreen ||
            el.msRequestFullscreen;
          if (req) req.call(el);
        }
        playSfx("click");
      }
      function syncFullscreenButtons() {
        const supported = isFullscreenSupported();
        const inFs = isInFullscreen();
        const topBtn = getEl("fullscreenBtn");
        if (topBtn) {
          topBtn.style.display = supported ? "" : "none";
          topBtn.textContent = inFs ? "⤡" : "⤢";
          topBtn.title = inFs ? "Exit fullscreen" : "Enter fullscreen";
        }
        // Settings modal button gets re-rendered when toggled, but
        // when fullscreen state changes externally (Esc key), we
        // also need to refresh the modal if it's open.
        if (state.settingsOpen) requestRender("modal");
      }
      function resetSaveConfirm() {
        if (
          !confirm(
            "Wipe your save and start over from scratch? This can't be undone.",
          )
        )
          return;
        // Reset in-memory state first — the beforeunload handler will
        // try to saveGame() during the reload, and if state still holds
        // the old game it would just re-write what we just deleted.
        Object.assign(state, makeDefaultState());
        try {
          localStorage.removeItem(SAVE_KEY);
        } catch (e) {}
        location.reload();
      }

it", "-$90 for 40 weeks", "warn")}${state.toolTruckBalance > 0 ? `${chalkRow("Outstanding", `$${fmt(state.toolTruckBalance)}`, "warn")}<div class="btn-row two" style="margin-top:8px">${button("Pay $90", "payOffLoan('truck')", state.money < Math.min(90, state.toolTruckBalance), "", "width:100%")}${button(`Pay Off $${fmt(state.toolTruckBalance)}`, "payOffLoan('truck')", state.money <= 0, "", "width:100%;background:#4a3c2e;border-color:#6b5840")}</div>` : button("Open Tool Truck Tab", "takeToolTruckLoan()", false, "", "width:100%")}`, "Snap-it truck regular. Slow squeeze, low pressure.", "#c99842")}${state.weddingRingPawned && state.ringPawnBalance > 0 ? panel("Pawn Ticket", `${chalkRow("You Owe", `$${fmt(state.ringPawnBalance)}`, "bad")}${chalkRow("Weekly Hit", "-$50 weekly", "warn")}${chalkRow("Outstanding", `$${fmt(state.ringPawnBalance)}`, "bad")}<div class="btn-row two" style="margin-top:8px">${button("Pay $50", "payOffLoan('ring')", state.money < Math.min(50, state.ringPawnBalance), "", "width:100%")}${button(`Pick Up Ring · $${fmt(state.ringPawnBalance)}`, "payOffLoan('ring')", state.money < state.ringPawnBalance, "", "width:100%;background:#7a2a22;border-color:#b85b4f;color:#f2ddd8")}</div>`, "Get the ring back before the next anniversary. You know the drill.", "#a984dd") : ""}</div></div>`;

      function renderTutorialModal() {
        const root = getEl("modalRoot");

        const idx = Math.max(0, Math.min(state.tutorialStep || 0, TUTORIAL_BEATS.length - 1));
        const beat = TUTORIAL_BEATS[idx];
        if (!beat) return false;
        const isLast = idx === TUTORIAL_BEATS.length - 1;
        const pips = TUTORIAL_BEATS.map((_, i) => {
          const cls = i === idx ? "active" : i < idx ? "done" : "";
          return `<div class="tutorial-progress-pip ${cls}"></div>`;
        }).join("");
        const pointsMarkup = beat.points
          ? `<div class="tutorial-points">${beat.points
              .map(
                (p) =>
                  `<div class="tutorial-point"><span class="tutorial-point-icon">${p.icon}</span><span>${p.text}</span></div>`,
              )
              .join("")}</div>`
          : "";
        const primaryLabel = isLast ? "Get after it →" : "Next →";
        root.innerHTML = `<div class="modal"><div class="modal-card tutorial-modal show-beat"><div class="tutorial-progress">${pips}</div><div class="tutorial-body"><div class="tutorial-kicker">${beat.kicker}</div><div class="tutorial-art">${beat.art}</div><div class="tutorial-headline">${beat.headline}</div><div class="tutorial-body-text">${beat.body}</div>${pointsMarkup}</div><div class="tutorial-actions"><button class="tutorial-primary" onclick="advanceTutorial()">${primaryLabel}</button>${isLast ? "" : `<button class="tutorial-skip" onclick="skipTutorial()">Skip intro</button>`}</div></div></div>`;

      function popTheHood() {
        const now = Date.now();
        if (now - hoodClickReset > 2000) hoodClickCount = 0;
        hoodClickReset = now;
        hoodClickCount++;
        if (hoodClickCount >= 5) {
          hoodClickCount = 0;
          cheatPromptOpen = true;
          playSfx("ding");
          requestRender("full");
        }
      }
      function closeCheatPrompt() {
        cheatPromptOpen = false;
        requestRender("full");
      }
      function submitCheatCode() {
        const input = getEl("cheatCodeInput");
        if (!input) return;
        const code = input.value.trim().toUpperCase();
        if (!code) return;
        if (applyCheatCode(code)) {
          cheatPromptOpen = false;
          saveGame();
          requestRender("full");
        } else {
          toast(`No dice on "${code}". Nothing rattled loose.`, "err");
          input.value = "";
        }
      }
      function applyCheatCode(code) {
        if (code === "BARNFIND") {
          state.money += 50000;
          recordMoneyChange(50000, "Cheat: BARNFIND");
          pushNotice(
            "🏚 Barn find. Dragged home a Cobra shell, parted it out on Marketplace in an afternoon. +$50,000.",
            "good",
          );
          return true;
        }
        if (code === "DALE") {
          if (!state.mechanic)
            state.mechanic = { metOnce: false, trust: 0, shopVisits: 0, milestoneSeen: false };
          state.mechanic.metOnce = true;
          state.mechanic.trust = 10;
          state.mechanic.milestoneSeen = true;
          pushNotice(
            "🔧 Dale says he trusts you with anything now. Full 15% shop discount permanent.",
            "good",
          );
          return true;
        }
        if (code === "BUILT") {
          const car = currentCar();
          if (!car) {
            toast("No car in the garage to upgrade.", "err");
            return true;
          }
          CATS.forEach((cat) => {
            car[cat] = clamp((car[cat] || 0) + 15);
          });
          pushNotice(
            `🛠 ${car.year} ${car.make} jumped 15 points in every category. Don't tell anybody where you got the parts.`,
            "good",
          );
          return true;
        }
        if (code === "SNAPON") {
          const wsIdx = getWorkspaceIndex(state.workshopLevel);
          const unlocked = TOOLS_LIST.filter(
            (t) =>
              !state.ownedTools.includes(t.id) &&
              getWorkspaceIndex(t.workshop) <= wsIdx,
          );
          const storage = toolStorageData();
          const headroom = Math.max(0, storage.maxTools - state.ownedTools.length);
          const take = unlocked.slice(0, headroom);
          take.forEach((t) => state.ownedTools.push(t.id));
          pushNotice(
            `🟡 Snap-it driver unloaded ${take.length} tool${take.length === 1 ? "" : "s"} on the bench. Didn't ask for payment. Said "we'll figure it out."`,
            "good",
          );
          return true;
        }
        if (code === "LEGEND") {
          state.followers = MAX_FOLLOWERS;
          pushNotice(
            "🎥 A clip of your build went nuclear overnight. 1,000,000 followers. Your phone has stopped being useful.",
            "good",
          );
          return true;

        if (code === "HAYLEY") {
          const warehouseIdx = WORKSPACE_LEVELS.findIndex((w) => w.id === "warehouse");

            "🎰 Hayley hit the Megabucks at the casino. Walked in with the check and handed you the keys to a warehouse. Said 'now fix the truck somewhere with a roof.'",
            "good",
          );
          return true;
        }
        return false;

      function renderFineTuningPanel(car) {
        if (!car) return "";

        const remainingPolishes = Math.max(
          0,

          .map((row) => {

        return panel(
          "Fine Tuning",
          rows,
          subtitle,
          "#a984dd",
        );

                .map(
                  ({ tool, score }) =>
                    `<div class="flex between center" style="margin-bottom:6px;gap:10px"><div><div class="small" style="color:var(--text)">${tool.emoji} ${tool.name}</div><div class="tiny muted">Unlocks ${score} more DIY ${score === 1 ? "option" : "options"}</div></div>${button(`Buy · $${fmt(tool.cost)}`, `buyTool('${tool.id}')`, false, "", "padding:6px 10px;font-size:11px")}</div>`,
                )

          }
          subcontent = `${starterToolMarkup}${panel(
            "Suggested Next Moves",
            `${
              suggested.length
                ? suggested
                    .map((item) => {
                      if (item.type === "polish") {
                        const action = POLISH_ACTIONS[item.cat] || { verb: "Polish", emoji: "✨" };
                        const remaining = Math.max(0, POLISH_PER_WEEK - (state.polishesThisWeek || 0));
                        const blocked = remaining <= 0 || state.money < POLISH_COST;
                        const status = remaining <= 0
                          ? `No fine-tuning sessions left this week (${POLISH_PER_WEEK}/${POLISH_PER_WEEK} used). Resets next week.`

                          `${action.emoji} ${action.verb} · ${CAT_LABELS[item.cat]}`,
                          `<div class="smart-tag">${item.tag}</div><div class="small muted" style="margin-bottom:8px">Cost: <span style="color:var(--text);font-weight:bold">$${POLISH_COST}</span> per pass <span style="color:var(--text-dim)">·</span> Score: <span style="color:var(--text);font-weight:bold">${item.current}/100</span></div><div class="small muted" style="margin-bottom:10px">Improvement: <span class="good" style="font-weight:bold">+${POLISH_GAIN} ${CAT_LABELS[item.cat]}</span></div><div class="tiny muted" style="margin-bottom:10px">${item.why}</div><div class="tiny muted" style="margin-bottom:10px">${status}</div>${button(blocked && state.money < POLISH_COST ? `Need $${POLISH_COST}` : remaining <= 0 ? "Maxed out this week" : `+${POLISH_GAIN} · $${POLISH_COST}`, `polishCategory('${item.cat}')`, blocked, "", "width:100%;background:rgba(168,132,221,0.15);border-color:rgba(168,132,221,0.6);color:var(--purple-bright)")}`,

                      const p = item.part;
                      const activeTask = findActiveTask(car.id, p.id);
                      const starterFree =
                        state.starterHelpReceived &&
                        p.id === 2 &&

                      const diyCost = starterFree ? 0 : partCost(p, "diy");

                      const diyLabel = `${item.recommendedMethod === "diy" ? "★ " : ""}Start DIY · $${fmt(diyCost)}`;
                      const shopLabel = `${item.recommendedMethod === "shop" ? "★ " : ""}Send to Shop · $${fmt(shopCost)}`;
                      const blockNote = activeTasksByMethod(car.id, "shop").length

                      return panel(
                        `${p.name}${starterFree ? ` <span class="badge" style="color:var(--green)">NEIGHBOR GIFT</span>` : ""}`,
                        `<div class="small muted" style="margin-bottom:10px;line-height:1.55">${item.why}</div>
                         <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px"><span class="smart-tag">${item.tag}</span><span class="tiny good" style="font-weight:bold">+${p.imp} ${CAT_LABELS[p.category]}</span></div>

                           : `<div class="btn-row two">${button(diyLabel, `installPart(${p.id},'diy',false)`, diyBlocked, "", "width:100%;")}${button(shopLabel, `installPart(${p.id},'shop',false)`, shopBlocked, "", "width:100%;background:#7da0c2;border-color:var(--blue-bright);")}</div>${blockNote ? `<div class="tiny muted" style="margin-top:8px">${blockNote}</div>` : ""}`
                         }`,
                        `${p.tier} · ${CAT_LABELS[p.category]}`,
                        item.recommendedMethod === "diy"
                          ? "#87c77b"
                          : "#7da0c2",
                      );
                    })
                    .join("")
                : `<div class="small muted">Nothing left to suggest right now. Either the car is maxed out or everything is already in progress.</div>`
            }`,
            "Three smartest next restoration activities based on roadworthy needs, show readiness, and value.",
            "#d8a24f",
          )}`;
        }

        if (state.shopSub === "parts") {
          const avail = PARTS.filter(
            (p) =>
              p.category === state.shopCat &&
              !car.installedParts.includes(p.id),
          );
          // Fine-tuning card for the active category — appears once every part
          // in this silo is installed. Replaces the old standalone Fine Tuning
          // panel so the polish action lives next to the parts that earn it.
          const tuneStatus = getCategoryCompletion(car, state.shopCat);
          let fineTuneMarkup = "";
          if (tuneStatus && tuneStatus.allDone) {
            const action = POLISH_ACTIONS[state.shopCat] || { verb: "Polish", emoji: "✨" };
            const remaining = Math.max(0, POLISH_PER_WEEK - (state.polishesThisWeek || 0));
            const maxed = tuneStatus.current >= 100;
            const blocked = maxed || remaining <= 0 || state.money < POLISH_COST;
            const sub = maxed
              ? "Maxed out. Concours-clean."
              : remaining <= 0
                ? `No fine-tuning sessions left this week (${POLISH_PER_WEEK}/${POLISH_PER_WEEK} used). Resets next week.`
                : `${remaining}/${POLISH_PER_WEEK} sessions left this week. +${POLISH_GAIN} per pass.`;
            fineTuneMarkup = `<div class="info-box" style="background:rgba(168,132,221,0.06);border-color:rgba(168,132,221,0.45);margin-bottom:14px"><div class="flex between center" style="gap:10px;margin-bottom:6px"><div><div class="small" style="color:var(--purple-bright);font-weight:bold">${action.emoji} ${action.verb} · pre-show polish</div><div class="tiny muted" style="margin-top:2px">${sub}</div></div><div style="min-width:140px">${button(maxed ? "Maxed" : `+${POLISH_GAIN} · $${POLISH_COST}`, `polishCategory('${state.shopCat}')`, blocked, "", "width:100%;padding:7px 8px;font-size:12px")}</div></div></div>`;
          }
          subcontent = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">${CATS.map((cat) => tab(`${CAT_ICONS[cat]} ${CAT_LABELS[cat]}`, state.shopCat === cat, `setShopCat('${cat}')`)).join("")}</div><div class="small muted" style="margin-bottom:10px">${CAT_LABELS[state.shopCat]} score: <span style="color:#f0d4a0;font-weight:bold">${car[state.shopCat]}</span></div><div class="tiny muted" style="margin-bottom:12px">DIY requires the listed tools. Sending it to the shop skips tool ownership, but costs more.</div>${fineTuneMarkup}${avail.length === 0 ? panel("Completed", `<div class="small muted">Every ${CAT_LABELS[state.shopCat].toLowerCase()} service is done on this car.</div>`, "", "#87c77b") : ""}${avail
            .map((p) => {
              const rq = p.tools || [];
              const miss = rq.filter((tid) => !state.ownedTools.includes(tid));
              const activeTask = findActiveTask(car.id, p.id);
              const hasAll = miss.length === 0;
              const dc = partCost(p, "diy");
              const sc = partCost(p, "shop");
              const disc = getDiscount(p);
              const maxed = car[p.category] >= 100;
              const starterFree =
                state.starterHelpReceived &&
                p.id === 2 &&
                !state.starterCarbUsed;
              const title = `${p.name}${disc > 0 ? ` <span class="badge" style="color:var(--gold)">-${Math.round(disc * 100)}%</span>` : ""}${starterFree ? ` <span class="badge" style="color:var(--green)">NEIGHBOR GIFT</span>` : ""}`;
              return panel(
                title,
                `<div class="small muted" style="margin-bottom:8px">Improvement: <span class="good" style="font-weight:bold">+${p.imp} ${CAT_LABELS[state.shopCat]}</span></div><div class="info-box"><div class="tiny muted" style="margin-bottom:6px">DIY tool requirements</div>${rq
                  .map((tid) => {
                    const t = TOOLS_LIST.find((t) => t.id === tid);
                    const owned = state.ownedTools.includes(tid);
                    const can = canOwnTool(t);
                    return `<div class="tiny" style="color:${owned ? "#9fd18e" : "#d38a76"};margin-bottom:6px">${t?.emoji} ${t?.name} ${owned ? "✓" : button(`Buy Tool ($${fmt(t.cost)})`, `buyTool('${tid}')`, !can.ok, "", "margin-left:8px;padding:4px 8px;font-size:11px")}</div>`;
                  })
                  .join(
                    "",
                  )}</div>${activeTask ? `<div class="info-box" data-task-id="${activeTask.id}"><div class="small" style="color:var(--text-bright);font-weight:bold;margin-bottom:6px">Already in progress</div>${gauge("", Math.round(getRestorationProgress(activeTask) * 100), 100, "#7da0c2")}<div class="tiny muted task-status" style="margin-top:6px">${Date.now() >= activeTask.finishTime ? "Completing now…" : `${formatRemaining(activeTask.finishTime - Date.now())} remaining`}</div></div>` : `<div class="btn-row ${state.freePart && p.tier === "Budget" && !maxed ? "three" : "two"}">${button(maxed ? "Maxed" : `Start DIY · $${fmt(starterFree ? 0 : dc)}`, `installPart(${p.id},'diy',false)`, !hasAll || state.money < (starterFree ? 0 : dc) || maxed || activeTasksByMethod(car.id, "shop").length)}${button(maxed ? "Maxed" : `Send to Shop · $${fmt(starterFree ? 0 : sc)}`, `installPart(${p.id},'shop',false)`, state.money < (starterFree ? 0 : sc) || maxed || activeTasksByMethod(car.id, "diy").length, "", "background:#7da0c2;border-color:var(--blue-bright)")}${state.freePart && p.tier === "Budget" && !maxed ? button("Sponsored · FREE", `installPart(${p.id},'shop',true)`, false, "", "background:#a47ed4;border-color:var(--purple-bright)") : ""}</div>`}`,
                `${p.tier} · ${p.desc}`,
                tierCol(p.tier),
              );
            })
            .join("")}`;
        }

        if (state.shopSub === "tools") {
          const availableTools = TOOLS_LIST.filter(
            (t) =>
              (state.toolCat === "all" || t.cat === state.toolCat) &&
              !state.ownedTools.includes(t.id),
          );
          const storage = toolStorageData();
          subcontent = `<div class="info-box" style="margin-bottom:12px"><div class="small" style="color:var(--text-bright);font-weight:bold;margin-bottom:4px">Capacity: ${state.ownedTools.length} / ${storage.maxTools} tools</div><div class="tiny muted">Need more space or a faster shop? See the Space &amp; Storage tab.</div></div><div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">${tab("All", state.toolCat === "all", "setToolCat('all')")}${TOOL_CATEGORIES.map((cat) => tab(`${cat.emoji} ${cat.label}`, state.toolCat === cat.id, `setToolCat('${cat.id}')`)).join("")}</div>${
            availableTools.length
              ? availableTools
                  .map((t) => {
                    const can = canOwnTool(t);
                    const parts = PARTS.filter((p) =>
                      (p.tools || []).includes(t.id),
                    ).map((p) => p.name);
                    const rw = WORKSPACE_LEVELS.find(
                      (w) => w.id === t.workshop,
                    );
                    return panel(
                      t.name,
                      `<div class="small muted" style="margin-bottom:10px">Category: ${TOOL_CATEGORIES.find((c) => c.id === t.cat)?.label} <span style="color:var(--gold);margin-left:10px">Requires: ${rw?.name}</span></div><div class="tiny" style="color:#8e8473;margin-bottom:12px">Enables: ${parts.length ? `${parts.slice(0, 3).join(", ")}${parts.length > 3 ? ` +${parts.length - 3} more` : ""}` : ""}</div><div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center"><div style="color:var(--text);font-weight:bold">$${fmt(t.cost)}</div><div style="min-width:140px" title="${can.ok ? "" : can.msg}">${button("Buy Tool", `buyTool('${t.id}')`, false, "", can.ok ? "width:100%" : "width:100%;opacity:0.55;cursor:not-allowed;filter:grayscale(0.4)")}</div></div>${!can.ok ? `<div class="tiny warn" style="margin-top:8px;font-weight:bold">⚠️ ${can.msg}</div>` : ""}`,
                      t.desc,
                      "#d8a24f",
                    );
                  })
                  .join("")
              : panel(
                  "Sold Out",
                  `<div class="small muted">Everything currently available here has already been hauled back to the shop.</div>`,
                  "",
                  "#87c77b",
                )
          }`;
        }

        if (state.shopSub === "workspace") {
          const storage = toolStorageData();
          const nextStorage = nextToolStorage();
          subcontent = `${panel(
            "Tool Storage",
            `${chalkRow("Current Storage", storage.name)}${chalkRow("Capacity", `${state.ownedTools.length} / ${storage.maxTools}`)}${chalkRow("Speed Bonus", `${Math.round(storage.speedBonus * 100)}% faster restorations`)}${nextStorage ? button(`Upgrade Storage · $${fmt(nextStorage.cost)}`, "upgradeToolStorage()", state.money < nextStorage.cost, "", "width:100%;margin-top:10px;background:#7da0c2;border-color:var(--blue-bright)") : "<div class='good small'>Top shelf storage installed.</div>"}`,
            storage.desc,
            "#7da0c2",
          )}${panel(
            "Work Space Progression",
            `${WORKSPACE_LEVELS.map((w, i) => {
              const current = state.workshopLevel === w.id;
              const unlocked = i <= workshopIdx();
              const upcoming = i === workshopIdx() + 1;
              // Hide old workspaces the player has already moved past — only show current and what's ahead
              if (unlocked && !current) return "";
              return panel(
                `${w.emoji} ${w.name}`,
                `<div class="flex between center" style="gap:10px"><div class="small muted">Active restorations: ${w.maxActive}</div><div style="min-width:150px">${current ? `<div class="good" style="font-weight:bold;text-align:right">CURRENT</div>` : upcoming ? button(`Upgrade · $${fmt(w.cost)}`, "upgradeWorkspace()", state.money < w.cost) : `<div class="tiny" style="color:#72695d;text-align:right">Locked</div>`}</div></div>`,
                w.desc,
                current ? "#9fd18e" : "#d8a24f",
              );
            }).join("")}`,
            "Bigger spaces let you run more restorations at once.",
            "#d8a24f",
          )}`;
        }

        return `<div class="grid-main"><div>${heroPanel(
          "Auto Shop Floor",
          "Every bolt, every part, one at a time",
          "Pick the next job. Track what's running. Keep the shop moving.",
          `${carPreview(car)}${(() => {
            const rw = roadworthy(car);
            const engineGap = Math.max(0, ROADWORTHY_ENGINE - car.engine);
            const transGap = Math.max(0, ROADWORTHY_TRANSMISSION - car.transmission);
            const brakeGap = Math.max(0, ROADWORTHY_BRAKES - car.brakes);
            if (rw) {
              // Once the player has taken any car to its first show,
              // the 'Roadworthy · Time to compete' banner has done its
              // job. Hide it to give the Build tab back the space.
              if ((state.history || []).length > 0) return "";
              return `<div style="display:flex;align-items:center;gap:10px;background:rgba(143,203,126,0.1);border:1px solid rgba(143,203,126,0.4);border-radius:8px;padding:9px 12px;margin-bottom:12px"><span style="font-size:18px">✅</span><div><div class="small" style="color:var(--green-bright);font-weight:bold">Roadworthy</div><div class="tiny muted">The car can drive itself to a show. Time to compete.</div></div></div>`;
            }
            return `<div style="display:flex;align-items:center;gap:10px;background:rgba(196,109,96,0.08);border:1px solid rgba(196,109,96,0.4);border-radius:8px;padding:9px 12px;margin-bottom:12px"><span style="font-size:18px">⚠️</span><div style="flex:1"><div class="small" style="color:var(--red-bright);font-weight:bold;margin-bottom:2px">Not roadworthy yet</div><div class="tiny muted">Engine ${car.engine}/${ROADWORTHY_ENGINE}${engineGap ? " (need +" + engineGap + ")" : " ✓"} · Trans ${car.transmission}/${ROADWORTHY_TRANSMISSION}${transGap ? " (need +" + transGap + ")" : " ✓"} · Brakes ${car.brakes}/${ROADWORTHY_BRAKES}${brakeGap ? " (need +" + brakeGap + ")" : " ✓"}</div></div></div>`;
          })()}<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">${tab(roadworthy(car) ? "Next Jobs" : "Let's Get Roadworthy", state.shopSub === "suggested", "setShopSub('suggested')")}${tab("All Build Jobs", state.shopSub === "parts", "setShopSub('parts')")}${tab("Tools", state.shopSub === "tools", "setShopSub('tools')")}${tab("Space & Storage", state.shopSub === "workspace", "setShopSub('workspace')")}</div>${state.freePart && state.shopSub !== "parts" ? `<div onclick="setShopSub('parts')" style="cursor:pointer;background:#291b36;border:1px solid #6f4d91;border-radius:8px;padding:10px 12px;margin-bottom:12px;color:var(--purple-bright);font-size:12px;display:flex;justify-content:space-between;align-items:center"><span>📦 Free Budget part ready — tap to jump to All Build Jobs.</span><span style="opacity:0.7">→</span></div>` : ""}${state.freePart && state.shopSub === "parts" ? `<div style="background:#291b36;border:1px solid #6f4d91;border-radius:8px;padding:10px 12px;margin-bottom:12px;color:var(--purple-bright);font-size:12px">📦 Free Budget part ready — claim it on any Budget tier item below.</div>` : ""}${subcontent}`,
        )}</div><div>${renderUpcomingBar()}${renderRestorationPanel(car)}${panel("Shop Notes", `${chalkRow("Work Space", workspaceData().name)}${chalkRow("Active Jobs", `${activeTasksForCar(car.id).length} / ${workspaceData().maxActive}`)}${chalkRow("Tool Storage", `${toolStorageData().name} · ${state.ownedTools.length}/${toolStorageData().maxTools}`)}${chalkRow("Storage Speed", `${Math.round(toolStorageData().speedBonus * 100)}% faster`)}${chalkRow("Roadworthy", roadworthy(car) ? "Yes" : "Not yet", roadworthy(car) ? "good" : "warn")}${chalkRow("Fuel", `${state.fuel}/${MAX_FUEL}`)}${chalkRow("Current Week", `${state.week}/${state.seasonLength}`)}`, "", "#7da0c2")}</div></div>`;
      }

      function renderShows() {
        const car = currentCar();
        if (!car) return renderNoCar();
        const shows = getCurrentShows();
        const fillAmount = MAX_FUEL - state.fuel;
        const showPrepBoard = heroPanel(
          "Show Prep Board",
          "Load the truck, check the fuel, roll it out",
          "Every show the car runs is one more story on the build.",
          `${carPreview(car)}${panel("Travel & Fuel", `<div class="info-box"><div style="margin-bottom:10px">${gauge("Fuel Tank", state.fuel, MAX_FUEL, "#7da0c2")}</div><div class="btn-row two"><button class="btn" onclick="buyFuel(5)" ${state.money < 5 * FUEL_PRICE || state.fuel >= MAX_FUEL ? "disabled" : ""}>Buy 5 Gal ($20)</button><button class="btn" style="background:#7da0c2;border-color:var(--blue-bright)" onclick="buyFuel(${fillAmount})" ${fillAmount <= 0 || state.money < fillAmount * FUEL_PRICE ? "disabled" : ""}>Fill Tank ($${fmt(fillAmount * FUEL_PRICE)})</button></div></div>`, "", "#7da0c2")}<div class="cards">${shows
            .map((show) => {
              const progressReq = showProgressRequirement(show);
              const locked = getOverall(car) < show.minScore || !progressReq.ok;
              const fuelNeed = show.fuel;
              const localSponsor = activeSponsors().find(
                (s) => s.freeLocalEntry && show.tier === "Local",
              );
              const entryFee = localSponsor ? 0 : show.fee;
              const off =
                locked ||
                !roadworthy(car) ||
                state.money < entryFee ||
                state.fuel < fuelNeed ||
                show.weeksUntil !== 0 ||
                show.enteredThisWeek ||
                state.showLoading ||
                hasActiveRestorations(car.id);
              const tc =
                show.tier === "National"
                  ? "#d8a24f"
                  : show.tier === "Regional"
                    ? "#7da0c2"
                    : show.tier === "Cars & Coffee"
                      ? "#c58f58"
                      : "#a79a86";
              let bonus = 0;
              activeSponsors().forEach((s) => {
                if (s.cashPerShow) bonus += s.cashPerShow;
              });
              const rivalLine =
                show.tier === "Regional" || show.tier === "National"
                  ? `<div class="tiny" style="color:var(--red-bright);margin-bottom:8px">🏎 Buck's '67 Stallion will be there · current score ~${getRivalBaseScore()}</div>`
                  : "";
              // Show-prep checklist — every requirement gets a ✓ or ✗
              // so the player sees at a glance what's blocking entry.
              const checks = [];
              if (show.tier !== "Cars & Coffee") {
                checks.push({
                  ok: getOverall(car) >= show.minScore,
                  pass: `${show.minScore}+ overall ✓`,
                  fail: `${show.minScore}+ overall (${getOverall(car)} now)`,
                });
              }
              checks.push({
                ok: roadworthy(car),
                pass: "Roadworthy ✓",
                fail: "Not roadworthy yet",
              });
              checks.push({
                ok: state.fuel >= fuelNeed,
                pass: `${fuelNeed} gal fuel ✓`,
                fail: `${fuelNeed} gal fuel (have ${state.fuel})`,
              });
              if (entryFee > 0) {
                checks.push({
                  ok: state.money >= entryFee,
                  pass: `$${fmt(entryFee)} entry ✓`,
                  fail: `$${fmt(entryFee)} entry (have $${fmt(state.money)})`,
