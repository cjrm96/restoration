<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Guy Simulator</title>
    <style>
      :root {
        --bg: #17120f;
        --panel: #241d17;
        --panel-2: #1b1511;
        --panel-3: #2d241d;
        --line: #4b4036;
        --text: #efe2c6;
        --text-bright: #f2e6cf;
        --text-dim: #8f8476;
        --muted: #a99b84;
        --gold: #d19a3f;
        --gold-soft: #c9aa73;
        --blue: #7da0c2;
        --blue-bright: #95b5d4;
        --green: #8fcb7e;
        --green-bright: #9fd18e;
        --red: #c46d60;
        --red-bright: #e07070;
        --purple: #a984dd;
        --purple-bright: #bca0e5;
        --brown: #7e5c34;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Georgia, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla", EmojiOne, serif;
        color: var(--text);
        background:
          linear-gradient(
            180deg,
            rgba(17, 13, 10, 0.88) 0%,
            rgba(13, 10, 8, 0.95) 100%
          ),
          repeating-linear-gradient(
            90deg,
            rgba(90, 64, 40, 0.22) 0px,
            rgba(90, 64, 40, 0.22) 6px,
            transparent 6px,
            transparent 78px
          ),
          linear-gradient(180deg, #56483a 0%, #302721 45%, #1f1915 100%);
        min-height: 100vh;
      }
      .app {
        max-width: 1240px;
        margin: 0 auto;
        padding: 18px;
      }
      .shell {
        background: linear-gradient(180deg, #2a231d 0%, #1c1713 100%);
        border: 1px solid #51453a;
        border-radius: 14px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      }
      .topbar {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        border-radius: 14px 14px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        background: linear-gradient(180deg, #312922 0%, #241d17 100%);
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .brand {
        color: var(--gold);
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 0.3px;
      }
      .beta-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 1.5px;
        color: #1a120a;
        background: linear-gradient(180deg, #d8a24f 0%, #b6822f 100%);
        border: 1px solid #e8c075;
        padding: 2px 7px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.18);
        box-shadow: 0 1px 4px rgba(217, 162, 79, 0.3);
        position: relative;
        top: -2px;
      }
      .subbrand {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }
      .top-stats {
        display: flex;
        gap: 0;
        align-items: center;
        flex-wrap: wrap;
      }
      .chip {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 6px 14px;
        font-weight: 600;
        font-size: 13px;
        color: var(--text);
        white-space: nowrap;
        transition:
          transform 0.12s ease,
          color 0.12s ease;
      }
      .chip + .chip {
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }
      .top-stats .btn,
      .top-stats .audio-toggle {
        margin-left: 8px;
      }
      .chip.money {
        color: var(--gold);
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 0.3px;
      }
      .chip.fuel {
        color: #c8d4dd;
      }
      .chip.followers {
        color: #d6c4ea;
      }
      .chip.pay {
        color: var(--text-dim);
        font-weight: 500;
      }
      .chip.week {
        color: #e8d8b2;
      }
      .btn {
        background: var(--gold);
        color: #18120f;
        border: 1px solid #e0b565;
        border-radius: 8px;
        padding: 9px 12px;
        cursor: pointer;
        font-weight: bold;
        font-family: inherit;
        transition:
          transform 0.08s ease,
          box-shadow 0.12s ease,
          filter 0.12s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
        filter: brightness(1.03);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn:disabled {
        background: #2d2722;
        color: #6d6458;
        border-color: #40372f;
        cursor: not-allowed;
      }
      .tabs,
      .car-tabs {
        padding: 10px 14px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        border-bottom: 1px solid #40362d;
        background: #241d17;
      }
      .car-tabs {
        background: #201915;
      }
      .tab {
        padding: 10px 14px;
        background: #312821;
        color: #b2a48a;
        border: 1px solid #4a3e34;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        white-space: nowrap;
        position: relative;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .tab.active {
        background: #9c6f3d;
        color: #fff7e0;
        border-color: var(--gold);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 0 0 1px rgba(217, 162, 79, 0.45),
          0 2px 8px rgba(217, 162, 79, 0.35);
      }
      .tab.active::after {
        content: "";
        position: absolute;
        left: 14%;
        right: 14%;
        bottom: -7px;
        height: 3px;
        background: var(--gold);
        border-radius: 2px;
        box-shadow: 0 0 6px rgba(217, 162, 79, 0.7);
      }
      .content {
        min-height: calc(100vh - 180px);
        padding: 18px;
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.08) 0%,
            rgba(0, 0, 0, 0.22) 100%
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0px,
            transparent 64px,
            rgba(255, 255, 255, 0.015) 64px,
            rgba(255, 255, 255, 0.015) 65px
          ),
          linear-gradient(180deg, #6a6256 0%, #433c33 100%);
      }
      .grid-main {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
        gap: 16px;
      }
      .grid-main-shows {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(340px, 0.95fr);
        gap: 16px;
      }
      .panel {
        background: linear-gradient(180deg, #2b241e 0%, #1f1a16 100%);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 14px;
        box-shadow:
          0 4px 18px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        transition:
          box-shadow 0.15s ease,
          border-color 0.15s ease;
      }
      .panel-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        margin-bottom: 12px;
        border-bottom: 1px dashed #574b3f;
        padding-bottom: 8px;
      }
      .panel-title {
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 0.3px;
      }
      .panel-sub {
        color: #9d927e;
        font-size: 11px;
        margin-top: 2px;
      }
      .dots {
        display: flex;
        gap: 6px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #6e6357;
      }
      .flex {
        display: flex;
      }
      .between {
        justify-content: space-between;
      }
      .center {
        align-items: center;
      }
      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 12px;
      }
      .tiny {
        font-size: 11px;
      }
      .gauge-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 11px;
        color: #b5a994;
      }
      .gauge-wrap {
        height: 12px;
        background: #171411;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.35);
      }
      .gauge-fill {
        height: 100%;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 5px 0;
        font-size: 12px;
      }
      .row-k {
        color: #b4ab96;
      }
      .row-v {
        font-weight: bold;
        color: #ece2cd;
        text-align: right;
      }
      .good {
        color: var(--green-bright);
      }
      .warn {
        color: #d9a65d;
      }
      .bad {
        color: #d38a76;
      }
      .cards {
        display: grid;
        gap: 12px;
      }
      .btn-row {
        display: grid;
        gap: 8px;
      }
      .btn-row.two {
        grid-template-columns: 1fr 1fr;
      }
      .btn-row.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .info-box {
        background: #181410;
        border: 1px solid #423830;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 12px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 999px;
        background: #2d2d2d;
        margin-left: 6px;
      }
      .show-prizes {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .show-prize {
        background: #1b1714;
        border: 1px solid #433a32;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 11px;
        color: #ddcfb8;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--text-bright);
        padding: 11px 20px;
        border-radius: 8px;
        z-index: 999;
        font-size: 14px;
        text-align: center;
        max-width: 460px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      }
      .toast.ok {
        background: #1f3a24;
        border: 1px solid #7aad6c;
      }
      .toast.err {
        background: #4d1f19;
        border: 1px solid #b85b4f;
      }
      .toast.event-good {
        background: #1a2f3a;
        border: 1px solid #5a9ab8;
      }
      .toast.event-bad {
        background: #3a1f10;
        border: 1px solid #c4723a;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overscroll-behavior: contain;
      }
      .modal-card {
        width: 100%;
        max-width: 440px;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        overscroll-behavior: contain;
        background: linear-gradient(180deg, #2b241e 0%, #1d1814 100%);
        border: 1px solid #5a4b3d;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }
      .close-x {
        background: none;
        border: none;
        color: #b4a790;
        cursor: pointer;
        font-size: 22px;
      }
      input[type="range"] {
        width: 100%;
      }
      .car-preview-wrap {
        position: relative;
        background: #161311;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 14px;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        overflow: hidden;
      }
      .art-backdrop-shell {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        height: 210px;
        min-height: 210px;
        background: linear-gradient(180deg, #191411 0%, #110d0a 100%);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .art-backdrop-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        pointer-events: none;
        background: transparent;
      }
      .art-backdrop-shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(8, 6, 5, 0.08) 0%, rgba(8, 6, 5, 0.22) 55%, rgba(8, 6, 5, 0.34) 100%);
        pointer-events: none;
      }
      .car-preview-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        pointer-events: none;
      }
      .car-preview-stage svg {
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 100%;
        height: 100%;
        z-index: 2;
        display: block;
      }
      .social-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      /* Milestone checkboxes */
      .milestone-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        background: #181410;
        border: 1px solid #3a322a;
        transition: border-color 0.3s;
      }
      .milestone-item.done {
        border-color: #4a7a3f;
        background: #161e14;
      }
      .milestone-check {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #4a4036;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .milestone-item.done .milestone-check {
        background: #4a7a3f;
        border-color: #6ab05a;
      }
      /* Rival badge */
      .rival-badge {
        display: inline-block;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: #3a1a1a;
        border: 1px solid #8b4040;
        color: var(--red-bright);
        margin-left: 6px;
      }

      .guide-step {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed #493d32;
      }
      .guide-step:last-child {
        border-bottom: none;
      }
      .smart-tag {
        display: inline-block;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #201913;
        border: 1px solid #6a583f;
        color: #f0dec0;
        margin-bottom: 8px;
      }
      .shake-lite {
        animation: shakeLite 0.32s ease;
      }
      .money-pop {
        animation: moneyPop 0.35s ease;
      }
      .toast {
        animation: toastIn 0.2s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
      @keyframes pulseGlow {
        0%,
        100% {
          box-shadow: 0 0 0 rgba(209, 154, 63, 0);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(209, 154, 63, 0.12);
        }
      }
      @keyframes shakeLite {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-2px);
        }
        75% {
          transform: translateX(2px);
        }
      }
      @keyframes moneyPop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes showBeatIn {
        0% {
          opacity: 0;
          transform: translateY(8px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes revealPop {
        0% {
          opacity: 0;
          transform: scale(0.6);
        }
        60% {
          opacity: 1;
          transform: scale(1.08);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .show-beat {
        animation: showBeatIn 0.32s ease-out;
      }
      .reveal-pop {
        animation: revealPop 0.55s cubic-bezier(0.2, 1.2, 0.4, 1);
      }
      .judging-line {
        opacity: 0;
        animation: showBeatIn 0.4s ease-out forwards;
        margin-bottom: 12px;
      }
      .judging-line:last-child {
        margin-bottom: 0;
      }
      .judging-stack {
        padding: 12px 14px;
      }

      .tutorial-modal {
        max-width: 620px !important;
        background:
          radial-gradient(
            ellipse at top,
            rgba(209, 154, 63, 0.12) 0%,
            transparent 60%
          ),
          linear-gradient(180deg, #221911 0%, #14100d 100%) !important;
        border: 1px solid var(--gold) !important;
        box-shadow:
          0 0 0 1px rgba(209, 154, 63, 0.18) inset,
          0 24px 60px rgba(0, 0, 0, 0.7),
          0 0 80px rgba(209, 154, 63, 0.08) !important;
        padding: 0 !important;
        overflow: hidden;
      }
      .tutorial-progress {
        display: flex;
        gap: 6px;
        padding: 14px 22px 0;
        margin-bottom: 0;
      }
      .tutorial-progress-pip {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(209, 154, 63, 0.18);
        transition: background 0.25s;
      }
      .tutorial-progress-pip.active {
        background: var(--gold);
        box-shadow: 0 0 8px rgba(209, 154, 63, 0.6);
      }
      .tutorial-progress-pip.done {
        background: rgba(209, 154, 63, 0.55);
      }
      .tutorial-body {
        padding: 28px 36px 28px;
        text-align: center;
      }
      .tutorial-kicker {
        font-size: 11px;
        letter-spacing: 2.4px;
        color: var(--gold);
        font-weight: bold;
        margin-bottom: 14px;
        text-transform: uppercase;
      }
      .tutorial-art {
        font-size: 64px;
        line-height: 1;
        margin: 4px 0 18px;
        filter: drop-shadow(0 4px 12px rgba(209, 154, 63, 0.25));
      }
      .tutorial-headline {
        font-size: 26px;
        font-weight: bold;
        color: var(--text-bright);
        line-height: 1.25;
        margin: 0 0 14px;
        letter-spacing: 0.3px;
      }
      .tutorial-body-text {
        font-size: 14px;
        line-height: 1.7;
        color: var(--text);
        margin: 0 auto 22px;
        max-width: 460px;
      }
      .tutorial-points {
        text-align: left;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(75, 64, 54, 0.55);
        border-radius: 8px;
        padding: 14px 18px;
        margin: 0 auto 22px;
        max-width: 460px;
      }
      .tutorial-point {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 13px;
        line-height: 1.55;
        color: var(--text);
        margin-bottom: 8px;
      }
      .tutorial-point:last-child {
        margin-bottom: 0;
      }
      .tutorial-point-icon {
        flex-shrink: 0;
        font-size: 16px;
        line-height: 1.4;
      }
      .tutorial-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        padding: 0 36px 28px;
      }
      .tutorial-primary {
        appearance: none;
        font-family: inherit;
        background: linear-gradient(180deg, #e0a955 0%, #b6802e 100%);
        color: #1a120a;
        font-weight: bold;
        font-size: 15px;
        letter-spacing: 0.4px;
        border: 1px solid #f0c478;
        border-radius: 8px;
        padding: 13px 28px;
        cursor: pointer;
        min-width: 240px;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18) inset,
          0 6px 16px rgba(209, 154, 63, 0.28);
        transition: transform 0.12s, box-shadow 0.12s;
      }
      .tutorial-primary:hover {
        transform: translateY(-1px);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.22) inset,
          0 8px 22px rgba(209, 154, 63, 0.36);
      }
      .tutorial-primary:active {
        transform: translateY(0);
      }
      .tutorial-skip {
        appearance: none;
        background: none;
        border: none;
        font-family: inherit;
        color: var(--text-dim);
        font-size: 11px;
        letter-spacing: 0.5px;
        cursor: pointer;
        padding: 6px 12px;
        text-transform: uppercase;
        transition: color 0.15s;
      }
      .tutorial-skip:hover {
        color: var(--muted);
        text-decoration: underline;
      }

      .victory-modal {
        max-width: 640px !important;
        background:
          radial-gradient(
            ellipse at top,
            rgba(209, 154, 63, 0.22) 0%,
            transparent 62%
          ),
          linear-gradient(180deg, #2a1f13 0%, #140e08 100%) !important;
        border: 1px solid var(--gold) !important;
        box-shadow:
          0 0 0 1px rgba(209, 154, 63, 0.25) inset,
          0 26px 80px rgba(0, 0, 0, 0.75),
          0 0 120px rgba(209, 154, 63, 0.18) !important;
        padding: 0 !important;
        overflow: hidden;
      }
      .victory-kicker {
        text-align: center;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--gold);
        font-weight: bold;
        padding: 22px 24px 0;
        text-transform: uppercase;
      }
      .victory-trophy {
        text-align: center;
        font-size: 92px;
        line-height: 1;
        margin: 8px 0 4px;

      }

      .world-ticker {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        min-height: 52px;
        background:
          linear-gradient(180deg, rgba(36, 29, 23, 0.98) 0%, rgba(14, 11, 7, 0.98) 100%);
        border-top: 1px solid var(--gold);
        box-shadow:
          0 -1px 0 rgba(209, 154, 63, 0.25) inset,
          0 -8px 24px rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        padding: 0 18px;
        z-index: 60;
        transition: min-height 0.25s ease, opacity 0.2s;
        backdrop-filter: blur(6px);

      .world-ticker[hidden] {
        display: none;

      .world-ticker.collapsed {
        min-height: 26px;
        padding: 0 14px;

        opacity: 0.55;
        font-size: 10px;
        letter-spacing: 1.2px;
        text-transform: uppercase;

      .world-ticker.collapsed .world-ticker-source {
        display: none;
      }
      .world-ticker-inner {

        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        overflow: hidden;
        cursor: default;

        flex-shrink: 0;
        font-size: 10px;
        letter-spacing: 1.6px;

        font-weight: bold;
        text-transform: uppercase;
        padding: 5px 10px;
        border: 1px solid rgba(209, 154, 63, 0.45);
        border-radius: 4px;
        background: rgba(209, 154, 63, 0.06);
        white-space: nowrap;

        border-color: rgba(168, 132, 221, 0.45);
        background: rgba(168, 132, 221, 0.06);

        border-color: rgba(125, 160, 194, 0.45);

        border-color: rgba(143, 203, 126, 0.45);
        background: rgba(143, 203, 126, 0.06);

        font-size: 11px;
        font-weight: bold;
        color: var(--text-bright);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        white-space: nowrap;

        font-size: 13px;

        0% { opacity: 0; transform: translateY(4px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .world-ticker-toggle {
        appearance: none;
        background: transparent;
        border: 1px solid rgba(209, 154, 63, 0.3);
        color: var(--gold-soft);
        width: 24px;
        height: 24px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        line-height: 1;
        padding: 0;
        margin-left: 10px;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s;

        color: var(--gold);
        border-color: var(--gold);

        if (!c) return 0;

      function taskDurationMs(part, method) {
        let secs = TASK_SECONDS[part.tier] || 60;
        if (method === "shop") secs *= 0.6;
        if ((state.installsDone || 0) < 3) secs *= 0.07;
        return Math.round(secs * 1000 * workshopTimerModifier());
      }
      function taskWeeks(part) {

      function minuteCycle(offset = 0) {

      function rotateFromList(list, offset = 0) {

      function randomShowComment() {

      function pickFresh(pool, key, recentSize) {
        if (!Array.isArray(pool) || !pool.length) return "";
        if (!state.recentLines) state.recentLines = {};
        const cap = recentSize != null ? recentSize : Math.min(8, Math.floor(pool.length / 2));
        const recent = state.recentLines[key] || [];
        const available = pool
          .map((_, i) => i)
          .filter((i) => !recent.includes(i));
        const choices = available.length ? available : pool.map((_, i) => i);
        const idx = choices[Math.floor(Math.random() * choices.length)];
        state.recentLines[key] = [idx, ...recent].slice(0, cap);
        return pool[idx];
      }

      function pickJudgingComments(car, buckPlace, buckInShow) {
        const lines = [];
        const stats = [
          { key: "engine", val: car.engine },
          { key: "transmission", val: car.transmission },
          { key: "brakes", val: car.brakes },
          { key: "body", val: car.body },
          { key: "paint", val: car.paint },
          { key: "interior", val: car.interior },
          { key: "chrome", val: car.chrome },
        ];
        const lows = stats
          .filter((s) => s.val < 40)
          .sort((a, b) => a.val - b.val);
        const highs = stats
          .filter((s) => s.val >= 70)
          .sort((a, b) => b.val - a.val);
        if (lows.length) {
          const pool = SHOW_STAT_COMMENTS[lows[0].key];
          if (pool && pool.low) lines.push(pickFresh(pool.low, "stat:" + lows[0].key + ":low"));
        }
        if (highs.length) {
          const pool = SHOW_STAT_COMMENTS[highs[0].key];
          if (pool && pool.high) lines.push(pickFresh(pool.high, "stat:" + highs[0].key + ":high"));
        }
        if (lows.length > 1 && lines.length < 2) {
          const pool = SHOW_STAT_COMMENTS[lows[1].key];
          if (pool && pool.low) lines.push(pickFresh(pool.low, "stat:" + lows[1].key + ":low"));
        }
        while (lines.length < 3) lines.push(pickFresh(SHOW_COMMENTS, "showComments"));
        return lines.slice(0, 3);
      }

      function pickRevealReaction(place) {
        const key = REVEAL_REACTIONS[place] ? "reveal:" + place : "reveal:default";

      function getCarsAndCoffeeReward() {

        const car = currentCar();
        const hasBudgetPartLeft = !!(
          car &&
          PARTS.some(
            (p) =>

        if (toolCandidates.length && Math.random() < 0.55) {

      function getSuggestedRestorations(car) {
        if (!car) return [];
        const counts = getShowCounts();
        const roadworthyNeeded = {
          engine: Math.max(0, ROADWORTHY_ENGINE - car.engine),
          transmission: Math.max(0, ROADWORTHY_TRANSMISSION - car.transmission),
          brakes: Math.max(0, ROADWORTHY_BRAKES - car.brakes),
        };
        const nextShowTarget =
          counts.coffee < 2
            ? 0
            : counts.local < 3
              ? 40
              : counts.regional < 3
                ? 70
                : 85;
        const partPicks = PARTS.filter(
          (part) =>
            !car.installedParts.includes(part.id) &&
            !findActiveTask(car.id, part.id) &&
            car[part.category] < 100,
        ).map((part) => {
          const requiredTools = part.tools || [];
          const hasAllTools = requiredTools.every((tid) =>
            state.ownedTools.includes(tid),
          );
          const recommendedMethod = hasAllTools ? "diy" : "shop";
          const recommendedCost = partCost(part, recommendedMethod);
          const roi = part.imp / Math.max(1, recommendedCost);
          let priority = roi * 100;
          let tag = "Best ROI";
          let why = `Strong value for the money with +${part.imp} ${CAT_LABELS[part.category]}.`;
          if (roadworthyNeeded[part.category] > 0) {
            priority += 180 + part.imp;
            tag = "Fastest path to roadworthy";
            why = `This helps clear the ${CAT_LABELS[part.category].toLowerCase()} requirement to get the car legally driving to shows.`;
          } else if (getOverall(car) < nextShowTarget) {
            priority += part.imp * 4;
            tag = "Show-focused upgrade";
            why = `This pushes your overall score toward the next meaningful show threshold.`;
          } else if (
            part.category === "body" ||
            part.category === "paint" ||
            part.category === "chrome"
          ) {
            priority += 18;
            tag = "Crowd pleaser";
            why = `Cosmetic work helps the car feel more competitive once the mechanical basics are handled.`;
          }
          if (recommendedMethod === "diy") priority += 10;
          if (part.tier === "Budget") priority += 6;
          return {
            type: "part",
            part,
            recommendedMethod,
            recommendedCost,
            hasAllTools,
            priority,
            tag,
            why,
            roi,
          };
        });

        // Late-game polish picks: when a category has every part installed but
        // the score is short of 100, fine-tuning is the only path to the cap.
        const overall = getOverall(car);
        const polishPicks = CATS.map((cat) => {
          const status = getCategoryCompletion(car, cat);
          if (!status || !status.allDone || status.current >= 100) return null;
          const headroom = 100 - status.current;
          const imp = Math.min(POLISH_GAIN, headroom);
          let priority = (imp / POLISH_COST) * 100 + 12;
          let tag = "Fine-tune for the last points";
          let why = `Every part in ${CAT_LABELS[cat].toLowerCase()} is installed. Fine-tuning is the only way to push it past ${status.current} toward 100.`;
          if (status.current < overall - 2) {
            priority += 30;
            tag = "Lift the dragging score";
            why = `${CAT_LABELS[cat]} is below the rest of the build at ${status.current}/100 — fine-tuning is the only way to lift it.`;
          }
          return {
            type: "polish",
            cat,
            recommendedCost: POLISH_COST,
            priority,
            tag,
            why,
            current: status.current,
            imp,
          };
        }).filter(Boolean);

        return [...partPicks, ...polishPicks]
          .sort(
            (a, b) =>
              b.priority - a.priority ||
              (a.recommendedCost || 0) - (b.recommendedCost || 0) ||
              ((b.part && b.part.imp) || b.imp || 0) -
                ((a.part && a.part.imp) || a.imp || 0),
          )
          .slice(0, 3);
      }

      function addRemovedPartItem(part, car) {

        if (part.tier === "Show Grade") {

        } else if (part.tier === "Quality") {
          base = Math.max(80, Math.round(part.diy * 0.32));
        } else {

        state.partsInventory.push({

          sourcePart: part.name,

          tier: part.tier,
          askingPrice: Math.round(base * 1.35),
          baselineValue: base,
          listed: false,
          sold: false,
        });

      function maybeGenerateMarketplaceOffer(rollChance = 0.68) {
        if (modalBusy()) return false;
        const listed = state.partsInventory.filter((i) => i.listed && !i.sold);
        if (!listed.length || Math.random() > rollChance) return false;
        const item = listed[Math.floor(Math.random() * listed.length)];
        const buckEligible =
          state.buck &&
          state.buck.metOnce &&
          item.baselineValue >= 60 &&
          Math.random() < 0.18;
        const pool = buckEligible
          ? MARKETPLACE_BUYERS
          : MARKETPLACE_BUYERS.filter((b) => b.id !== "buck");
        const archetype = buckEligible
          ? MARKETPLACE_BUYERS.find((b) => b.id === "buck")
          : pool[Math.floor(Math.random() * pool.length)];
        const loreBonus = garageLoreDiscount();
        const toneBonus =
          item.listingTone === "firm"
            ? 0.1
            : item.listingTone === "gone"
              ? -0.08
              : item.listingTone === "trade"
                ? -0.02
                : 0;
        // Bigger audience = more eyeballs on the listing = higher offers.
        // Caps at +20% so it doesn't dominate the formula.
        const reachBonus = Math.min(0.2, (state.followers || 0) / 50000);
        const offer = Math.max(
          10,
          Math.round(
            item.baselineValue *
              (0.68 + Math.random() * 0.7 + loreBonus + toneBonus + reachBonus),
          ),
        );
        const buyerName =
          archetype.name ||
          MARKETPLACE_NAMES[
            Math.floor(Math.random() * MARKETPLACE_NAMES.length)
          ];
        const openerTemplate =
          archetype.openers[
            Math.floor(Math.random() * archetype.openers.length)
          ];
        const message = `${buyerName}: ${openerTemplate.replace(/%OFFER%/g, offer)}`;
        // "Get it Gone" tone — the player explicitly opted out of
        // negotiating. Reasonable offers auto-accept with just a
        // toast; lowballs walk away silently. Keeps mid/late game
        // from drowning the player in offer modals when they have
        // a stash of clearance parts listed.
        if (item.listingTone === "gone") {
          if (offer >= (item.baselineValue || 0) * 0.5) {
            completeMarketplaceSale(item, offer, buyerName);
          }
          return true;
        }
        let scenario = null;
        if (archetype.id === "night")
          scenario = MARKETPLACE_SCENARIOS.find(
            (s) => s.id === "lateNightMeet",
          );
        else if (archetype.id === "trade" || archetype.id === "tradeonly")
          scenario = MARKETPLACE_SCENARIOS.find(
            (s) => s.id === "tradeOfferChaos",
          );
        else if (archetype.id === "shortcash")
          scenario = MARKETPLACE_SCENARIOS.find(
            (s) => s.id === "shortOnCash",
          );
        else if (archetype.id === "story" && Math.random() < 0.4)
          scenario = MARKETPLACE_SCENARIOS.find(
            (s) => s.id === "buddyCommentary",
          );
        else if (Math.random() < 0.18)
          scenario = MARKETPLACE_SCENARIOS.find(
            (s) => s.id === "stopCallingMe",
          );
        queueMarketplaceOffer({
          itemId: item.id,
          offer,
          buyer: buyerName,
          buyerType: archetype.id,
          buyerLore: archetype.lore || 0,
          message,
          scenario,
        });
        return true;
      }
      function respondMarketplaceOffer(accept) {
        const offer = state.pendingMarketplaceOffer;
        if (!offer) return;
        const item = state.partsInventory.find((i) => i.id === offer.itemId);
        if (!item) {
          state.pendingMarketplaceOffer = null;
          saveGame();
          requestRender("chrome");
          return;

        if (accept) {
          addGarageLore(offer.buyerLore || 0);
          if (
            offer.scenario &&
            (offer.scenario.trigger === "accept" ||
              offer.scenario.trigger === "offer")

            state.pendingScene = {
              title: offer.scenario.title,
              emoji: "📱",

                const clone = { ...choice };
                if (choice.outcome === "saleBonus")
                  clone.money = offer.offer + (choice.bonus || 0);
                if (choice.outcome === "salePenalty")
                  clone.money = offer.offer - (choice.penalty || 0);
                if (choice.outcome === "saleDone") clone.money = offer.offer;
                if (choice.outcome === "followers") clone.money = offer.offer;
                clone.onResolve = "completeMarketplaceSale";
                return clone;
              }),
              sceneType: "marketplace",
              sceneOffer: {
                itemId: item.id,
                offer: offer.offer,
                buyer: offer.buyer,
              },
            };
          } else {
            completeMarketplaceSale(item, offer.offer, offer.buyer);

        } else {

          if (Math.random() < 0.22) {
            const sc = MARKETPLACE_SCENARIOS.find(
              (s) => s.id === "wrongPartFlip",
            );
            queueScene({
              title: sc.title,
              emoji: "📦",
              text: sc.text,
              choices: sc.choices,
            });
          }
        }
        state.pendingMarketplaceOffer = null;
        processEventQueue();
        drainWeekAdvanceQueue("queued");

        requestRender("full");
      }
      function applyWinterStorageDamage() {
        if (state.winterAppliedForSeason) return;
        const car = currentCar();
        if (!car) return;
        const tier = state.workshopLevel;
        const damages = [];
        const hit = (cat, amt, label) => {
          car[cat] = clamp(car[cat] - amt);
          damages.push(`${label} -${amt}`);
        };
        if (tier === "curb") {
          hit("body", 8, "Rust crept into the body");
          hit("paint", 6, "Paint weathered");
          hit("chrome", 4, "Trim oxidized");
        } else if (tier === "carport") {
          hit("body", 4, "Moisture tagged the body");
          hit("paint", 3, "Finish dulled");
        } else if (tier === "storage") {
          hit("paint", 2, "Dust and damp got to the finish");
          hit("chrome", 2, "Trim spotted up");
        } else if (tier === "garage") {
          hit("engine", 1, "A heater hose cracked over winter");
        } else {
          hit("engine", 1, "A tiny hose dried out in storage");
        }
        state.winterStorageReport = damages;
        state.winterAppliedForSeason = true;
      }
      function formatRemaining(ms) {
        const total = Math.max(0, Math.ceil(ms / 1000));
        const h = String(Math.floor(total / 3600)).padStart(2, "0");
        const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
        const s = String(total % 60).padStart(2, "0");
        return `${h}:${m}:${s}`;
      }
      function getRestorationProgress(task) {
        const total = Math.max(1, task.finishTime - task.startTime);
        const done = Math.min(total, Math.max(0, Date.now() - task.startTime));
        return Math.max(0, Math.min(1, done / total));
      }
      function getRivalBaseScore() {
        return Math.min(
          95,
          Math.round(
            32 + (state.week - 1) * 2.5 + state.rival.showsEntered * 1.5,
          ),
        );
      }
      function getShowCounts() {
        return {
          coffee: state.history.filter((h) => h.tier === "Cars & Coffee")
            .length,
          local: state.history.filter((h) => h.tier === "Local").length,
          regional: state.history.filter((h) => h.tier === "Regional").length,
          national: state.history.filter((h) => h.tier === "National").length,
        };
      }
      function showProgressRequirement(show) {
        const counts = getShowCounts();
        if (show.tier === "Local" && counts.coffee < 2) {
          return {
            ok: false,
            msg: `Need 2 Cars & Coffee events completed (${counts.coffee}/2).`,
          };
        }
        if (show.tier === "Regional" && counts.local < 3) {
          return {
            ok: false,
            msg: `Need 3 Local shows completed (${counts.local}/3).`,
          };
        }
        if (show.tier === "National" && counts.regional < 3) {
          return {
            ok: false,
            msg: `Need 3 Regional shows completed (${counts.regional}/3).`,
          };
        }
        return { ok: true, msg: "" };
      }

      function getCurrentShows() {
        return SHOWS_MASTER.map((show) => {
          // On-demand shows (National) aren't on a fixed schedule — once the
          // player meets the prerequisites, the show is available every week.
          // showProgressRequirement still gates entry until those reqs are met.
          let weeksUntil;
          if (show.onDemand) {
            weeksUntil = 0;
          } else {
            const offset = state.week % show.cadence;
            weeksUntil = offset === 0 ? 0 : show.cadence - offset;
          }
          return {
            ...show,
            weeksUntil,
            enteredThisWeek: state.enteredShowsThisWeek.includes(show.id),
          };
        });
      }

      function getUpcomingSummary() {
        const shows = getCurrentShows();
        const sorted = [...shows].sort(
          (a, b) => a.weeksUntil - b.weeksUntil || a.fee - b.fee,
        );
        const next = sorted[0];
        let txt =
          next.weeksUntil === 0
            ? `${next.name} this week`
            : next.weeksUntil === 1
              ? `${next.name} next week`
              : `${next.name} in ${next.weeksUntil} weeks`;
        return { shows, nextShow: next, nextShowText: txt };
      }

      function flashSaved() {
        state.lastSaved = Date.now();
        state.saveFlashUntil = Date.now() + 1200;
      }

      function serializeState() {
        return JSON.parse(JSON.stringify(state));
      }

      let lastSavedPayload = "";
      let chromeHeaderSignature = "";
      let chromeTabsSignature = "";
      let modalLayerSignature = "";
      let worldRefreshTimer = null;
      let backgroundTickTimer = null;
      let marketplacePingTimer = null;
      let worldTickerTimer = null;
      let worldTickerPaused = false;

      let hoodClickReset = 0;
      let cheatPromptOpen = false;

      function saveGame(force = false) {
        try {
          const payload = JSON.stringify({
            version: SAVE_VERSION,
            lastSaved: Date.now(),
            state: serializeState(),
          });
          if (!force && payload === lastSavedPayload) return false;
          localStorage.setItem(SAVE_KEY, payload);
          lastSavedPayload = payload;
          flashSaved();
          return true;
        } catch (err) {
          console.warn("Save failed", err);
          return false;
        }
      }

      function loadGame() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.state) return false;
          const savedHasTutorialField = Object.prototype.hasOwnProperty.call(
            parsed.state,
            "tutorialComplete",
          );
          Object.assign(state, makeDefaultState(), parsed.state);
          if (!savedHasTutorialField) state.tutorialComplete = true;
          const ensureArray = (key) => {
            if (!Array.isArray(state[key])) state[key] = [];
          };
          ensureArray("activeRestorations");
          ensureArray("enteredShowsThisWeek");
          ensureArray("partsInventory");
          ensureArray("marketplaceListings");
          ensureArray("legacyBuilds");
          // Backfill wonNational on legacy entries saved before the snapshot
          // fix — a build whose best result was a 1st-place National counts.
          state.legacyBuilds.forEach((b) => {
            if (!b.wonNational && b.bestPlace === 1 && b.bestTier === "National") {
              b.wonNational = true;
            }
          });
          ensureArray("noticeQueue");
          ensureArray("eventQueue");
          ensureArray("history");
          ensureArray("rivalFeed");
          ensureArray("buyerHistory");
          ensureArray("ownedTools");
          ensureArray("giftedTools");
          ensureArray("cars");
          // Backfill new stat categories on cars from old saves
          state.cars.forEach((c) => {
            CATS.forEach((cat) => {
              if (typeof c[cat] !== "number") c[cat] = 18;
            });
            if (!Array.isArray(c.installedParts)) c.installedParts = [];
          });
          if (!state.recentLines || typeof state.recentLines !== "object") {
            state.recentLines = {};
          }
          if (!state.buck || typeof state.buck !== "object") {
            state.buck = {
              metOnce: false,
              firstImpression: null,
              beatenCount: 0,
              lostToCount: 0,
              boughtPartCount: 0,
            };
          }
          if (!state.mechanic || typeof state.mechanic !== "object") {
            state.mechanic = {
              metOnce: false,
              trust: 0,
              shopVisits: 0,
              milestoneSeen: false,
            };
          }
          if (!state.milestones || typeof state.milestones !== "object") {
            state.milestones = {
              firstShow: false,
              hit50: false,
              wonRegional: false,
              threeSponsors: false,
              homeGarage: false,
              wonNational: false,
            };
          }
          if (!state.rival || typeof state.rival !== "object") {
            state.rival = { score: 32, showsEntered: 0, lastPlace: null };
          }
          if (!state.seasonStats || typeof state.seasonStats !== "object") {
            state.seasonStats = {
              moneyStart: state.money || 0,
              moneyEarned: 0,
              showsEntered: 0,
              bestPlace: null,
              bestTier: null,
              startOverall: 0,
            };
          }
          if (!state.settings || typeof state.settings !== "object") {
            state.settings = { musicVolume: 0.6, sfxVolume: 0.7, paused: false };
          } else {
            if (typeof state.settings.musicVolume !== "number") state.settings.musicVolume = 0.6;
            if (typeof state.settings.sfxVolume !== "number") state.settings.sfxVolume = 0.7;
            if (typeof state.settings.paused !== "boolean") state.settings.paused = false;
          }
          state.settingsOpen = false;
          if (typeof state.pausedAt !== "number") state.pausedAt = 0;
          if (typeof state.weekStartMoney !== "number") state.weekStartMoney = state.money || 0;
          if (!currentCar() && state.cars.length) {
            state.carId = state.cars[0].id;
          }
          applyAudioSettings();
          resolveCompletedRestorations(false);
          lastSavedPayload = raw;
          return true;
        } catch (err) {
          console.warn("Load failed", err);
          return false;
        }
      }

      function completeRestorationTask(task, showToast = true) {
        const car = getCarById(task.carId);
        const part = PARTS.find((p) => p.id === task.partId);
        if (!car || !part) return;
        if (!car.installedParts.includes(part.id)) {
          car[part.category] = clamp(car[part.category] + part.imp);
          car.installedParts.push(part.id);
          addRemovedPartItem(part, car);
          state.freshHeadline = `${part.name} finished`;
          maybeTriggerBuildTierMoment(car);
          if (showToast) playSfx("wrench");
          if (showToast)
            toast(
              `${part.name} wrapped up on your ${car.year} ${car.make}. It feels a little more legit now. +${part.imp} ${CAT_LABELS[part.category]}.`,
              "ok",
            );
          if (task.method === "diy" && !state.starterHelpReceived) {
            maybeTriggerNeighborHelp(car);
          }
          state.installsDone = (state.installsDone || 0) + 1;
        }
        task.completed = true;
      }

      function maybeTriggerNeighborHelp(car) {
        if (state.starterHelpReceived) return;
        // Pick the most-needed tool the player doesn't own and can use right now
        const need = Object.create(null);
        const installed = new Set(car ? car.installedParts : []);
        PARTS.forEach((p) => {
          if (installed.has(p.id)) return;
          if (p.tier !== "Budget") return;
          (p.tools || []).forEach((tid) => {
            need[tid] = (need[tid] || 0) + 1;
          });
        });
        const wsIdx = getWorkspaceIndex(state.workshopLevel);
        const candidates = TOOLS_LIST.filter(
          (t) =>
            !state.ownedTools.includes(t.id) &&
            getWorkspaceIndex(t.workshop) <= wsIdx,
        )
          .map((t) => ({ tool: t, score: need[t.id] || 0 }))
          .sort((a, b) => b.score - a.score);
        const pick = candidates.length ? candidates[0].tool : null;
        state.starterHelpReceived = true;
        state.money += 125;
        recordMoneyChange(125, "Neighbor starter help");
        if (pick && state.ownedTools.length < toolStorageData().maxTools) {
          state.ownedTools.push(pick.id);
          toast(
            `An old neighbor saw the garage light on. Walked over with a clean ${pick.name} he wasn't using and slid you $125 for parts. "Pay me back when the truck wins something."`,
            "event-good",
          );
        } else {
          toast(
            `An old neighbor saw the garage light on. Walked over and slid you $125 for parts. "Pay me back when the truck wins something."`,
            "event-good",
          );
        }
      }

      function resolveCompletedRestorations(showToast = true) {
        if (state.settings && state.settings.paused) return false;
        let changed = false;
        state.activeRestorations.forEach((task) => {
          if (!task.completed && Date.now() >= task.finishTime) {
            completeRestorationTask(task, showToast);
            changed = true;
          }
        });
        if (changed) {
          state.activeRestorations = state.activeRestorations.filter(
            (t) => !t.completed,
          );
          checkMilestones();
          saveGame();
        }
        return changed;
      }

      function activeTasksForCar(carId) {
        return state.activeRestorations
          .filter((t) => t.carId === carId && !t.completed)
          .sort((a, b) => a.finishTime - b.finishTime);
      }

      function startRestoration(id, method, isFree = false) {
        const part = PARTS.find((p) => p.id === id);
        const car = currentCar();
        if (!car)
          return toast(
            "No car, no wrenching. Drag home a project first.",
            "err",
          );
        if (car.installedParts.includes(part.id))
          return toast("Already completed.", "err");
        if (findActiveTask(car.id, part.id))
          return toast("That restoration is already in progress.", "err");
        if (method === "diy" && activeTasksByMethod(car.id, "shop").length) {
          return toast(
            "The car is currently at the auto shop. Wait for those jobs to finish first.",
            "err",
          );
        }
        if (method === "shop" && activeTasksByMethod(car.id, "diy").length) {
          return toast(
            "Finish your DIY work before sending the car to the shop.",
            "err",
          );
        }
        if (
          method !== "shop" &&
          activeTasksForCar(car.id).length >= workspaceData().maxActive
        )
          return toast(
            `${workspaceData().name} is already full. Upgrade your work space for more simultaneous restorations.`,
            "err",
          );
        const starterFree =
          state.starterHelpReceived &&
          id === 2 &&
          !car.installedParts.includes(2) &&
          !findActiveTask(car.id, 2) &&
          !state.starterCarbUsed;
        const cost = isFree || starterFree ? 0 : partCost(part, method);
        if (!isFree && state.money < cost)
          return toast("Not enough cash.", "err");
        if (method === "diy") {
          const missing = (part.tools || []).filter(
            (tid) => !state.ownedTools.includes(tid),
          );
          if (missing.length > 0) {
            const names = missing
              .map((id) => TOOLS_LIST.find((t) => t.id === id)?.name)
              .join(", ");
            return toast(`Missing: ${names}`, "err");
          }
        }
        if (car[part.category] >= 100)
          return toast("Already maxed out.", "err");
        if (!(isFree || starterFree)) {
          state.money -= cost;
          recordMoneyChange(
            -cost,
            `${method === "shop" ? "Auto shop" : "DIY"} start: ${part.name}`,
          );
        }
        if (isFree) state.freePart = false;
        if (starterFree) state.starterCarbUsed = true;
        const now = Date.now();
        const duration = taskDurationMs(part, method);
        state.activeRestorations.push({
          id: `task_${now}_${Math.random().toString(36).slice(2, 7)}`,
          carId: car.id,
          partId: part.id,
          method,
          startTime: now,
          finishTime: now + duration,

                note: "Future You just got a new problem to inherit.",

        if (method === "shop") {
          if (!state.mechanic) state.mechanic = { metOnce: false, trust: 0, shopVisits: 0, milestoneSeen: false };
          state.mechanic.shopVisits = (state.mechanic.shopVisits || 0) + 1;

              emoji: DALE_INTRO_SCENE.emoji,
              text: DALE_INTRO_SCENE.text,

                label: c.label,
                lore: c.lore,

              })),
            });
          } else {
            state.mechanic.trust = Math.min(10, (state.mechanic.trust || 0) + 1);
            if (
              state.mechanic.trust >= 5 &&
              !state.mechanic.milestoneSeen
            ) {
              state.mechanic.milestoneSeen = true;
              queueScene({
                id: DALE_MILESTONE_SCENE.id,
                title: DALE_MILESTONE_SCENE.title,
                emoji: DALE_MILESTONE_SCENE.emoji,
                text: DALE_MILESTONE_SCENE.text,
                choices: DALE_MILESTONE_SCENE.choices.map((c) => ({
                  label: c.label,
                  lore: c.lore,
                  note: c.note,
                })),

            } else if (Math.random() < 0.35) {
              toast(pickFresh(DALE_SHOP_FLAVOR, "daleShop"), "ok");

          }
        }
        toast(
          `${part.name} started — ${restorationStartLine(method)}.`,
          "event-good",
        );

        requestRender("full");
      }

      function payOffLoan(kind) {
        const balance =
          kind === "shark"
            ? state.sharkLoanBalance
            : kind === "truck"
              ? state.toolTruckBalance
              : kind === "ring"
                ? state.ringPawnBalance
                : state.bankLoanBalance;
        if (balance <= 0) return;
        const pay = Math.min(balance, state.money);
        if (pay <= 0) return toast("You don't have any cash to put on it.", "err");
        state.money -= pay;
        if (kind === "shark") state.sharkLoanBalance -= pay;
        else if (kind === "truck") state.toolTruckBalance -= pay;
        else if (kind === "ring") state.ringPawnBalance -= pay;
        else state.bankLoanBalance -= pay;
        const label =
          kind === "shark"
            ? "Shark loan"
            : kind === "truck"
              ? "Tool truck tab"
              : kind === "ring"
                ? "Pawn ticket"
                : "Bank loan";
        const remaining =
          kind === "shark"
            ? state.sharkLoanBalance
            : kind === "truck"
              ? state.toolTruckBalance
              : kind === "ring"
                ? state.ringPawnBalance
                : state.bankLoanBalance;
        recordMoneyChange(-pay, `${label} payment`);
        const cleared = remaining === 0;
        const ringClearedNote =
          kind === "ring" && cleared
            ? " Picked up the ring on the way home. She didn't say anything when you put it back on the dresser, but you saw her smile."

        toast(
          `${label} paid down by $${fmt(pay)}.${cleared ? " Debt cleared." : ""}${ringClearedNote}`,
          "event-good",

        saveGame();
        requestRender("full");
