      /* ═══════════════════════════════════════════
     MAIN RENDER
  ═══════════════════════════════════════════ */
      function toast(msg, type = "ok") {
        if (type === "event-good" || type === "event-bad") {
          pushNotice(msg, type === "event-bad" ? "bad" : "good");
          return;
        }
        const root = getEl("toastRoot");
        const extra =
          type === "ok" ? "money-pop" : type === "err" ? "shake-lite" : "";
        root.innerHTML = `<div class="toast ${type} ${extra}">${msg}</div>`;
        clearTimeout(toast._t);
        toast._t = setTimeout(() => (root.innerHTML = ""), 3500);
        if (type === "err") playSfx("error");
      }

      function pushNotice(text, tone) {
        if (!state.noticeQueue) state.noticeQueue = [];
        const emoji = tone === "bad" ? "⚠️" : "🎉";
        state.noticeQueue.push({ text, tone: tone || "good", emoji });
        if (state.noticeQueue.length === 1) {
          playSfx(tone === "bad" ? "error" : "success");
        }
        requestRender("chrome");
      }

      function dismissNotice() {
        if (!state.noticeQueue || !state.noticeQueue.length) return;
        state.noticeQueue.shift();
        playSfx("click");
        saveGame();
        requestRender("full");
      }

      let lastRenderSignature = "";
      let renderQueued = false;
      let rerenderRequestedWhileQueued = false;
      let queuedRenderMode = "full";

      function updateHeaderChrome(force = false) {
        const headerSignature = [
          state.followers,
          garageLoreTier(),
          state.freshHeadline || "",
          Date.now() < state.saveFlashUntil ? 1 : 0,
          !!state.lastSaved,
          state.money,
          state.lastMoneyDelta,
          state.fuel,
          state.week,
          state.seasonLength,
          PAYCHECK_CYCLE - state.paycheckProgress,
          state.bankLoanBalance,
          state.sharkLoanBalance,
          isEarlyGame() ? 1 : 0,
        ].join("|");
        if (!force && headerSignature === chromeHeaderSignature) return;
        chromeHeaderSignature = headerSignature;

      function requestRender(mode = "full") {
        if (mode === "full" || queuedRenderMode !== "full") {
          queuedRenderMode = mode;
        }
        if (renderQueued) {
          rerenderRequestedWhileQueued = true;
          return;
        }
        renderQueued = true;
        requestAnimationFrame(() => {
          const nextMode = queuedRenderMode;
          renderQueued = false;
          queuedRenderMode = "full";
          render(nextMode);
          if (rerenderRequestedWhileQueued) {
            rerenderRequestedWhileQueued = false;
            requestRender("full");
          }
        });
      }

      function updateRestorationTimers() {
        if (!state.activeRestorations || !state.activeRestorations.length)
          return;
        const isPaused = state.settings && state.settings.paused;
        state.activeRestorations.forEach((task) => {
          if (task.completed) return;
          const blocks = document.querySelectorAll(
            `[data-task-id="${task.id}"]`,
          );
          if (!blocks.length) return;
          const remaining = task.finishTime - Date.now();
          const pct = Math.round(getRestorationProgress(task) * 100);
          blocks.forEach((block) => {
            const timeEl = block.querySelector(".task-time");
            if (timeEl)
              timeEl.textContent = isPaused
                ? "PAUSED"
                : remaining <= 0
                  ? "COMPLETE"
                  : formatRemaining(remaining);
            const statusEl = block.querySelector(".task-status");
            if (statusEl)
              statusEl.textContent = isPaused
                ? "Paused — open Settings to resume"
                : remaining <= 0
                  ? "Wrapping up now…"
                  : task.method === "shop"
                    ? `${formatRemaining(remaining)} remaining`
                    : taskStatusText(task);
            const fillEl = block.querySelector(".gauge-fill");
            if (fillEl) fillEl.style.width = pct + "%";
          });
        });
      }

      function runBackgroundTick() {
        const interval = document.hidden
          ? 4000
          : state.activeRestorations.length || state.showLoading
            ? 1000
            : 1600;
        const isPaused = state.settings && state.settings.paused;
        const changed = isPaused ? false : resolveCompletedRestorations(true);
        if (changed || state.showLoading) {
          // Only do the heavy full re-render when something actually changed
          // (a task completed, or the show is loading). Per-second timer ticks
          // are now handled by updateRestorationTimers below — surgical DOM
          // updates only on the timer text and progress bar, leaving the SVG
          // car art and the rest of the page untouched.
          requestRender("full");
        } else if (state.activeRestorations.length) {
          updateRestorationTimers();
        }
        backgroundTickTimer = setTimeout(runBackgroundTick, interval);
      }

      let tickerRotation = 0;
      function pickTickerItem() {
        const lastShow = state.history && state.history[0];
        const recent =
          lastShow && state.week - (lastShow.week || 0) <= 1 ? lastShow : null;
        if (recent && Math.random() < 0.18) {
          return {
            kind: "player",
            kindLabel: "⚡ YOU",
            source: "Scene Ticker",
            text:
              recent.place === 1
                ? `Word spread about your ${placeLabel(recent.place).toLowerCase()} at ${recent.show}. Scene is talking.`
                : recent.place <= 3
                  ? `Podium mention: ${placeLabel(recent.place)} at ${recent.show}. Somebody saved the photo.`
                  : `Your run at ${recent.show} is in the ticker. Not the headline, but it's in there.`,
          };
        }
        const roll = Math.random();
        if (roll < 0.4) {
          const segTypes = ["banter", "ads", "callers", "traffic"];
          const weights = [0.5, 0.22, 0.18, 0.1];
          let cum = 0;
          const r = Math.random();
          let segType = "banter";
          for (let i = 0; i < segTypes.length; i++) {
            cum += weights[i];
            if (r < cum) {
              segType = segTypes[i];
              break;
            }
          }
          const pool = RADIO_SEGMENTS[segType];
          const item = pickFresh(pool, "radio:" + segType);
          return item
            ? {
                kind: "radio",
                kindLabel: segType === "ads" ? "📻 AD BREAK" : "📻 ON AIR",
                source: item.source,
                text: item.line,
              }
            : null;
        } else if (roll < 0.72) {
          const pool = NPC_SOCIAL_POSTS.slice();
          if (state.buck && state.buck.metOnce) {
            const buckLast = state.history && state.history[0];
            const buckPool =
              buckLast && buckLast.buckPlace
                ? buckLast.place < buckLast.buckPlace
                  ? BUCK_POSTS_AFTER_LOSS
                  : buckLast.place > buckLast.buckPlace
                    ? BUCK_POSTS_AFTER_WIN
                    : BUCK_SOCIAL_POSTS
                : BUCK_SOCIAL_POSTS;
            pool.push({ source: "@BuckStallion67", line: pickFresh(buckPool, "tickerBuck") });
          }
          const item = pool[Math.floor(Math.random() * pool.length)];
          return {
            kind: "social",
            kindLabel: "📱 SOCIAL",
            source: item.source,
            text: item.line,
          };
        } else {
          const item = pickFresh(SCENE_NEWS, "tickerNews");
          if (!item) return null;
          return {
            kind: "news",
            kindLabel: "📍 SCENE NEWS",
            source: item.source,
            text: item.line,
          };
        }
      }

      function renderTickerItem() {
        const ticker = getEl("worldTicker");
        if (!ticker) return;
        const kindEl = getEl("worldTickerKind");
        const sourceEl = getEl("worldTickerSource");
        const textEl = getEl("worldTickerText");
        if (!kindEl || !sourceEl || !textEl) return;
        const item = pickTickerItem();
        if (!item) return;
        kindEl.className =
          "world-ticker-kind" +
          (item.kind === "social"
            ? " kind-social"
            : item.kind === "news"
              ? " kind-news"
              : item.kind === "player"

        kindEl.textContent = item.kindLabel;
        sourceEl.textContent = item.source;
        textEl.textContent = item.text;
        textEl.classList.remove("typing");

        textEl.classList.add("typing");
        tickerRotation++;
        if (item.kind === "radio" && tickerRotation % 3 === 0) {
          playSfx("radioJingle");
        }
      }

      /* ═══════════════════════════════════════════

  ═══════════════════════════════════════════ */
      let audioCtx = null,
        musicPlaying = false,
        musicNodes = [];
      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }
      function getMasterGain() {
        const ctx = getAudioCtx();
        if (!getMasterGain._n) {
          getMasterGain._n = ctx.createGain();
          getMasterGain._n.gain.value = (state.settings && typeof state.settings.musicVolume === "number") ? state.settings.musicVolume * 0.3 : 0.18;
          getMasterGain._n.connect(ctx.destination);
        }
        return getMasterGain._n;
      }
      function applyAudioSettings() {
        if (!state.settings) return;
        if (getMasterGain._n) {
          getMasterGain._n.gain.value = state.settings.musicVolume * 0.3;
        }
        if (getSfxGain._n) {
          getSfxGain._n.gain.value = state.settings.sfxVolume * 0.78;
        }
      }
      function getReverb() {
        const ctx = getAudioCtx();
        if (!getReverb._n) {
          const conv = ctx.createConvolver();
          const len = ctx.sampleRate * 1.2;
          const buf = ctx.createBuffer(2, len, ctx.sampleRate);
          for (let ch = 0; ch < 2; ch++) {
            const d = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
              d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
          }
          conv.buffer = buf;
          const wet = ctx.createGain();
          wet.gain.value = 0.22;
          conv.connect(wet);
          wet.connect(getMasterGain());
          getReverb._n = conv;
        }
        return getReverb._n;
      }
      function noteFreq(note) {
        const notes = {
          C: 0,
          "C#": 1,
          Db: 1,
          D: 2,
          "D#": 3,
          Eb: 3,
          E: 4,
          F: 5,
          "F#": 6,
          Gb: 6,
          G: 7,
          "G#": 8,
          Ab: 8,
          A: 9,
          "A#": 10,
          Bb: 10,
          B: 11,
        };
        const m = note.match(/^([A-Ga-g#b]+)(\d)$/);
        if (!m) return 440;
        return (
          440 * Math.pow(2, ((parseInt(m[2]) + 1) * 12 + notes[m[1]] - 69) / 12)
        );
      }
      function playNote(freq, t, dur, type = "sawtooth", g = 0.12, det = 0) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.value = 1800;
        osc.type = type;
        osc.frequency.value = freq;
        osc.detune.value = det;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(g, t + 0.02);
        env.gain.exponentialRampToValueAtTime(g * 0.6, t + dur * 0.4);
        env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(f);
        f.connect(env);
        env.connect(getMasterGain());
        env.connect(getReverb());
        osc.start(t);
        osc.stop(t + dur + 0.05);
        musicNodes.push(osc);
      }
      function playBass(freq, t, dur) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.value = 400;
        osc.type = "triangle";
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.28, t + 0.015);
        env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(f);
        f.connect(env);
        env.connect(getMasterGain());
        osc.start(t);
        osc.stop(t + dur + 0.04);
        musicNodes.push(osc);
      }
      function playHat(t, open = false) {
        const ctx = getAudioCtx();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const env = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = "highpass";
        f.frequency.value = 7000;
        env.gain.setValueAtTime(open ? 0.06 : 0.04, t);
        env.gain.exponentialRampToValueAtTime(0.0001, t + (open ? 0.1 : 0.03));
        src.connect(f);
        f.connect(env);
        env.connect(getMasterGain());
        src.start(t);
        src.stop(t + 0.12);
        musicNodes.push(src);
      }
      function playKick(t) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(140, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
        env.gain.setValueAtTime(0.55, t);
        env.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
        osc.connect(env);
        env.connect(getMasterGain());
        osc.start(t);
        osc.stop(t + 0.28);
        musicNodes.push(osc);
      }
      function playSnare(t) {
        const ctx = getAudioCtx();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const env = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = "bandpass";
        f.frequency.value = 1800;
        f.Q.value = 0.8;
        env.gain.setValueAtTime(0.18, t);
        env.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
        src.connect(f);
        f.connect(env);
        env.connect(getMasterGain());
        src.start(t);
        src.stop(t + 0.2);
        musicNodes.push(src);
      }

      /* ── SFX library ── */
      function getSfxGain() {
        const ctx = getAudioCtx();
        if (!getSfxGain._n) {
          getSfxGain._n = ctx.createGain();
          getSfxGain._n.gain.value = (state.settings && typeof state.settings.sfxVolume === "number") ? state.settings.sfxVolume * 0.78 : 0.55;
          getSfxGain._n.connect(ctx.destination);
        }
        return getSfxGain._n;
      }
      function sfxToneAt(t, freq, dur, type, gain, opts) {
        const ctx = getAudioCtx();
        const o = ctx.createOscillator();
        const e = ctx.createGain();
        o.type = type || "sine";
        o.frequency.setValueAtTime(freq, t);
        if (opts && opts.sweepTo) {
          o.frequency.exponentialRampToValueAtTime(
            opts.sweepTo,
            t + dur * (opts.sweepEnd || 1),
          );
        }
        e.gain.setValueAtTime(0, t);
        e.gain.linearRampToValueAtTime(gain, t + 0.005);
        e.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(e);
        e.connect(getSfxGain());
        o.start(t);
        o.stop(t + dur + 0.05);
      }
      function sfxNoiseBurst(t, dur, gain, filterType, filterFreq, sweepTo) {
        const ctx = getAudioCtx();
        const buf = ctx.createBuffer(
          1,
          Math.max(1, Math.floor(ctx.sampleRate * dur)),
          ctx.sampleRate,
        );
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const e = ctx.createGain();
        const f = ctx.createBiquadFilter();
        f.type = filterType || "bandpass";
        f.frequency.setValueAtTime(filterFreq, t);
        if (sweepTo) {
          f.frequency.exponentialRampToValueAtTime(sweepTo, t + dur);
        }
        f.Q.value = 1;
        e.gain.setValueAtTime(gain, t);
        e.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        src.connect(f);
        f.connect(e);
        e.connect(getSfxGain());
        src.start(t);
        src.stop(t + dur + 0.05);
      }
      const SFX_PLAYERS = {
        click: (t) => {
          sfxToneAt(t, 720, 0.05, "sine", 0.18);
        },
        swoosh: (t) => {
          sfxNoiseBurst(t, 0.18, 0.12, "bandpass", 1800, 600);
        },
        ding: (t) => {
          sfxToneAt(t, 880, 0.12, "sine", 0.18);
          sfxToneAt(t + 0.07, 1320, 0.18, "sine", 0.16);
        },
        coin: (t) => {
          sfxToneAt(t, 1320, 0.06, "triangle", 0.18);
          sfxToneAt(t + 0.04, 1760, 0.1, "triangle", 0.14);
        },
        wrench: (t) => {
          sfxNoiseBurst(t, 0.08, 0.22, "bandpass", 2200);
          sfxToneAt(t + 0.04, 220, 0.1, "sine", 0.14, { sweepTo: 110 });
        },
        engineRev: (t) => {
          sfxToneAt(t, 80, 0.45, "sawtooth", 0.18, { sweepTo: 220 });
          sfxToneAt(t + 0.05, 120, 0.4, "square", 0.08, { sweepTo: 280 });
          sfxNoiseBurst(t, 0.5, 0.04, "lowpass", 600);
        },
        applause: (t) => {
          const ctx = getAudioCtx();
          const dur = 0.9;
          const buf = ctx.createBuffer(
            1,
            Math.floor(ctx.sampleRate * dur),
            ctx.sampleRate,
          );
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) {
            d[i] = (Math.random() * 2 - 1) * (0.4 + Math.random() * 0.6);
          }
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const f = ctx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 2200;
          f.Q.value = 0.9;
          const e = ctx.createGain();
          e.gain.setValueAtTime(0, t);
          e.gain.linearRampToValueAtTime(0.16, t + 0.12);
          e.gain.linearRampToValueAtTime(0.18, t + 0.4);
          e.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          src.connect(f);
          f.connect(e);
          e.connect(getSfxGain());
          src.start(t);
          src.stop(t + dur + 0.05);
        },
        success: (t) => {
          sfxToneAt(t, 523, 0.12, "triangle", 0.16);
          sfxToneAt(t + 0.08, 659, 0.12, "triangle", 0.16);
          sfxToneAt(t + 0.16, 784, 0.2, "triangle", 0.18);
        },
        error: (t) => {
          sfxToneAt(t, 320, 0.18, "square", 0.12, { sweepTo: 180 });
        },
        radioJingle: (t) => {
          sfxToneAt(t, 659, 0.1, "triangle", 0.09);
          sfxToneAt(t + 0.08, 880, 0.1, "triangle", 0.09);
          sfxToneAt(t + 0.16, 1319, 0.22, "triangle", 0.11);
        },
      };
      function playSfx(name) {
        if (state.settings && state.settings.sfxVolume <= 0) return;
        if (state.sfxMuted) return;
        const player = SFX_PLAYERS[name];
        if (!player) return;
        try {
          const ctx = getAudioCtx();
          if (ctx.state === "suspended") ctx.resume();
          player(ctx.currentTime);
        } catch (e) {
          /* audio not ready, ignore */
        }
      }

      const BPM = 88,
        BEAT = 60 / BPM,
        BAR = BEAT * 4;
      const MELODY_E = [
        ["E4", 0],
        ["G4", 0.5],
        ["A4", 1],
        ["Bb4", 1.25],
        ["B4", 1.5],
        ["A4", 2],
        ["G4", 2.5],
        ["E4", 3],
        ["D4", 3.5],
      ];
      const MELODY_A = [
        ["A4", 0],
        ["C5", 0.5],
        ["D5", 1],
        ["Eb5", 1.25],
        ["E5", 1.5],
        ["D5", 2],
        ["C5", 2.5],
        ["A4", 3],
        ["G4", 3.5],
      ];
      const MELODY_B = [
        ["B4", 0],
        ["D5", 0.5],
        ["E5", 1],
        ["F5", 1.25],
        ["F#5", 1.5],
        ["E5", 2],
        ["D5", 2.5],
        ["B4", 3],
        ["A4", 3.5],
      ];
      const CHORDS = [
        "E",
        "E",
        "E",
        "E",
        "A",
        "A",
        "E",
        "E",
        "B",
        "A",
        "E",
        "B",
      ];
      const BASS = {
        E: [
          ["E2", 0],
          ["E2", 0.5],
          ["G#2", 1],
          ["B2", 2],
          ["G#2", 3],
        ],
        A: [
          ["A2", 0],
          ["A2", 0.5],
          ["C#3", 1],
          ["E3", 2],
          ["C#3", 3],
        ],
        B: [
          ["B2", 0],
          ["B2", 0.5],
          ["D#3", 1],
          ["F#3", 2],
          ["D#3", 3],
        ],
      };

      function scheduleMusicLoop(st, loops) {
        const ll = BAR * 12;
        for (let lp = 0; lp < loops; lp++) {
          const ls = st + lp * ll;
          CHORDS.forEach((ch, bi) => {
            const bs = ls + bi * BAR;
            const mel =
              ch === "A" ? MELODY_A : ch === "B" ? MELODY_B : MELODY_E;
            const bass = BASS[ch] || BASS.E;
            mel.forEach(([n, b]) =>
              playNote(
                noteFreq(n),
                bs + b * BEAT,
                BEAT * 0.55,
                "sawtooth",
                0.08,
                -4,
              ),
            );
            [
              [ch === "E" ? "E3" : ch === "A" ? "A3" : "B3", 0],
              [ch === "E" ? "G#3" : ch === "A" ? "C#4" : "D#4", 0],
              [ch === "E" ? "B3" : ch === "A" ? "E4" : "F#4", 0],
            ].forEach(([n, b]) =>
              playNote(
                noteFreq(n),
                bs + b * BEAT,
                BAR * 0.9,
                "square",
                0.04,
                8,
              ),
            );
            bass.forEach(([n, b]) =>
              playBass(noteFreq(n), bs + b * BEAT, BEAT * 0.75),
            );
            for (let b = 0; b < 4; b++) {
              const t = bs + b * BEAT;
              if (b === 0 || b === 2) playKick(t);
              if (b === 1 || b === 3) playSnare(t);
              playHat(t, false);
              playHat(t + BEAT * 0.5, true);
              playHat(t + BEAT * 0.75, false);
            }
          });
        }
      }

      let musicLoopTimer = null,
        loopStartTime = 0;
      const LOOP_DUR = BAR * 12;
      function scheduleLoop() {
        const ctx = getAudioCtx();
        scheduleMusicLoop(loopStartTime, 2);
        loopStartTime += LOOP_DUR * 2;
        musicLoopTimer = setTimeout(scheduleLoop, LOOP_DUR * 1000);
      }
      function startMusic() {
        if (musicPlaying) return;
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") ctx.resume();
        musicPlaying = true;
        loopStartTime = ctx.currentTime + 0.1;
        scheduleLoop();
      }
      function stopMusic() {
        if (!musicPlaying) return;
        musicPlaying = false;
        clearTimeout(musicLoopTimer);
        musicNodes.forEach((n) => {
          try {
            n.stop();
          } catch (e) {}
        });
        musicNodes = [];
        if (getMasterGain._n) {
          getMasterGain._n.gain.setTargetAtTime(
            0,
            getAudioCtx().currentTime,
            0.3,
          );
          setTimeout(() => {
            applyAudioSettings();
          }, 600);
        }
      }
      function startGame() {
        applyAudioSettings();
        if (!musicPlaying) startMusic();
        const sp = getEl("splash");
        sp.style.transition = "opacity .7s";
        sp.style.opacity = "0";
        sp.style.pointerEvents = "none";
        setTimeout(() => sp.remove(), 750);
      }
    </script>
  </body>
</html>
