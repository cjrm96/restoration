<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1970 Plymoth Marauder — Stage Viewer</title>
<style>
    body {
        background-color: #17120f;
        color: #efe2c6;
        font-family: Georgia, serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        margin: 0;
    }
    .car-section {
        margin-bottom: 60px;
        width: 100%;
        max-width: 1800px;
    }
    .section-title {
        border-bottom: 2px solid #4b4036;
        padding-bottom: 10px;
        margin-bottom: 20px;
        color: #d19a3f;
    }
    .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: flex-start;
    }
    .preview-card {
        background: #241d17;
        border: 1px solid #4b4036;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    .preview-card-title {
        margin-bottom: 12px;
        font-weight: bold;
        color: #a99b84;
        font-size: 14px;
        letter-spacing: 0.5px;
    }
    svg {
        width: 340px;
        height: 190px;
        background: linear-gradient(180deg, #6a6256 0%, #433c33 100%);
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
</style>
</head>
<body>

<h1>Car Guy Simulator — 1970 Plymoth Marauder</h1>
<p style="margin-bottom: 40px; color: #a99b84;">Dev team: Copy the marauderSprite function from the source of this file and place it next to f100Sprite.</p>

<div id="appRoot" style="width: 100%; max-width: 1800px;"></div>

<script>
// ---------------------------------------------------------
// HELPER: Wheel Renderer (Already in game)
// ---------------------------------------------------------
function pixelWheel(cx, cy, color, rim, spoke) {
    return `<rect x="${cx - 12}" y="${cy - 12}" width="24" height="24" fill="#111214"/><rect x="${cx - 10}" y="${cy - 10}" width="20" height="20" fill="${color}"/><rect x="${cx - 6}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx + 2}" y="${cy - 10}" width="4" height="20" fill="${spoke}"/><rect x="${cx - 10}" y="${cy - 6}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 10}" y="${cy + 2}" width="20" height="4" fill="${spoke}"/><rect x="${cx - 4}" y="${cy - 4}" width="8" height="8" fill="${rim}"/>`;
}

// ---------------------------------------------------------
// 1970 PLYMOTH MARAUDER
// Big Mopar B-body. Reads different from the pony cars:
// noticeably longer body with a wide tunnel-back roof and
// sloping sail panel, long flat rear deck, chrome loop
// bumper up front, full-height rear bumper, and a matte
// black performance hood once restored.
// ---------------------------------------------------------
function marauderSprite(stageLevel, colors) {
    const { baseColor: body, roofColor: roof, windowColor: glass, trimColor: chrome, wheelColor: wheel, wheelSpoke: spoke, wheelHub: hub, wheelTire: tire, primerColor: primer, rustColor: rusty, shadowColor: dark } = colors;
    const yo = -stageLevel * 2;
    const gY = 124+yo, rkY = 116+yo, bY = 106+yo, hY = 98+yo, aP = 84+yo, rfY = 78+yo, wY = 128+yo;

    if (stageLevel <= 0) {
        return `<g shape-rendering="crispEdges">
            <rect x="124" y="${rfY+4}" width="68" height="6" fill="${primer}"/>
            <rect x="112" y="${aP+4}" width="16" height="16" fill="#2c3137"/>
            <rect x="132" y="${aP+4}" width="48" height="16" fill="#2c3137"/>
            <rect x="184" y="${aP+4}" width="18" height="16" fill="${rusty}"/>
            <rect x="202" y="${aP+8}" width="18" height="12" fill="${primer}"/>
            <rect x="36" y="${hY+4}" width="76" height="4" fill="${rusty}"/>
            <rect x="220" y="${hY+6}" width="72" height="4" fill="${primer}"/>
            <rect x="32" y="${bY}" width="260" height="12" fill="${rusty}"/>
            <rect x="32" y="${bY+12}" width="52" height="12" fill="${primer}"/>
            <rect x="112" y="${bY+12}" width="120" height="12" fill="${rusty}"/>
            <rect x="258" y="${bY+12}" width="34" height="12" fill="${primer}"/>
            <rect x="24" y="${bY+2}" width="8" height="16" fill="${primer}"/>
            <rect x="292" y="${bY+2}" width="8" height="16" fill="${rusty}"/>
            <rect x="32" y="${rkY+14}" width="260" height="4" fill="${rusty}"/>
            <rect x="28" y="${gY+4}" width="272" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(96, wY+2, "#3a342f", "#2a241f", "#1c1815")}
            ${pixelWheel(244, wY+2, "#3a342f", "#2a241f", "#1c1815")}
        </g>`;
    }
    if (stageLevel === 1) {
        return `<g shape-rendering="crispEdges">
            <rect x="124" y="${rfY+2}" width="68" height="6" fill="${roof}"/>
            <rect x="112" y="${aP+2}" width="16" height="16" fill="${glass}"/>
            <rect x="132" y="${aP+2}" width="48" height="16" fill="${glass}"/>
            <rect x="184" y="${aP+2}" width="18" height="16" fill="${primer}"/>
            <rect x="202" y="${aP+6}" width="18" height="12" fill="${primer}"/>
            <rect x="36" y="${hY+2}" width="76" height="4" fill="${primer}"/>
            <rect x="220" y="${hY+4}" width="72" height="4" fill="${body}"/>
            <rect x="32" y="${bY}" width="140" height="12" fill="${body}"/>
            <rect x="172" y="${bY}" width="120" height="12" fill="${primer}"/>
            <rect x="32" y="${bY+12}" width="52" height="12" fill="${primer}"/>
            <rect x="112" y="${bY+12}" width="120" height="12" fill="${body}"/>
            <rect x="258" y="${bY+12}" width="34" height="12" fill="${body}"/>
            <rect x="24" y="${bY+2}" width="8" height="16" fill="${chrome}" opacity="0.5"/>
            <rect x="292" y="${bY+2}" width="8" height="16" fill="${chrome}" opacity="0.5"/>
            <rect x="32" y="${rkY+14}" width="260" height="4" fill="${chrome}" opacity="0.5"/>
            <rect x="28" y="${gY+4}" width="272" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(96, wY+2, tire, "#565d63", "#34383d")}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 2) {
        return `<g shape-rendering="crispEdges">
            <rect x="124" y="${rfY}" width="68" height="6" fill="${roof}"/>
            <rect x="112" y="${aP}" width="16" height="16" fill="${glass}"/>
            <rect x="132" y="${aP}" width="48" height="16" fill="${glass}"/>
            <rect x="184" y="${aP}" width="18" height="16" fill="${glass}"/>
            <rect x="202" y="${aP+4}" width="18" height="12" fill="${body}"/>
            <rect x="36" y="${hY}" width="76" height="4" fill="${body}"/>
            <rect x="220" y="${hY+2}" width="72" height="4" fill="${body}"/>
            <rect x="32" y="${bY}" width="260" height="12" fill="${body}"/>
            <rect x="32" y="${bY+12}" width="52" height="12" fill="${body}"/>
            <rect x="112" y="${bY+12}" width="120" height="12" fill="${body}"/>
            <rect x="258" y="${bY+12}" width="34" height="12" fill="${body}"/>
            <rect x="24" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
            <rect x="292" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
            <rect x="32" y="${rkY+14}" width="260" height="4" fill="${chrome}"/>
            <rect x="28" y="${gY+4}" width="272" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(96, wY+2, wheel, hub, spoke)}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    if (stageLevel === 3) {
        return `<g shape-rendering="crispEdges">
            <rect x="124" y="${rfY}" width="68" height="6" fill="${roof}"/>
            <rect x="112" y="${aP}" width="16" height="16" fill="${glass}"/>
            <rect x="132" y="${aP}" width="48" height="16" fill="${glass}"/>
            <rect x="184" y="${aP}" width="18" height="16" fill="${glass}"/>
            <rect x="202" y="${aP+4}" width="18" height="12" fill="${body}"/>
            <rect x="36" y="${hY}" width="76" height="4" fill="${body}"/>
            <rect x="40" y="${hY-1}" width="68" height="3" fill="#20242a"/>
            <rect x="220" y="${hY+2}" width="72" height="4" fill="${body}"/>
            <rect x="32" y="${bY}" width="260" height="12" fill="${body}"/>
            <rect x="32" y="${bY+12}" width="52" height="12" fill="${body}"/>
            <rect x="112" y="${bY+12}" width="120" height="12" fill="${body}"/>
            <rect x="258" y="${bY+12}" width="34" height="12" fill="${body}"/>
            <rect x="56" y="${bY+5}" width="196" height="2" fill="${chrome}"/>
            <rect x="24" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
            <rect x="26" y="${bY+10}" width="4" height="6" fill="#111827"/>
            <rect x="26" y="${bY+4}" width="4" height="4" fill="#fff8e7"/>
            <rect x="292" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
            <rect x="286" y="${bY+3}" width="6" height="6" fill="#f25c54"/>
            <rect x="32" y="${rkY+14}" width="260" height="4" fill="${chrome}"/>
            <rect x="28" y="${gY+4}" width="272" height="4" fill="${dark}" opacity="0.8"/>
            ${pixelWheel(96, wY+2, wheel, hub, spoke)}
            ${pixelWheel(244, wY+2, wheel, hub, spoke)}
        </g>`;
    }
    return `<g shape-rendering="crispEdges">
        <rect x="124" y="${rfY}" width="68" height="6" fill="${roof}"/>
        <rect x="112" y="${aP}" width="16" height="16" fill="${glass}"/>
        <rect x="132" y="${aP}" width="48" height="16" fill="${glass}"/>
        <rect x="184" y="${aP}" width="18" height="16" fill="${glass}"/>
        <rect x="202" y="${aP+4}" width="18" height="12" fill="${body}"/>
        <rect x="36" y="${hY}" width="76" height="4" fill="${body}"/>
        <rect x="40" y="${hY-1}" width="68" height="3" fill="#20242a"/>
        <rect x="220" y="${hY+2}" width="72" height="4" fill="${body}"/>
        <rect x="32" y="${bY}" width="260" height="12" fill="${body}"/>
        <rect x="32" y="${bY+12}" width="52" height="12" fill="${body}"/>
        <rect x="112" y="${bY+12}" width="120" height="12" fill="${body}"/>
        <rect x="258" y="${bY+12}" width="34" height="12" fill="${body}"/>
        <rect x="56" y="${bY+5}" width="196" height="2" fill="${chrome}"/>
        <rect x="24" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
        <rect x="26" y="${bY+10}" width="4" height="6" fill="#111827"/>
        <rect x="26" y="${bY+4}" width="4" height="4" fill="#fff8e7"/>
        <rect x="292" y="${bY+2}" width="8" height="16" fill="${chrome}"/>
        <rect x="286" y="${bY+3}" width="6" height="6" fill="#f25c54"/>
        <rect x="32" y="${rkY+14}" width="260" height="4" fill="${chrome}"/>
        <rect x="42" y="${hY+1}" width="60" height="1" fill="#ffffff" opacity="0.35"/>
        <rect x="128" y="${rfY+1}" width="56" height="1" fill="#ffffff" opacity="0.5"/>
        <rect x="224" y="${hY+3}" width="60" height="1" fill="#ffffff" opacity="0.4"/>
        <rect x="28" y="${gY+4}" width="272" height="4" fill="${dark}" opacity="0.8"/>
        ${pixelWheel(96, wY+2, wheel, hub, spoke)}
        ${pixelWheel(244, wY+2, wheel, hub, spoke)}
    </g>`;
}

// ---------------------------------------------------------
// RUNTIME RENDER LOGIC
// ---------------------------------------------------------
const car = {
    id: "marauder",
    name: "1970 Plymoth Marauder",
    func: marauderSprite,
    colors: { baseColor: "#7a4d8c", roofColor: "#2f1d3a", trimColor: "#e8d6f0", wheelColor: "#d8a14b", shadowColor: "#1d1023" }
};

const commonColors = {
    wheelSpoke: "#cf6f00", wheelHub: "#ffd7a6", wheelTire: "#1A1A1A",
    primerColor: "#7f848b", rustColor: "#8a4517", shadowColor: "#2e3d4d", windowColor: "#4b5967"
};

const labels = ["Stage 0: Barn Find", "Stage 1: Project", "Stage 2: Driver", "Stage 3: Restored", "Stage 4: Show Car"];
const root = document.getElementById("appRoot");

const section = document.createElement('div');
section.className = 'car-section';
section.innerHTML = `<h2 class="section-title">${car.name}</h2><div class="grid"></div>`;
const grid = section.querySelector('.grid');

for (let stage = 0; stage <= 4; stage++) {
    let sc = { ...commonColors, ...car.colors };
    if (stage < 2) sc.wheelTire = "#23262b";
    if (stage === 0) sc.windowColor = "#2c3137";

    const svg = `<svg viewBox="0 0 340 190"><g transform="translate(0, 10)">${car.func(stage, sc)}</g></svg>`;
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `<div class="preview-card-title">${labels[stage]}</div>${svg}`;
    grid.appendChild(card);
}
root.appendChild(section);
</script>
</body>
</html>
