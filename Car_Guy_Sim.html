      function enterShow(showId) {
        resolveCompletedRestorations(false);
        const show = getCurrentShows().find((s) => s.id === showId);
        const car = currentCar();
        const fuelNeed = show.fuel;
        const sponsors = activeSponsors();

        if (!car) return toast("Buy a car first.", "err");
        if (state.familySaturdayWeek === state.week)
          return toast("You promised this Saturday to the family.", "err");
        if (show.seasonClosed)
          return toast(`${show.name} is closed for the season.`, "err");
        if (show.weeksUntil !== 0)
          return toast(
            `That show starts in ${show.weeksUntil} week(s).`,
            "err",
          );
        if (
          show.enteredThisWeek ||
          state.enteredShowsThisWeek.includes(show.id)
        )
          return toast("You've already entered this show this week.", "err");
        if (hasActiveRestorations(car.id))
          return toast(
            "You cannot take the car to a show while restoration work is still in progress.",
            "err",
          );
        if (!roadworthy(car)) return toast("Not roadworthy yet.", "err");
        const localSponsor = sponsors.find(
          (s) => s.freeLocalEntry && show.tier === "Local",
        );
        const entryFee = localSponsor ? 0 : show.fee;
        if (state.money < entryFee)
          return toast("Not enough for the entry fee.", "err");
        if (state.fuel < fuelNeed)
          return toast(`Need ${fuelNeed} gal for this trip.`, "err");
        if (getOverall(car) < show.minScore)
          return toast(`Need ${show.minScore}+ overall.`, "err");

        const effectiveCar = { ...currentCar() };
        const effectiveOverall = getOverall(effectiveCar);
        const bribeBoost = state.bribeActive ? 15 : 0;
        if (state.bribeActive) state.bribeActive = false;
        // Variance shrinks as the build gets tighter. A 30-overall daily
        // driver swings ±10 (genuine dice roll); a 95+ show car swings
        // ±3 (clean builds perform consistently).
        const playerVariance = Math.max(
          3,
          13 - effectiveOverall * 0.11,
        );
        // Build direction edge: stock builds impress judged tiers,
        // restomods play to the crowd tiers.
        const styleEdge =
          effectiveCar.buildStyle === "stock"
            ? show.tier === "National"
              ? 4
              : show.tier === "Regional"
                ? 2
                : 0
            : effectiveCar.buildStyle === "restomod"
              ? show.tier === "Cars & Coffee"
                ? 4
                : show.tier === "Local"
                  ? 2
                  : -2
              : 0;
        const myScore = clamp(
          effectiveOverall +
            styleEdge +
            (Math.random() * playerVariance * 2 - playerVariance) +
            bribeBoost,
        );

        // Competitor max scales with the player's build. Below 80 overall,
        // competitors can roll up to 90 (genuine threat). At 90+, comps cap
        // a little under the player's overall so a top-tier build doesn't
        // lose to a stranger who got lucky.
        const compMax =
          effectiveOverall >= 80
            ? Math.min(95, Math.max(80, effectiveOverall - 3))
            : 90;
        let compPool = [...COMPS]
          .sort(() => Math.random() - 0.5)
          .slice(0, 4)
          .map((name) => ({
            name,
            score: clamp(
              show.minScore + 5 + Math.random() * (compMax - show.minScore),
            ),
          }));
        let buckInShow = false;
        // Buck shows up at every show, but his Cars & Coffee energy is
        // casual — same Stallion, no trophy chase. Buck stays competitive
        // with the player but his variance also tightens at high tiers.
        const buckBase = getRivalBaseScore();
        const buckVariance = Math.max(3, 8 - effectiveOverall * 0.04);
        const buckScore = clamp(
          buckBase +
            (Math.random() * buckVariance * 2 - buckVariance) -
            (show.tier === "Cars & Coffee" ? 4 : 0),
        );
        compPool.push({
          name: "Buck's '67 Stallion",
          score: buckScore,
          isRival: true,
        });
        buckInShow = true;
        state.rival.showsEntered++;
        state.rival.score = Math.min(95, buckBase + 2);

        const all = [
          ...compPool,
          {
            name: `Your ${effectiveCar.year} ${effectiveCar.make} ${effectiveCar.model}`,
            score: myScore,
            isPlayer: true,
          },
        ].sort((a, b) => b.score - a.score);

        const place = all.findIndex((e) => e.isPlayer) + 1;
        const buckPlace = buckInShow
          ? all.findIndex((e) => e.isRival) + 1
          : null;
        state.rival.lastPlace = buckPlace;
        if (buckPlace) {
          pushRivalNote(
            `Buck finished ${placeLabel(buckPlace)} at ${show.name}.`,
          );
        }

        const basePrize = show.prizes[place - 1] || 0;
        let bonusCash = 0;
        if (show.tier !== "Cars & Coffee") {
          sponsors.forEach((s) => {
            if (s.cashPerShow) bonusCash += s.cashPerShow;
          });
        }
        let prizeBonus = 0;
        sponsors.forEach((s) => {
          if (s.prizePct) prizeBonus += s.prizePct;
          if (s.nationalPrizePct && show.tier === "National")
            prizeBonus += s.nationalPrizePct;
        });

        const totalPrize = basePrize + Math.round(basePrize * prizeBonus);
        const totalEarned = totalPrize + bonusCash;

        state.money = state.money - entryFee + totalEarned;
        recordMoneyChange(totalEarned - entryFee, `${show.name} payout`);
        state.fuel = Math.max(0, state.fuel - fuelNeed);

        // Off-podium finishes still meet some fans at the show. Tail
        // gain is half of the 5th-place value, with a hard floor of 3.
        const podiumFollowers = show.followers[place - 1];
        const tailFollowers = Math.max(
          3,
          Math.floor((show.followers[show.followers.length - 1] || 0) * 0.5),
        );
        const gained = podiumFollowers ?? tailFollowers;
        const newFollowers = state.followers + gained;
        let showReward = null;
        if (show.tier === "Cars & Coffee") {
          showReward = getCarsAndCoffeeReward();
        }

        const snapon = SPONSORS.find((s) => s.id === 6);
        let toolGifted = null;
        if (
          state.followers < snapon.req &&
          newFollowers >= snapon.req &&
          !state.giftedTools.includes("t17")
        ) {
          if (
            !state.ownedTools.includes("t17") &&
            state.ownedTools.length < workshopData().maxTools
          ) {
            state.ownedTools = [...new Set([...state.ownedTools, "t17"])];
          }
          state.giftedTools.push("t17");
          toolGifted = "Chrome Buffer (Snap-it gift)";
        }

        if (show.tier !== "Cars & Coffee" && sponsors.find((s) => s.freePart))
          state.freePart = true;
        state.followers = newFollowers;
        clampFollowers();
        state.lastShowTier = show.tier;
        state.lastShowPlace = place;
        state.enteredShowsThisWeek.push(show.id);
        if (show.postEntryCooldown) {
          if (!state.nextShowAvailableWeek) state.nextShowAvailableWeek = {};
          state.nextShowAvailableWeek[show.id] =
            state.week + show.postEntryCooldown;
        }

        state.seasonStats.moneyEarned += totalEarned - entryFee;
        state.seasonStats.showsEntered++;
        if (
          !state.seasonStats.bestPlace ||
          place < state.seasonStats.bestPlace ||
          (place === state.seasonStats.bestPlace &&
            ["National", "Regional", "Local"].indexOf(show.tier) <
              ["National", "Regional", "Local"].indexOf(
                state.seasonStats.bestTier || "Local",
              ))
        ) {
          state.seasonStats.bestPlace = place;
          state.seasonStats.bestTier = show.tier;
        }

        const arrivalLine =
          show.tier === "Cars & Coffee"
            ? "You rolled in early, parked crooked, and immediately started pretending the idle sounded intentional."
            : show.tier === "Local"
              ? "Main Street is closed off, sawhorses up, somebody's already plugged in their boom box. Local crowd's already gathering."
              : show.tier === "Regional"
                ? "You can feel the room tighten up now. Fewer jokes, more measuring tape energy."
                : "This is the big stage now. Every panel gap feels like public information.";
        const judgingLine = randomShowComment();
        state.result = {
          show: show.name,
          tier: show.tier,
          week: state.week,
          car: `${effectiveCar.year} ${effectiveCar.make} ${effectiveCar.model}`,
          place,
          score: myScore,
          prize: totalPrize,
          bonusCash,
          fee: entryFee,
          localSponsorCovered: !!localSponsor,
          fuelUsed: fuelNeed,
          net: totalEarned - entryFee,
          gained,
          standings: all,
          toolGifted,
          buckPlace,
          showReward,
          arrivalLine,
          judgingLine,
        };
        state.history.unshift(state.result);
        state.view = "result";
        state.postShowWeekLocked = true;
        state.showCinematicData = {
          arrivalLine,
          judgingComments: pickJudgingComments(effectiveCar, buckPlace, buckInShow),
          buckLine: pickBuckResultLine(place, buckPlace, buckInShow),
          revealReaction: pickRevealReaction(place),
        };
        state.showStage = "arriving";

        if (place === 1 && show.tier === "National" && effectiveOverall >= 90) {
          state.won = true;
          state.pendingVictoryTrigger = true;
        } else if (place === 1 && show.tier === "National") {
          // Won the National at under 90 overall — no trophy build, but the
          // season still ends here. Cinematic plays through, then the season
          // wrap fires.
          state.pendingNationalEnd = true;
        }
        if (place === 1) {
          nudgeWife(
            show.tier === "National" ? 15 : 8,
            show.tier === "National"
              ? `She is telling everyone her husband is a National Champion. All is forgiven. (approval +15)`
              : `She kept the trophy photo. "Okay, it is a pretty car." (approval +8)`,
          );
          pushRivalNote(
            `You just beat the field at ${show.name}. Buck is going to hear about this.`,
          );
          if (show.tier === "Local") maybeAddBuckReaction("firstLocalWin");
        }
        if (buckInShow && state.buck) {
          if (place < buckPlace) state.buck.beatenCount = (state.buck.beatenCount || 0) + 1;
          else if (place > buckPlace) state.buck.lostToCount = (state.buck.lostToCount || 0) + 1;
        }
        if (show.tier === "Cars & Coffee" && state.buck && !state.buck.metOnce) {
          maybeTriggerBuckIntro();
        }
        checkMilestones();
        saveGame();
        advanceWeek("after show");
      }

      function advanceShowStage() {
        if (state.showStage === "arriving") {
          state.showStage = "judging";
          playSfx("swoosh");
        } else if (state.showStage === "judging") {
          state.showStage = "reveal";
          const place = (state.result && state.result.place) || 99;
          if (place === 1) {
            playSfx("applause");
            setTimeout(() => playSfx("success"), 180);
          } else if (place <= 3) {
            playSfx("applause");
          } else if (place <= 5) {
            playSfx("ding");
          } else {
            playSfx("swoosh");
          }
        } else {
          state.showStage = null;
          state.showCinematicData = null;
          state.showLoading = false;
          playSfx("click");
          if (state.pendingVictoryTrigger) {
            state.pendingVictoryTrigger = false;
            triggerVictory();
          } else if (state.pendingNationalEnd) {
            state.pendingNationalEnd = false;
            state.seasonWrap = true;
            toast(
              "National's done. The trophy's yours, the season closes out here.",
              "event-good",
            );
          } else {
            processEventQueue();
            drainWeekAdvanceQueue("queued");
          }
        }
        saveGame();
        requestRender("full");
      }

      const TUTORIAL_BEATS = [
        {
          kicker: "Welcome to the garage",
          art: "🚚🔧",
          headline: "Five grand in. Nationals are 22 weeks out.",
          body:
            "Buy parts, wrench them in yourself or send the car to a shop, then chase shows for cash and reputation. The Auto Shop Floor tells you what's next — trust it while you're learning the ropes.",
        },
      ];

      function advanceTutorial() {
        const next = (state.tutorialStep || 0) + 1;
        if (next >= TUTORIAL_BEATS.length) {
          state.tutorialComplete = true;
          state.tutorialStep = 0;
          playSfx("success");
        } else {
          state.tutorialStep = next;
          playSfx("swoosh");
        }
        saveGame();
        requestRender("full");
      }

      function skipTutorial() {
        state.tutorialComplete = true;
        state.tutorialStep = 0;
        playSfx("click");
        saveGame();
        requestRender("full");
      }

      function snapshotCompletedBuild() {
        const car = currentCar();
        if (!car) return null;
        return {
          id: `build_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
          year: car.year,
          make: car.make,
          model: car.model,
          emoji: car.emoji,
          style: car.style,
          finalOverall: getOverall(car),
          wonNational:
            !!state.won ||
            state.history.some(
              (h) => h.tier === "National" && h.place === 1,
            ),
          completedWeek: state.week,
          completedSeason: (state.legacyBuilds || []).length + 1,
          followersAtCompletion: state.followers,
          bestPlace: state.seasonStats.bestPlace,
          bestTier: state.seasonStats.bestTier,
          partsInstalled: car.installedParts ? car.installedParts.length : 0,
        };
      }

      function triggerVictory() {
        if (state.pendingVictory) return;
        state.pendingVictory = {
          build: snapshotCompletedBuild(),
          totalBuilds: (state.legacyBuilds || []).length + 1,
        };
        saveGame();
      }

      function dismissVictoryCallItDone() {
        const v = state.pendingVictory;
        if (!v) return;
        if (v.build) {
          state.legacyBuilds = [v.build, ...(state.legacyBuilds || [])];
        }
        state.pendingVictory = null;
        state.seasonWrap = true;
        playSfx("click");
        saveGame();
        requestRender("full");
      }

      function startLegacyRun() {
        const v = state.pendingVictory;
        if (v && v.build) {
          state.legacyBuilds = [v.build, ...(state.legacyBuilds || [])];
        } else {
          const snap = snapshotCompletedBuild();
          if (snap) state.legacyBuilds = [snap, ...(state.legacyBuilds || [])];
        }
        // Reset season but PRESERVE the fleet — the trophy car stays
        state.week = 1;
        state.won = false;
        state.pendingVictory = null;
        state.pendingVictoryTrigger = false;
        state.pendingNationalEnd = false;
        state.seasonWrap = false;
        state.history = [];
        state.activeRestorations = [];
        state.enteredShowsThisWeek = [];
        state.postShowWeekLocked = false;
        state.result = null;
        state.pendingAdvanceReason = null;
        state.winterStorageReport = null;
        state.winterAppliedForSeason = false;
        state.freshHeadline = "";
        state.pendingMarketplaceOffer = null;
        state.pendingBrandDeal = null;
        state.pendingEvent = null;
        state.pendingScene = null;
        state.eventQueue = [];
        state.showStage = null;
        state.showCinematicData = null;
        state.showLoading = false;
        state.lastShowTier = null;
        state.lastShowPlace = null;
        state.noticeQueue = [];
        state.milestones = {
          firstShow: false,
          hit50: false,
          wonRegional: false,
          threeSponsors: (state.legacyBuilds.length > 0),
          homeGarage: state.workshopLevel !== "curb",
          wonNational: false,
        };
        state.rival = { score: 32 + (state.legacyBuilds.length || 0) * 4, showsEntered: 0, lastPlace: null };
        state.seasonStats = {
          moneyStart: state.money,
          moneyEarned: 0,
          showsEntered: 0,
          bestPlace: null,
          bestTier: null,
          startOverall: 0,
        };
        state.view = "dealership";
        playSfx("success");
        toast("Legacy run started. Trophy car is still in the garage — pick up an existing build or grab a new project from the Marketplace.", "event-good");
        saveGame();
        requestRender("full");
      }

      function openLegacyWall() {
        state.view = "legacy";
        playSfx("swoosh");
        requestRender("full");
      }

      function buyCar(id) {
        const c = BUYABLE_CARS.find((x) => x.id === id);
        if (state.money < c.price) return toast("Not enough cash.", "err");
        if (state.cars.find((x) => x.id === c.id))
          return toast("Already in your garage.", "err");
        const { price, ...data } = c;
        state.money -= price;
        recordMoneyChange(
          -price,
          `Vehicle purchase: ${c.year} ${c.make} ${c.model}`,
        );
        state.cars.push({ ...data, installedParts: [] });
        state.carId = c.id;
        nudgeWife(
          price >= 8000 ? -10 : -6,
          price >= 8000
            ? `"${c.model}. So that is where the vacation fund went." (approval -10)`
            : `"Another project. Sure. The lawn mower is still broken, by the way." (approval -6)`,
        );
        state.view = "workshop";
        saveGame();
        requestRender("full");
      }

        // the session — same as heading home, the weekend's over.
        if (!tabUnlocked(v) && !(v === "dealership" && !currentCar())) {
          lockedTabNudge();
          return;

        if (v !== "dealership" && state.atTrip) endScavengeTrip(true);

  ═══════════════════════════════════════════ */
      function panel(title, body, subtitle = "", accent = "#c99842", extraClass = "") {
        return `<div class="panel ${extraClass}"><div class="panel-header"><div><div class="panel-title" style="color:${accent}">${title}</div>${subtitle ? `<div class="panel-sub">${subtitle}</div>` : ""}</div><div class="dots"><div class="dot"></div><div class="dot"></div></div></div>${body}</div>`;
      }
      function heroPanel(kicker, title, sub, body, tone = "gold", extraClass = "") {
        const toneCls = tone === "blue" ? "hero-blue" : "";
        return `<div class="hero-panel ${toneCls} ${extraClass}">${kicker ? `<div class="hero-panel-kicker">${kicker}</div>` : ""}${title ? `<div class="hero-panel-title">${title}</div>` : ""}${sub ? `<div class="hero-panel-sub">${sub}</div>` : ""}${body}</div>`;
      }
      function tab(label, active, onclick) {
        const spaceIdx = label.indexOf(" ");
        const icon = spaceIdx === -1 ? label : label.slice(0, spaceIdx);
        const text = spaceIdx === -1 ? "" : label.slice(spaceIdx + 1);
        return `<button class="tab ${active ? "active" : ""}" onclick="${onclick}">${icon}${text ? ` <span class="tab-label-text">${text}</span>` : ""}</button>`;
      }
      function button(
        label,
        onclick,
        disabled = false,
        extraClass = "",
        style = "",
      ) {
        return `<button class="btn ${extraClass}" style="${style}" onclick="${onclick}" ${disabled ? "disabled" : ""}>${label}</button>`;
      }
      function gauge(label, value, max, color = "#c99842") {
        const pct = Math.max(0, Math.min(1, value / max));
        return `<div>${label ? `<div class="gauge-label"><span>${label}</span><span style="color:var(--text);font-weight:bold">${value}/${max}</span></div>` : ""}<div class="gauge-wrap"><div class="gauge-fill" style="width:${pct * 100}%;background:linear-gradient(90deg,${color} 0%,${color}CC 100%)"></div></div></div>`;
      }
      function chalkRow(k, v, cls = "") {
        return `<div class="row"><span class="row-k">${k}</span><span class="row-v ${cls}">${v}</span></div>`;
      }

      function renderUpcomingBar() {
        const { nextShow, nextShowText } = getUpcomingSummary();
        const totalLoan = state.bankLoanBalance + state.sharkLoanBalance;
        const loanLine =
          totalLoan > 0
            ? chalkRow("Loan Balance", `$${fmt(totalLoan)}`, "warn")
            : chalkRow("Loan", "None");
        return panel(
          "Upcoming",
          `${chalkRow("Current Week", `${state.week}/${state.seasonLength}`)}${chalkRow("Paycheck", `${PAYCHECK_CYCLE - state.paycheckProgress} week(s)`)}${chalkRow("Next Event", nextShowText, nextShow.weeksUntil === 0 ? "good" : "warn")}${loanLine}`,
          "",
          "#f5efe0",
          "chalkboard",
        );
      }

      function togglePause() {
        if (state.settings.paused) {
          // Unpause: push all active task finish times forward by the elapsed pause duration
          const pauseElapsed = Date.now() - (state.pausedAt || Date.now());
          if (pauseElapsed > 0) {
            (state.activeRestorations || []).forEach((task) => {
              if (!task.completed) {
                task.startTime += pauseElapsed;
                task.finishTime += pauseElapsed;
              }
            });
          }
          state.settings.paused = false;
          state.pausedAt = 0;
          toast("Resumed", "ok");
        } else {
          state.settings.paused = true;
          state.pausedAt = Date.now();
          toast("Paused", "ok");
        }
        saveGame();
        requestRender("modal");
      }

      function isFullscreenSupported() {
        const el = document.documentElement;
        return !!(
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.mozRequestFullScreen ||
          el.msRequestFullscreen
        );
      }
      function isInFullscreen() {
        return !!(
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.mozFullScreenElement ||
          document.msFullscreenElement
        );
      }
      function toggleFullscreen() {
        if (!isFullscreenSupported()) {
          toast("Fullscreen isn't supported in this browser.", "err");
          return;
        }
        const handleErr = (err) => {
          const msg = err && err.message ? err.message : String(err || "");
          toast(`Fullscreen blocked${msg ? ": " + msg : ""}.`, "err");
        };
        try {
          if (isInFullscreen()) {
            const exit =
              document.exitFullscreen ||
              document.webkitExitFullscreen ||
              document.mozCancelFullScreen ||
              document.msExitFullscreen;
            if (!exit) return handleErr(new Error("Exit method missing"));
            const result = exit.call(document);
            if (result && typeof result.catch === "function") {
              result.catch(handleErr);
            }
          } else {
            const el = document.documentElement;
            const req =
              el.requestFullscreen ||
              el.webkitRequestFullscreen ||
              el.mozRequestFullScreen ||
              el.msRequestFullscreen;
            if (!req) return handleErr(new Error("Request method missing"));
            const result = req.call(el);
            if (result && typeof result.catch === "function") {
              result.catch(handleErr);
            }
          }
        } catch (err) {
          handleErr(err);
        }
        playSfx("click");
      }
      function syncFullscreenButtons() {
        const supported = isFullscreenSupported();
        const inFs = isInFullscreen();
        const topBtn = getEl("fullscreenBtn");
        if (topBtn) {
          topBtn.style.display = supported ? "" : "none";
          topBtn.textContent = inFs ? "⤡" : "⤢";
          topBtn.title = inFs ? "Exit fullscreen" : "Enter fullscreen";
        }
        // Settings modal button gets re-rendered when toggled, but
        // when fullscreen state changes externally (Esc key), we
        // also need to refresh the modal if it's open.
        if (state.settingsOpen) requestRender("modal");
      }
      function resetSaveConfirm() {
        let confirmed = false;
        try {
          confirmed = window.confirm(
            "Wipe your save and start over from scratch? This can't be undone.",
          );
        } catch (e) {
          // Some embedded contexts (sandboxed iframes, in-app browsers)
          // block window.confirm. Fall through to the destructive path
          // anyway — the user clicked a clearly-labeled red button.
          confirmed = true;
        }
        if (!confirmed) return;
        try {
          // Reset in-memory state first — the beforeunload handler will
          // try to saveGame() during the reload, and if state still holds
          // the old game it would just re-write what we just deleted.
          Object.assign(state, makeDefaultState());
          try {
            localStorage.removeItem(SAVE_KEY);
          } catch (e) {}
          location.reload();
        } catch (err) {
          toast(
            `Reset failed: ${err && err.message ? err.message : "unknown error"}.`,
            "err",
          );
        }
      }

        if (!beat) return false;
        const isLast = idx === TUTORIAL_BEATS.length - 1;
        const pips = TUTORIAL_BEATS.map((_, i) => {
          const cls = i === idx ? "active" : i < idx ? "done" : "";
          return `<div class="tutorial-progress-pip ${cls}"></div>`;
        }).join("");
        const pointsMarkup = beat.points
          ? `<div class="tutorial-points">${beat.points

              .join("")}</div>`

      function applyCheatCode(code) {
        if (code === "BARNFIND") {
          state.money += 50000;
          recordMoneyChange(50000, "Cheat: BARNFIND");
          pushNotice(
            "🏚 Barn find. Dragged home a Cobra shell, parted it out on Marketplace in an afternoon. +$50,000.",
            "good",
          );
          return true;
        }
        if (code === "DALE") {
          if (!state.mechanic)
            state.mechanic = { metOnce: false, trust: 0, shopVisits: 0, milestoneSeen: false };
          state.mechanic.metOnce = true;
          state.mechanic.trust = 10;
          state.mechanic.milestoneSeen = true;
          pushNotice(
            "🔧 Dale says he trusts you with anything now. Full 15% shop discount permanent.",
            "good",
          );
          return true;
        }
        if (code === "BUILT") {
          const car = currentCar();
          if (!car) {
            toast("No car in the garage to upgrade.", "err");
            return true;
          }
          CATS.forEach((cat) => {
            car[cat] = clamp((car[cat] || 0) + 15);
          });
          pushNotice(
            `🛠 ${car.year} ${car.make} jumped 15 points in every category. Don't tell anybody where you got the parts.`,
            "good",
          );
          return true;
        }
        if (code === "SNAPON") {
          const wsIdx = getWorkspaceIndex(state.workshopLevel);
          const unlocked = TOOLS_LIST.filter(
            (t) =>
              !state.ownedTools.includes(t.id) &&
              getWorkspaceIndex(t.workshop) <= wsIdx,
          );
          const storage = toolStorageData();
          const headroom = Math.max(0, storage.maxTools - state.ownedTools.length);
          const take = unlocked.slice(0, headroom);
          take.forEach((t) => state.ownedTools.push(t.id));
          pushNotice(
            `🟡 Snap-it driver unloaded ${take.length} tool${take.length === 1 ? "" : "s"} on the bench. Didn't ask for payment. Said "we'll figure it out."`,
            "good",
          );
          return true;
        }
        if (code === "LEGEND") {
          state.followers = MAX_FOLLOWERS;
          pushNotice(
            "🎥 A clip of your build went nuclear overnight. 1,000,000 followers. Your phone has stopped being useful.",
            "good",
          );
          return true;
        }
        if (code === "HAYLEY") {
          const warehouseIdx = WORKSPACE_LEVELS.findIndex((w) => w.id === "warehouse");
          if (warehouseIdx < 0) return false;
          if (getWorkspaceIndex(state.workshopLevel) >= warehouseIdx) {

          pushNotice(
            "🎰 Hayley hit the Megabucks at the casino. Walked in with the check and handed you the keys to a warehouse. Said 'now fix the truck somewhere with a roof.'",
            "good",
          );
          return true;
        }
        return false;
      }

      function onboardStageVal() {

        const s = onboardStageVal();
        if (id === "workshop" || id === "garage") return true;
        if (id === "dealership") return s >= 1;
        if (id === "career" || id === "legacy") return s >= 2;
        if (id === "shows") return s >= 3;
        return true;
      }
      const ONBOARD_UNLOCKS = {
        1: { tab: "dealership", emoji: "📘", title: "The Marketplace is open", cta: "Open the Marketplace →",
             text: "She runs. Word travels fast when a dead truck comes back to life — and that pile of take-off parts in the corner is worth real money. List parts, field offers from lowballers, and hit Saturday scavenge trips for cheap donor parts." },

      };
      function checkOnboardUnlocks() {
        const s = onboardStageVal();
        if (s >= 3 || !state.tutorialComplete || state.pendingUnlock) return;
        let next = 0;
        if (s === 0 && (state.cars || []).some((c) => roadworthy(c))) next = 1;
        else if (s === 1 && (state.partsInventory || []).some((i) => i.listed || i.sold)) next = 2;
        else if (s === 2 && (state.postHistory || []).length > 0) next = 3;
        if (!next) return;
        state.onboardStage = next;
        state.pendingUnlock = ONBOARD_UNLOCKS[next];
        playSfx("success");
        saveGame();
      }

      function thisWeekNudge(car) {
        const ob = onboardStageVal();
        if (ob === 0) {
          const gaps = [];
          if (car.engine < ROADWORTHY_ENGINE) gaps.push("engine");
          if (car.transmission < ROADWORTHY_TRANSMISSION) gaps.push("transmission");
          if (car.brakes < ROADWORTHY_BRAKES) gaps.push("brakes");
          return gaps.length
            ? `Get the ${gaps.join(", ")} sorted. Once she's roadworthy, the Marketplace opens up.`
            : "She's roadworthy — the Marketplace is opening up.";
        }
        if (ob === 1) return "Head to the Marketplace and list a take-off part — selling funds the build, and it gets the scene talking.";
        if (ob === 2) return "Open Social and drop your first post. Followers turn into cash and sponsors.";
        const rw = roadworthy(car);
        const up = getUpcomingSummary();
        const next = up.nextShow;
        const weeks = next && next.weeksUntil;
        const deadline = weeks === 0 ? "this week" : weeks === 1 ? "next week" : weeks != null ? `in ${weeks} weeks` : "when it reopens";
        if (!rw) {
          const gaps = [];
          if (car.engine < ROADWORTHY_ENGINE) gaps.push("engine");
          if (car.transmission < ROADWORTHY_TRANSMISSION) gaps.push("transmission");
          if (car.brakes < ROADWORTHY_BRAKES) gaps.push("brakes");
          return `Get the ${gaps.join(", ")} sorted so it can drive itself to ${next ? next.name : "a show"} ${next ? deadline : ""}.`.trim();
        }
        const paint = getCategoryCompletion(car, "paint");
        const overall = getOverall(car);
        if (next && next.minScore && overall < next.minScore) {
          return `${next.name} wants ~${next.minScore} overall — you're at ${overall}. Keep building before it lands ${deadline}.`;
        }
        if (paint && !paint.allDone && overall >= 55) {
          return `Drivetrain's done — pour the next dollars into paint & body to climb the standings at ${next ? next.name : "the next show"} ${next ? deadline : ""}.`;
        }
        if (next && weeks === 0) {
          return `${next.name} is on today. Top off fuel, then head to Compete when you're happy with the build.`;
        }
        return `Roadworthy and climbing. Chase overall for ${next ? next.name : "the next show"} ${next ? deadline : ""}, or take a Family Saturday if the shows can wait.`;
      }

        const placeColor = isCoffee
          ? r.place <= 2 ? "var(--gold)" : r.place <= 4 ? "var(--text-bright)" : "var(--text-dim)"
          : r.place === 1 ? "#d8a24f" : r.place === 2 ? "#d8a24f" : r.place === 3 ? "#bdb7ab" : "#8f8577";
        const placeIcon = isCoffee
          ? r.place <= 2 ? "☕" : r.place <= 4 ? "🚗" : "🌫"
          : r.place === 1 ? "🏆" : r.place === 2 ? "🥈" : r.place === 3 ? "🥉" : "📋";
        const placeText = isCoffee
          ? r.place === 1
            ? "Turned Heads"
            : r.place <= 3
              ? "Got Noticed"
              : r.place <= 5
                ? "Showed Up"
                : "Quiet Morning"
          : placeLabel(r.place);
        const carLine = isCoffee
          ? `<div class="small" style="color:var(--text);margin-bottom:2px">${r.car}</div>`
          : `<div class="small" style="color:var(--text);margin-bottom:2px">${r.car} · Score ${r.score}</div>`;
        const isWin = isCoffee ? r.place === 1 : r.place === 1;
        const championRibbon = isWin
          ? `<div class="champ-ribbon">${isCoffee ? "☕ Show Stealer" : `🏆 ${r.tier} Champion`}</div>`
          : "";
        const shareHint = isWin
          ? `<div class="tiny muted" style="text-align:center;margin-top:10px;font-style:italic;opacity:.85">📸 Screenshot the build and post it — @${(r.car || "your build").replace(/[^A-Za-z0-9]/g, "").slice(0, 14) || "yourbuild"} earned it.</div>`
          : "";
        const heroTop = `<div style="text-align:center;padding:4px 0 2px">${championRibbon}<div style="font-size:40px;line-height:1;margin-bottom:4px">${placeIcon}</div><div style="color:${placeColor};font-weight:bold;font-size:${isCoffee ? "22px" : "28px"};letter-spacing:0.5px;margin-bottom:4px">${placeText}</div>${carLine}${buckLine}${r.localSponsorCovered ? `<div class="tiny good" style="margin-top:6px">Entry fee covered by town sponsor.</div>` : ""}${rewardLine ? `<div style="margin-top:8px">${rewardLine}</div>` : ""}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:10px 0 4px">${[
          isCoffee ? null : ["Net", `${r.net >= 0 ? "+" : ""}$${fmt(r.net)}`, r.net >= 0 ? "#87c77b" : "#d38a76"],
          r.bonusCash > 0 ? ["Sponsor", `+$${fmt(r.bonusCash)}`, "#d8a24f"] : null,
          ["Followers", `+${fmtF(r.gained)}`, "#b68ae6"],
        ].filter(Boolean).map(([label, val, col]) => `<div style="background:#191511;border:1px solid #41372f;border-radius:8px;padding:9px 6px;text-align:center"><div style="color:${col};font-weight:bold;font-size:16px">${val}</div><div class="tiny muted" style="letter-spacing:.5px;margin-top:2px">${label.toUpperCase()}</div></div>`).join("")}</div>${
          isCoffee
            ? ""
            : `<div class="tiny muted" style="text-align:center;margin-bottom:4px">Prize $${fmt(r.prize)} · Entry -$${fmt(r.fee)} · Fuel -${r.fuelUsed} gal</div>`
        }${shareHint}`;
        const standingsBody = `${r.standings.map((e, i) => `<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 6px;border-bottom:${i < r.standings.length - 1 ? "1px dashed #453a31" : "none"};background:${e.isPlayer ? "rgba(79,112,74,0.18)" : e.isRival ? "rgba(112,40,40,0.15)" : "transparent"};border-radius:4px"><div style="display:flex;gap:10px"><span style="color:${i === 0 ? "#d8a24f" : "#7d7468"};font-weight:bold;width:18px">${i + 1}</span><span style="color:${e.isPlayer ? "#9fd18e" : e.isRival ? "#e07070" : "#e4d8c1"};font-size:14px">${e.name}${e.isRival ? `<span class="rival-badge">RIVAL</span>` : ""}</span></div><span class="small muted">${isCoffee ? "" : e.score}</span></div>`).join("")}`;
        const narrativeBody = `<div style="margin-top:2px">${[r.arrivalLine, isCoffee ? "" : r.judgingLine, vibeLine].filter(Boolean).map((line) => `<div class="small" style="color:var(--text);line-height:1.6;margin-bottom:8px">${line}</div>`).join("")}${buckVibe ? `<div class="tiny muted">${buckVibe}</div>` : ""}</div>`;
        const heroTitle = isCoffee
          ? `${r.show} · Hangout`
          : `${placeLabel(r.place)} · ${r.show}`;
        const storyBody = `<div class="${isWin ? "beauty-card" : ""}">${carPreview(car).replace(workspaceBackdropFrame(), showBackdropFrame(r.tier))}${heroTop}</div>${narrativeBody}`;
        return `<div class="grid-main result-grid"><div>${panel(
          heroTitle,
          storyBody,
          "",
          placeColor,
        )}${panel(isCoffee ? "Crowd Pleasers" : "Final Standings", standingsBody, "", "#7da0c2")}</div><div><div class="result-action-bar">${panel("After the Show", `${button("Back to Garage", "state.postShowWeekLocked=false; setView('garage')", false, "", "width:100%")}`, state.won ? "You won the National Show. The build is complete." : "", "#d8a24f")}</div>${renderUpcomingBar()}</div></div>`;
      }

      // Ending the Saturday trip burns the weekend — advance one week
      // the way entering a show would, regenerate inventory for the
      // next visit, and clear the trip session. Centralised so head-
      // home, leaving the tab, and end-of-trip flows all behave the
      // same way.
      function endScavengeTrip(silent = false) {
        if (!state.atTrip && !state.scavengeChoice) return;
        const wasAt = state.scavengeChoice;
        state.atTrip = false;
        state.scavengeChoice = null;
        if (!silent && wasAt) {
          toast(
            wasAt === "junkyard"
              ? "Threw the haul in the truck and rolled out. Saturday's gone."
              : "Walked back to the truck. Pomona ate your Saturday.",
            "ok",
          );
        }
        advanceWeek("Saturday trip");
        regenerateScavengeStock();
      }

      function headHomeFromTrip() {
        endScavengeTrip(false);
      }

      function renderScavengeTrip() {
        const choice = state.scavengeChoice;
        const atTrip = !!state.atTrip && !!choice;
        if (atTrip && choice === "junkyard") {
          const yardItems = state.junkyardStock
            .map((s) => {
              const part = PARTS.find((p) => p.id === s.partId);
              if (!part) return "";
              const yardImp = Math.max(1, Math.round(part.imp * s.conditionMult));
              const missing = (part.tools || []).filter(
                (tid) => !state.ownedTools.includes(tid),
              );
              const missingNote = missing.length
                ? `<div class="tiny" style="color:var(--red-bright);margin-top:4px">Need ${missing.map((id) => TOOLS_LIST.find((t) => t.id === id)?.name).join(", ")}</div>`
                : "";
              const target = pickPullTargetCar(part);
              const noTarget = !target;
              const noTargetNote = noTarget
                ? `<div class="tiny muted" style="margin-top:4px">No car in the garage can take it right now.</div>`
                : target.id !== state.carId
                  ? `<div class="tiny muted" style="margin-top:4px">→ Will land on your ${target.year} ${target.make} (other tab).</div>`
                  : "";
              return `<div class="feed-item">
                <div class="feed-kicker">PICK-A-PART · ${(part.tier || "").toUpperCase()}</div>
                <div class="feed-text">${part.name}</div>
                <div class="feed-meta">+${yardImp} ${CAT_LABELS[part.category]} (vs +${part.imp} new) · normally $${fmt(part.diy)} new</div>
                ${missingNote}${noTargetNote}
                ${button(`Pull it · $${fmt(s.price)}`, `pullYardPart(${part.id})`, state.money < s.price || missing.length > 0 || noTarget, "", "width:100%;margin-top:8px;font-size:12px")}
              </div>`;
            })
            .join("");
          const headHome = `<div class="info-box" style="background:rgba(217,162,79,0.07);border:1px solid rgba(217,162,79,0.4);margin-top:12px;padding:10px 12px"><div class="tiny muted" style="line-height:1.5;margin-bottom:8px">⏰ Heading home (or leaving the Marketplace tab) <strong style="color:var(--text)">advances one week</strong> — same way entering a show would. The Saturday's gone either way.</div>${button("Head home → next week", "headHomeFromTrip()", false, "", "width:100%;background:#4a3c2e;border-color:#6b5840;color:var(--text);font-size:12px")}</div>`;
          return `<div style="margin-bottom:14px">${heroPanel(
            "Pick-A-Part · Saturday Run",
            "Walk the rows, pull what you can use",
            "Yard parts give ~30% less stat lift than new.",
            (yardItems || `<div class="small muted">Picked clean. Rough day at the yard.</div>`) + headHome,
            "blue",
          )}</div>`;
        }
        if (atTrip && choice === "swap") {
          const swapItems = state.swapMeetStock
            .map((s) => {
              const tool = TOOLS_LIST.find((t) => t.id === s.toolId);
              if (!tool) return "";
              const owned = state.ownedTools.includes(tool.id);
              return `<div class="feed-item">
                <div class="feed-kicker">POMONA SWAP</div>
                <div class="feed-text">${tool.emoji} ${tool.name}</div>
                <div class="feed-meta">$${fmt(s.price)} · normally $${fmt(tool.cost)}</div>
                <div class="tiny muted" style="margin-top:4px;line-height:1.5">${tool.desc}</div>
                ${button(owned ? "Already in your box" : `Buy · $${fmt(s.price)}`, `buySwapTool('${tool.id}')`, owned || state.money < s.price, "", "width:100%;margin-top:8px;font-size:12px")}
              </div>`;
            })
            .join("");
          const headHome = `<div class="info-box" style="background:rgba(217,162,79,0.07);border:1px solid rgba(217,162,79,0.4);margin-top:12px;padding:10px 12px"><div class="tiny muted" style="line-height:1.5;margin-bottom:8px">⏰ Heading home (or leaving the Marketplace tab) <strong style="color:var(--text)">advances one week</strong> — same way entering a show would. The Saturday's gone either way.</div>${button("Head home → next week", "headHomeFromTrip()", false, "", "width:100%;background:#4a3c2e;border-color:#6b5840;color:var(--text);font-size:12px")}</div>`;
          return `<div style="margin-bottom:14px">${heroPanel(
            "Pomona Swap · Saturday Run",
            "Cash only, no receipts, no warranty",
            "",
            (swapItems || `<div class="small muted">Tables are bare. Came too late.</div>`) + headHome,
            "gold",
          )}</div>`;
        }
        const yardCount = state.junkyardStock.length;
        const swapCount = state.swapMeetStock.length;
        const ride = canMakeScavengeTrip();
        const noRideBanner = ride.ok
          ? ""
          : `<div class="info-box" style="background:rgba(196,109,96,0.07);border:1px solid rgba(196,109,96,0.4);margin-bottom:12px;padding:10px 12px"><div class="tiny" style="color:var(--red-bright);font-weight:bold;margin-bottom:2px">🚫 No way to get there</div><div class="tiny muted" style="line-height:1.5">${ride.msg} Get the project running (engine ${ROADWORTHY_ENGINE}+, transmission ${ROADWORTHY_TRANSMISSION}+, brakes ${ROADWORTHY_BRAKES}+) and the trip opens up.</div></div>`;
        const yardCard = `<div style="background:rgba(125,160,194,0.07);border:1px solid rgba(125,160,194,0.4);border-radius:8px;padding:12px">
            <div class="small" style="color:var(--blue-bright);font-weight:bold;margin-bottom:6px">🔩 Pick-A-Part</div>
            <div class="tiny" style="color:var(--text);margin-bottom:8px">${yardCount} part${yardCount === 1 ? "" : "s"} on the lot today</div>
            <div class="tiny muted" style="margin-bottom:8px">$${JUNKYARD_GAS_COST} gas + $${JUNKYARD_ENTRY_FEE} entry = <span style="color:var(--text)">$${JUNKYARD_TRIP_COST}</span></div>
            ${button(`Hit the Yard · $${JUNKYARD_TRIP_COST}`, "commitScavengeTrip('junkyard')", !ride.ok || state.money < JUNKYARD_TRIP_COST || !yardCount, "", "width:100%;background:#7da0c2;border-color:var(--blue-bright)")}
          </div>`;
        const swapCard = `<div style="background:rgba(217,162,79,0.07);border:1px solid rgba(217,162,79,0.4);border-radius:8px;padding:12px">
            <div class="small" style="color:var(--gold);font-weight:bold;margin-bottom:6px">🛠 Pomona Swap</div>
            <div class="tiny" style="color:var(--text);margin-bottom:8px">${swapCount} tool${swapCount === 1 ? "" : "s"} on tables today</div>
            <div class="tiny muted" style="margin-bottom:8px">$${SWAP_GAS_COST} gas + $${SWAP_ENTRY_FEE} entry + $${SWAP_PARKING_COST} parking = <span style="color:var(--text)">$${SWAP_TRIP_COST}</span></div>
            ${button(`Hit the Swap · $${SWAP_TRIP_COST}`, "commitScavengeTrip('swap')", !ride.ok || state.money < SWAP_TRIP_COST || !swapCount, "", "width:100%")}
          </div>`;
        return `<div style="margin-bottom:14px">${heroPanel(
          "Saturday Road Trip",
          "Pick-A-Part or Pomona Swap",
          (state.scavengeTripsTaken || 0) < 2
            ? "Pick one. Bring cash. The trip burns the weekend — same as entering a show."
            : "",
          `${noRideBanner}<div class="info-box" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;background:transparent;border:none;padding:0">${yardCard}${swapCard}</div>`,
          "blue",
        )}</div>`;
      }

      function renderDealership() {
        resolveCompletedRestorations(false);
        if (state.atTrip) return renderScavengeTrip();
        const stash = state.partsInventory.filter((i) => !i.listed && !i.sold);
        const listed = state.partsInventory.filter((i) => i.listed && !i.sold);

        const STASH_PREVIEW = 5;
        const LISTED_PREVIEW = 5;
        const stashExpanded = !!state.marketplaceStashExpanded;
        const listedExpanded = !!state.marketplaceListedExpanded;
        const stashShown = stashExpanded ? stash : stash.slice(0, STASH_PREVIEW);
        const listedShown = listedExpanded ? listed : listed.slice(0, LISTED_PREVIEW);
        const stashHidden = Math.max(0, stash.length - stashShown.length);
        const listedHidden = Math.max(0, listed.length - listedShown.length);
        const listedTotal = listed.reduce((sum, i) => sum + (i.askingPrice || 0), 0);

        const stashSummary = stash.length
          ? `<div class="tiny muted" style="margin-bottom:8px;line-height:1.5">Firm = negotiate · Get it Gone = auto-sell on reasonable offers · Trade = patient</div>`
          : "";
        const listedSummary = listed.length
          ? `<div class="tiny muted" style="margin-bottom:8px">${listed.length} live listing${listed.length === 1 ? "" : "s"} · asking <span style="color:var(--gold);font-weight:bold">$${fmt(listedTotal)}</span> total</div>`
          : "";

        const stashToggle = stash.length > STASH_PREVIEW
          ? `<div style="text-align:center;margin-top:8px">${button(stashExpanded ? "Show less" : `Show all ${stash.length} parts`, "toggleStashExpanded()", false, "", "padding:6px 14px;font-size:11px;background:transparent;color:var(--gold-soft);border:1px solid rgba(217,162,79,0.4)")}</div>`
          : "";
        const listedToggle = listed.length > LISTED_PREVIEW
          ? `<div style="text-align:center;margin-top:8px">${button(listedExpanded ? "Show less" : `Show all ${listed.length} listings`, "toggleListedExpanded()", false, "", "padding:6px 14px;font-size:11px;background:transparent;color:var(--gold-soft);border:1px solid rgba(217,162,79,0.4)")}</div>`
          : "";

        const stashMarkup = stash.length
          ? stashSummary + stashShown
              .map(
                (item) => `
      <div class="feed-item">
        <div class="feed-kicker">PARTS STASH</div>
        <div class="feed-text">${item.name}</div>
        <div class="feed-meta">${item.sourcePart} · baseline value $${fmt(item.baselineValue || 0)}</div>
        <div class="btn-row three" style="margin-top:8px">
          ${button("Firm on Price", `listPartOnMarketplaceWithTone('${item.id}','firm')`, false, "", "width:100%;padding:6px 8px;font-size:11px")}
          ${button("Get it Gone", `listPartOnMarketplaceWithTone('${item.id}','gone')`, false, "", "width:100%;padding:6px 8px;font-size:11px;background:#7da0c2;border-color:var(--blue-bright)")}
          ${button("Open for Trade", `listPartOnMarketplaceWithTone('${item.id}','trade')`, false, "", "width:100%;padding:6px 8px;font-size:11px;background:#4a3c2e;color:var(--text);border-color:#6b5840")}
        </div>
      </div>
    `,
              )
              .join("") + stashToggle
          : `<div class="small muted">No loose parts waiting right now. As you replace parts on your build, take-offs will show up here.</div>`;

        const listedMarkup = listed.length
          ? listedSummary + listedShown
              .map(
                (item) => `
      <div class="feed-item">
        <div class="feed-text">${item.name}</div>
        <div class="feed-meta">$${fmt(item.askingPrice)} · ${item.listingTone === "gone" ? "GET IT GONE" : item.listingTone === "trade" ? "OPEN FOR TRADE" : "FIRM ON PRICE"} · ${item.sourcePart}</div>
      </div>
    `,
              )
              .join("") + listedToggle
          : `<div class="small muted">No live listings right now. List a take-off part and it should appear here immediately.</div>`;

        const carsForSale = BUYABLE_CARS.filter(
          (c) => !state.cars.find((x) => x.id === c.id),
        );
        const LOT_PREVIEW = 3;
        const lotExpanded = !!state.lotExpanded;
        const lotShown = lotExpanded
          ? carsForSale
          : carsForSale.slice(0, LOT_PREVIEW);
        const lotHidden = Math.max(0, carsForSale.length - lotShown.length);
        const lotToggle = carsForSale.length > LOT_PREVIEW
          ? `<div style="text-align:center;margin-top:8px">${button(lotExpanded ? "Show less" : `Show all ${carsForSale.length} listings`, "toggleLotExpanded()", false, "", "padding:6px 14px;font-size:11px;background:transparent;color:var(--gold-soft);border:1px solid rgba(217,162,79,0.4)")}</div>`
          : "";
        const carBuyMarkup = carsForSale.length
          ? lotShown
              .map(
                (c) => `
      <div class="feed-item">
        <div class="feed-kicker">CARS FOR SALE</div>
        <div class="feed-text">${c.year} ${c.make} ${c.model}</div>
        <div class="feed-meta">$${fmt(c.price)} · Score ${Math.round((c.engine + c.transmission + c.brakes + c.body + c.paint + c.interior + c.chrome) / 7)} starter · Marketplace find</div>
        ${button(`Buy for $${fmt(c.price)}`, `buyCar(${c.id})`, state.money < c.price, "", "width:100%;margin-top:8px")}
      </div>
    `,
              )
              .join("") + lotToggle
          : `<div class="small muted">Every project on the lot is already in your garage. Move some metal before more comes around.</div>`;

        const marketTab = state.marketTab || "sell";
        const pillRow = `<div class="cat-pill-row">${[
          ["trip", "🛻", "Road Trip"],
          ["sell", "💰", "Sell Parts"],
          ["buy", "🚗", "Buy Cars"],
        ]
          .map(
            ([id, icon, label]) =>
              `<button class="cat-pill ${marketTab === id ? "active" : ""}" onclick="setMarketTab('${id}')"><span class="cat-pill-icon">${icon}</span>${label}</button>`,
          )
          .join("")}</div>`;

        if (marketTab === "trip") return pillRow + renderScavengeTrip();

        if (marketTab === "buy") {
          return `${pillRow}${heroPanel(
            "On the Lot",
            "Someone else's project, yours for the right price",
            "Most great builds start as someone else's bad decision.",
            `
      <div class="info-box">
        <div class="small" style="color:var(--text-bright);font-weight:bold;margin-bottom:8px">Cars for sale</div>
        ${carBuyMarkup}
      </div>
    `,
            "blue",
            "marketplace",
          )}`;
        }

        return `${pillRow}${heroPanel(
          "Sell on Marketplace",
          "Move the parts you're done with",
          "",
          `
      ${!state.wifeCarSold && currentCar() ? `<div class="info-box" style="background:rgba(196,109,96,0.07);border-color:rgba(196,109,96,0.4);margin-bottom:12px"><div class="small" style="color:var(--red-bright);font-weight:bold;margin-bottom:6px">🚙 Sell the wife's daily driver?</div><div class="tiny" style="color:var(--text);margin-bottom:8px">It's clean, it runs, and she's at her sister's for the weekend. The Marketplace listing practically writes itself. What could go wrong.</div>${button("List the wife's car · ~$8,000", "sellWifeCar()", false, "", "width:100%;background:linear-gradient(180deg,#c97d70 0%,#8c4e44 100%);border-color:#d99a8f;color:#1a120a;font-weight:bold")}</div>` : ""}
      <div class="info-box">
        <div class="small" style="color:var(--text-bright);font-weight:bold;margin-bottom:8px">List parts from the garage</div>
        ${stashMarkup}
      </div>
      <div class="info-box">
        <div class="small" style="color:var(--text-bright);font-weight:bold;margin-bottom:8px">Your live listings</div>
        ${listedMarkup}
      </div>
    `,
          "gold",
          "marketplace",
        )}`;
      }

      // Settings modal hosts the Legacy Wall entry point — out-of-game
      // career meta lives next to other meta controls (audio, pause,
      // tutorial replay) rather than crowding the Social tab.
      function renderLegacySettingsCard() {
        const builds = state.legacyBuilds || [];
        const count = builds.length;
        const nationals = builds.filter((b) => b.wonNational).length;
        const subtitle = count
          ? `${count} build${count === 1 ? "" : "s"} retired · ${nationals} National title${nationals === 1 ? "" : "s"}`
          : "No retired builds yet. Win Nationals or start a Legacy run to unlock.";
        return `<div class="legacy-hero" style="padding:18px 18px 16px">
          <div class="legacy-hero-kicker">Legacy Wall</div>
          <div style="font-size:18px;font-weight:bold;color:var(--text-bright);margin-bottom:4px;letter-spacing:.2px">Your career so far</div>
          <div style="font-size:13px;color:var(--gold-soft);font-style:italic;line-height:1.6;margin-bottom:14px">${subtitle}</div>
          <button class="victory-primary" style="padding:10px 20px;font-size:13px" onclick="closeSettings();openLegacyWall();">${count ? "Open the wall →" : "Preview the wall →"}</button>
        </div>`;
      }

      // Phone-shaped Social tab. The Social Media Hub now lives inside
      // a phone frame; tapping an app tile drills into a per-platform
      // feed of past posts plus a compose card. Brand deals, collabs,
      // and the shady-follower DM all live in the Messages app.

      function setPhoneApp(app) {
        state.phoneApp = app;
        playSfx("click");
        requestRender("full");
      }

      function renderPhoneStatusBar() {
        return `<div class="phone-status-bar"><span class="ps-time">8:24 AM</span><span class="ps-icons">📶 🔋</span></div>`;
      }

      function renderPhoneHomeScreen() {
        const next = SPONSORS.find((s) => state.followers < s.req);
        const current = activeSponsors().slice(-1)[0];
        const prevReq = current ? current.req : 0;
        const nextReq = next ? next.req : current ? current.req : 100;
        const denom = Math.max(1, nextReq - prevReq);
        const progress = next
          ? Math.max(0, Math.min(100, ((state.followers - prevReq) / denom) * 100))
          : 100;
        const widgetSub = next
          ? `${fmtF(Math.max(0, next.req - state.followers))} to ${next.emoji} ${next.name}`
          : "All sponsors unlocked";
        const widget = `<div class="phone-widget">
          <div class="pw-label">Total Followers</div>
          <div class="pw-value">${fmtF(state.followers)}</div>

      // A clean glamour "photo" of the car for social posts — always shown at

      /* ═══════════════════════════════════════════
     MAIN RENDER

      function toast(msg, type = "ok") {
        if (type === "event-good" || type === "event-bad") {
          pushNotice(msg, type === "event-bad" ? "bad" : "good");
          return;
        }
        const root = getEl("toastRoot");
        const extra =
          type === "ok" ? "money-pop" : type === "err" ? "shake-lite" : "";
        root.innerHTML = `<div class="toast ${type} ${extra}">${msg}</div>`;
        clearTimeout(toast._t);
        toast._t = setTimeout(() => (root.innerHTML = ""), 3500);
        if (type === "err") playSfx("error");
      }

      function pushNotice(text, tone) {
        if (!state.noticeQueue) state.noticeQueue = [];
        const emoji = tone === "bad" ? "⚠️" : "🎉";
        state.noticeQueue.push({ text, tone: tone || "good", emoji });
        if (state.noticeQueue.length === 1) {
          playSfx(tone === "bad" ? "error" : "success");
        }
        requestRender("chrome");
      }

      function dismissNotice() {
        if (!state.noticeQueue || !state.noticeQueue.length) return;
        state.noticeQueue.shift();
        playSfx("click");
        saveGame();
        requestRender("full");
      }

      let lastRenderSignature = "";
      let renderQueued = false;
      let rerenderRequestedWhileQueued = false;
      let queuedRenderMode = "full";
      let lastMoneyPopAt = 0;

      function updateHeaderChrome(force = false) {
        const headerSignature = [
          state.followers,
          garageLoreTier(),
          state.freshHeadline || "",
          Date.now() < state.saveFlashUntil ? 1 : 0,
          !!state.lastSaved,
          state.money,
          state.lastMoneyDelta,
          state.fuel,
          state.week,
          state.seasonLength,
          PAYCHECK_CYCLE - state.paycheckProgress,
          state.bankLoanBalance,
          state.sharkLoanBalance,
          isEarlyGame() ? 1 : 0,
        ].join("|");
        if (!force && headerSignature === chromeHeaderSignature) return;
        chromeHeaderSignature = headerSignature;
        const headerCar = currentCar();
        const headerTier = headerCar
          ? getBuildTier(headerCar).title
          : "No Build";
        const seasonPhaseTop = getSeasonPhase();
        const remainingTopTxt =
          seasonPhaseTop.remaining === 0
            ? "season finale"
            : `${seasonPhaseTop.remaining} wk${seasonPhaseTop.remaining === 1 ? "" : "s"} left`;
        getEl("topStateMain").textContent =
          `📅 Wk ${state.week}/${state.seasonLength} · ${seasonPhaseTop.phase} · ${remainingTopTxt}`;
        getEl("topStateSub").innerHTML =
          `Build Tier: <span style="color:#e8d8b2;font-weight:bold">${headerTier}</span> · <span style="color:var(--gold-soft);font-weight:bold">${garageLoreTier()}</span>${state.freshHeadline ? " · " + state.freshHeadline : ""}${Date.now() < state.saveFlashUntil ? " · Saving…" : state.lastSaved ? " · Saved" : ""}`;
        const moneyChip = getEl("moneyChip");
        moneyChip.textContent = `$${fmt(state.money)}`;
        const shouldPopMoney =
          state.lastMoneyDelta > 0 && Date.now() - lastMoneyPopAt > 350;
        moneyChip.classList.toggle("money-pop", shouldPopMoney);
        if (shouldPopMoney) lastMoneyPopAt = Date.now();
        const trendChip = getEl("trendChip");
        if (trendChip) {
          const trend = state.money - (state.weekStartMoney || 0);
          if (trend === 0) {
            trendChip.textContent = "";
            trendChip.style.display = "none";
          } else {
            trendChip.style.display = "";
            trendChip.textContent = `${trend > 0 ? "▲" : "▼"} ${trend > 0 ? "+" : "−"}$${fmt(Math.abs(trend))} this wk`;
            trendChip.style.color = trend > 0 ? "#9fd18e" : "#e07a7a";
          }
        }
        getEl("fuelChip").textContent = `⛽ ${state.fuel}/${MAX_FUEL}`;
        getEl("followersChip").textContent = `📣 ${fmtF(state.followers)}`;
        const wifeChip = getEl("wifeChip");
        if (wifeChip) {
          const wa = wifeApprovalVal();
          wifeChip.textContent = `💍 ${wa}`;
          wifeChip.style.color = wa >= 70 ? "#9fd18e" : wa >= 40 ? "#e8d8b2" : "#e07a7a";
        }
        const advanceWeekTopBtn = getEl("advanceWeekTopBtn");
        if (advanceWeekTopBtn) {
          const advanceBlocked = !!(
            currentCar() && hasActiveRestorations(currentCar().id)
          );
          advanceWeekTopBtn.disabled = advanceBlocked;
          advanceWeekTopBtn.textContent = "⏩ Advance Week";
        }
        const loanBtn = getEl("openStoreBtn");
        const totalLoan = state.bankLoanBalance + state.sharkLoanBalance;
        loanBtn.textContent =
          totalLoan > 0
            ? `Loans $${fmt(totalLoan)}`
            : isEarlyGame()
              ? "Emergency Cash"
              : "Loans";
        if (loanBtn.onclick !== openStore) loanBtn.onclick = openStore;
      }

        if (!state.activeRestorations || !state.activeRestorations.length)

          if (task.completed) return;
          const blocks = document.querySelectorAll(
            `[data-task-id="${task.id}"]`,

          if (!blocks.length) return;
          const remaining = task.finishTime - Date.now();
          const pct = Math.round(getRestorationProgress(task) * 100);
          blocks.forEach((block) => {
            const timeEl = block.querySelector(".task-time");
            if (timeEl)
              timeEl.textContent = isPaused
                ? "PAUSED"
                : remaining <= 0
                  ? "COMPLETE"
                  : formatRemaining(remaining);

              statusEl.textContent = isPaused
                ? "Paused — open Settings to resume"
                : remaining <= 0
                  ? "Wrapping up now…"
                  : task.method === "shop"
                    ? `${formatRemaining(remaining)} remaining`
                    : taskStatusText(task);

            if (fillEl) fillEl.style.width = pct + "%";

      function pickTickerItem() {
        const lastShow = state.history && state.history[0];
        const recent =

        if (recent && Math.random() < 0.18) {

        const roll = Math.random();
        if (roll < 0.4) {
          const segTypes = ["banter", "ads", "callers", "traffic"];
          const weights = [0.5, 0.22, 0.18, 0.1];
          let cum = 0;
          const r = Math.random();
          let segType = "banter";
          for (let i = 0; i < segTypes.length; i++) {
            cum += weights[i];
            if (r < cum) {

          const item = pickFresh(pool, "radio:" + segType);
          return item

          return {

            text: item.line,

      function renderTickerItem() {
        const ticker = getEl("worldTicker");

      /* ═══════════════════════════════════════════

      setInterval(() => {
        if (typeof requestIdleCallback === "function") {

        } else {

      // Keyboard shortcuts. Esc follows the pause-menu convention:
      // close whatever's on top, otherwise open Settings. Enter only

      // for the player. 1-4 mirror the main tab order.
      const KEY_VIEW_ORDER = ["workshop", "career", "dealership", "shows"];
      function keyboardModalBlocking() {
        return (
          cheatPromptOpen ||
          state.settingsOpen ||
          !state.tutorialComplete ||
          !!state.pendingVictory ||
          !!state.pendingUnlock ||
          !!state.weekRecap ||
          !!state.showLoading ||
          !!state.showStage ||
          !!state.pendingScene ||
          !!state.pendingEvent ||
          !!state.showStore ||
          !!(state.noticeQueue && state.noticeQueue.length)
        );
      }
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        // While the splash is up, Enter starts the game and
        // everything else stays inert.
        if (getEl("splash")) {
          if (e.key === "Enter") {
            e.preventDefault();
            startGame();
          }
          return;
        }
        const t = e.target;
        const typing =
          t &&
          (t.tagName === "INPUT" ||
            t.tagName === "TEXTAREA" ||
            t.tagName === "SELECT" ||
            t.isContentEditable);
        if (e.key === "Escape") {
          if (cheatPromptOpen) {
            closeCheatPrompt();
          } else if (state.settingsOpen) {
            closeSettings();
          } else if (state.showStore) {
            closeStore();
          } else if (!typing && !keyboardModalBlocking() && !state.gameOver) {
            openSettings();
          }
          return;
        }
        if (typing) return;
        if (e.key === "Enter") {
          // Focused buttons keep native Enter-to-click.
          if (t && (t.tagName === "BUTTON" || t.tagName === "A")) return;
          if (cheatPromptOpen || state.settingsOpen) return;
          if (!state.tutorialComplete) {
            e.preventDefault();
            advanceTutorial();
          } else if (state.pendingUnlock) {
            e.preventDefault();
            acknowledgeUnlock(true);
          } else if (state.weekRecap) {
            e.preventDefault();
            dismissWeekRecap();
          } else if (state.showLoading && state.showStage) {

            advanceShowStage();

            state.noticeQueue &&
            state.noticeQueue.length &&
            !state.pendingVictory &&
            !state.pendingScene &&
            !state.pendingEvent &&
            !state.showStore
          ) {
            e.preventDefault();
            dismissNotice();
          }
          return;
        }
        if (e.key === "f" || e.key === "F") {
          if (isFullscreenSupported()) toggleFullscreen();
          return;
        }
        const tabIdx = ["1", "2", "3", "4"].indexOf(e.key);
        if (tabIdx >= 0) {
          if (keyboardModalBlocking() || state.gameOver || state.seasonWrap) return;
          if (KEY_VIEW_ORDER[tabIdx] !== state.view) setView(KEY_VIEW_ORDER[tabIdx]);
        }
