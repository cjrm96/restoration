      // Resolve a Marketplace scenario step inline inside the chat
      // popup. Mirrors the outcome handling that the legacy centered
      // scene modal used (saleBonus / salePenalty / saleDone /
      // spawnListing / inventoryBonus / followers / cancel) so the
      // gameplay effects stay identical.
      function respondMarketplaceScenario(choiceIdx) {
        const offer = state.pendingMarketplaceOffer;
        if (!offer || !offer.scenarioActive || !offer.scenario) return;
        const choice = offer.scenario.choices[choiceIdx];
        if (!choice) return;
        const scenario = offer.scenario;
        const item = state.partsInventory.find((i) => i.id === offer.itemId);
        let saleAmount = null;
        if (choice.outcome === "saleBonus")
          saleAmount = offer.offer + (choice.bonus || 0);
        else if (choice.outcome === "salePenalty")
          saleAmount = offer.offer - (choice.penalty || 0);
        else if (choice.outcome === "saleDone") saleAmount = offer.offer;
        else if (choice.outcome === "followers") saleAmount = offer.offer;
        // "Donate" — the sale completes but the part walks out free.
        // The part still leaves inventory; the player gets followers/
        // lore from the choice instead of cash.
        else if (choice.outcome === "donate") saleAmount = 0;
        if (item && saleAmount !== null) {
          completeMarketplaceSale(item, saleAmount, offer.buyer);
        }
        if (choice.followers) {
          state.followers += choice.followers;
          clampFollowers();
        }
        if (choice.lore) addGarageLore(choice.lore);
        if (choice.cash) {
          state.money += choice.cash;
          recordMoneyChange(choice.cash, scenario.title);
        }
        if (choice.outcome === "spawnListing") {
          const fakeItem = {
            id: `inv_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
            name: "Wrong part you swore would fit",
            sourcePart: "Mystery Marketplace score",
            category: "engine",
            askingPrice: 65,
            baselineValue: 45,
            listed: false,
            sold: false,
          };
          state.partsInventory.push(fakeItem);
          listPartOnMarketplace(fakeItem.id);
        }
        if (choice.outcome === "inventoryBonus") {
          state.partsInventory.push({
            id: `inv_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
            name: "Random trim pieces from a weird trade",
            sourcePart: "Trunk junk special",
            category: "chrome",
            askingPrice: 55,
            baselineValue: 35,
            listed: false,
            sold: false,
          });
        }
        if (choice.toast) toast(choice.toast, "ok");
        state.pendingMarketplaceOffer = null;
        processEventQueue();
        drainWeekAdvanceQueue("queued");
        saveGame();
        requestRender("full");
      }

      /* ═══════════════════════════════════════════
     SATURDAY ROAD TRIP — Pick-A-Part / Pomona Swap
  ═══════════════════════════════════════════ */
      function pickN(arr, n) {
        if (!arr.length) return [];
        const pool = arr.slice();
        const out = [];
        const take = Math.min(n, pool.length);
        for (let i = 0; i < take; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          out.push(pool.splice(idx, 1)[0]);
        }
        return out;
      }

      function regenerateScavengeStock() {
        // Junkyard: Budget + Quality parts only — no Show Grade pulls.
        // Used parts at the yard never come out factory-fresh.
        const yardCandidates = PARTS.filter(
          (p) => p.tier === "Budget" || p.tier === "Quality",
        );
        const yardCount =
          JUNKYARD_STOCK_MIN +
          Math.floor(Math.random() * (JUNKYARD_STOCK_MAX - JUNKYARD_STOCK_MIN + 1));
        state.junkyardStock = pickN(yardCandidates, yardCount).map((p) => ({
          partId: p.id,
          price: Math.max(20, Math.round(p.diy * (1 - JUNKYARD_DISCOUNT))),
          conditionMult: JUNKYARD_CONDITION,
        }));
        // Swap meet: tools, weighted away from warehouse-tier so the
        // big-ticket items still mostly come from the new store.
        const swapCandidates = TOOLS_LIST.filter(
          (t) => t.workshop !== "warehouse" && !t.id.startsWith("t_"),
        );
        const swapCount =
          SWAP_STOCK_MIN +
          Math.floor(Math.random() * (SWAP_STOCK_MAX - SWAP_STOCK_MIN + 1));
        state.swapMeetStock = pickN(swapCandidates, swapCount).map((t) => ({
          toolId: t.id,
          price: Math.max(15, Math.round(t.cost * (1 - SWAP_DISCOUNT))),
        }));
      }

      function canMakeScavengeTrip() {
        // Until the wife's car is sold, the daily driver gets you to
        // the yard or the swap. After it's gone, you need at least
        // one roadworthy project in the garage to actually drive there.
        if (!state.wifeCarSold) return { ok: true };
        const drivable = (state.cars || []).find((c) => roadworthy(c));
        if (drivable) return { ok: true };
        return {
          ok: false,
          msg: "No roadworthy car in the garage — you can't drive to either spot.",
        };
      }

      function commitScavengeTrip(location) {
        if (state.atTrip)
          return toast("You're already at this Saturday's trip.", "err");
        const ride = canMakeScavengeTrip();
        if (!ride.ok) return toast(ride.msg, "err");
        const cost =
          location === "junkyard" ? JUNKYARD_TRIP_COST : SWAP_TRIP_COST;
        if (state.money < cost) return toast("Not enough cash for the trip.", "err");
        state.money -= cost;
        recordMoneyChange(
          -cost,
          location === "junkyard"
            ? "Pick-A-Part trip (gas + entry)"
            : "Pomona Swap trip (gas + entry + parking)",
        );
        state.scavengeChoice = location;
        state.atTrip = true;
        state.scavengeTripsTaken = (state.scavengeTripsTaken || 0) + 1;
        playSfx("click");
        toast(
          location === "junkyard"
            ? "Drove out to Pick-A-Part. Boots on, nothing's clean."
            : "Pulled into Pomona. Coffee, cash, and a long row of tables.",
          "ok",
        );
        // Took the wife's daily? You hate that it works. Rotating
        // grumble each trip until that car finally hits Marketplace.
        if (!state.wifeCarSold) {
          const grumble = pickFresh(WIFE_DAILY_TRIP_LINES, "wifeDaily");
          if (grumble) setTimeout(() => toast(grumble, "ok"), 1100);
        }
        saveGame();
        requestRender("full");
      }

      // Find the best car in the garage to drop a yard part onto.
      // Prefers the currently active car (the tab the player is looking
      // at) if it can take the part; otherwise falls back to any other
      // eligible car so a finished build doesn't block a pull meant
      // for a different project.
      function pickPullTargetCar(part) {
        if (!state.cars || !state.cars.length) return null;
        const cap = workspaceData().maxActive;
        const eligible = state.cars.filter((c) => {
          if (c.installedParts.includes(part.id)) return false;
          if ((c[part.category] || 0) >= 100) return false;
          if (findActiveTask(c.id, part.id)) return false;
          if (findYardPull(c.id, part.id)) return false;
          if (activeTasksByMethod(c.id, "shop").length) return false;
          if (activeTasksForCar(c.id).length >= cap) return false;
          return true;
        });
        if (!eligible.length) return null;
        const active = eligible.find((c) => c.id === state.carId);
        return active || eligible[0];
      }

      function findYardPull(carId, partId) {
        return (state.yardPulls || []).find(
          (p) => p.carId === carId && p.partId === partId,
        );
      }

      function pullYardPart(partId) {
        if (state.scavengeChoice !== "junkyard")
          return toast("You're not at the yard right now.", "err");
        const stockIdx = state.junkyardStock.findIndex((s) => s.partId === partId);
        if (stockIdx === -1) return toast("Already pulled or gone.", "err");
        const stock = state.junkyardStock[stockIdx];
        const part = PARTS.find((p) => p.id === partId);
        if (!part) return;
        if (!state.cars || !state.cars.length)
          return toast("No car to drop it onto.", "err");
        const missing = (part.tools || []).filter(
          (tid) => !state.ownedTools.includes(tid),
        );
        if (missing.length) {
          const names = missing
            .map((id) => TOOLS_LIST.find((t) => t.id === id)?.name)
            .join(", ");
          return toast(`You'd pull it but you didn't bring: ${names}`, "err");
        }
        if (state.money < stock.price)
          return toast("Not enough cash at the gate.", "err");
        const car = pickPullTargetCar(part);
        if (!car)
          return toast(
            "Nothing in the garage can take this right now — already installed, already pulled, or maxed out.",
            "err",
          );
        state.money -= stock.price;
        recordMoneyChange(
          -stock.price,
          `Pick-A-Part pull: ${part.name}`,
        );
        // The pulled part rides home with you. It doesn't start a
        // restoration job until you're back at the bench — same way a
        // free part from a sponsor or Cars & Coffee waits in the build
        // view until you choose to install it.
        state.yardPulls.push({
          id: `pull_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
          carId: car.id,
          partId: part.id,
          conditionMult: stock.conditionMult,
          addedWeek: state.week,
        });
        state.junkyardStock.splice(stockIdx, 1);
        playSfx("wrench");
        const sameCar = car.id === state.carId;
        toast(
          sameCar
            ? `Pulled the ${part.name} off a donor and threw it in the truck. Install it back at the garage.`
            : `Pulled the ${part.name} off a donor — riding home for your ${car.year} ${car.make} (other tab).`,
          "ok",
        );
        saveGame();
        requestRender("full");
      }

      function installYardPull(pullId) {
        const pullIdx = (state.yardPulls || []).findIndex(
          (p) => p.id === pullId,
        );
        if (pullIdx === -1) return toast("That pull is already installed or gone.", "err");
        const pull = state.yardPulls[pullIdx];
        const car = state.cars.find((c) => c.id === pull.carId);
        if (!car)
          return toast(
            "The car this part was pulled for isn't in the garage anymore.",
            "err",
          );
        const part = PARTS.find((p) => p.id === pull.partId);
        if (!part) return;
        if (car.installedParts.includes(part.id))
          return toast("Part's already installed on that car.", "err");
        if (findActiveTask(car.id, part.id))
          return toast("That job is already on the bench.", "err");
        if (car[part.category] >= 100) return toast("Already maxed out.", "err");
        const missing = (part.tools || []).filter(
          (tid) => !state.ownedTools.includes(tid),
        );
        if (missing.length) {
          const names = missing
            .map((id) => TOOLS_LIST.find((t) => t.id === id)?.name)
            .join(", ");
          return toast(`Missing tools to install: ${names}`, "err");
        }
        if (
          activeTasksForCar(car.id).length >= workspaceData().maxActive
        )
          return toast(
            `${workspaceData().name} is already full. Finish or abandon a job first.`,
            "err",
          );
        if (activeTasksByMethod(car.id, "shop").length)
          return toast(
            "Car is at the shop right now. Wait for that job to finish first.",
            "err",
          );
        const now = Date.now();
        const duration = taskDurationMs(part, "diy");
        state.activeRestorations.push({
          id: `task_${now}_${Math.random().toString(36).slice(2, 7)}`,
          carId: car.id,
          partId: part.id,
          method: "diy",
          startTime: now,
          finishTime: now + duration,
          weeksRequired: taskWeeks(part),
          completed: false,
          conditionMult: pull.conditionMult,
          source: "junkyard",
        });
        state.yardPulls.splice(pullIdx, 1);
        playSfx("wrench");
        toast(
          `Started installing the ${part.name} you pulled. Bench is busy.`,
          "ok",
        );
        saveGame();
        requestRender("full");
      }

      function buySwapTool(toolId) {
        if (state.scavengeChoice !== "swap")
          return toast("You're not at the swap right now.", "err");
        const stockIdx = state.swapMeetStock.findIndex((s) => s.toolId === toolId);
        if (stockIdx === -1) return toast("Already gone.", "err");
        const stock = state.swapMeetStock[stockIdx];
        const tool = TOOLS_LIST.find((t) => t.id === toolId);
        if (!tool) return;
        const wd = toolStorageData();
        if (state.ownedTools.includes(tool.id))
          return toast("You already own one.", "err");
        if (state.money < stock.price)
          return toast("Cash only at the swap.", "err");
        if (state.ownedTools.length >= wd.maxTools)
          return toast(`${wd.name} is out of tool space.`, "err");
        if (
          getWorkspaceIndex(state.workshopLevel) <
          getWorkspaceIndex(tool.workshop)
        ) {
          const req = WORKSPACE_LEVELS.find(
            (w) => w.id === tool.workshop,
          )?.name;
          return toast(`Won't fit your shop yet. Needs ${req}.`, "err");
        }
        state.money -= stock.price;
        recordMoneyChange(-stock.price, `Pomona Swap: ${tool.name}`);
        state.ownedTools.push(tool.id);
        state.swapMeetStock.splice(stockIdx, 1);
        playSfx("click");
        toast(
          `Walked off with the ${tool.name} for $${fmt(stock.price)}. Seller didn't even pretend to count.`,
          "ok",
        );
        saveGame();
        requestRender("full");
      }

      function applyWinterStorageDamage() {
        if (state.winterAppliedForSeason) return;
        const car = currentCar();
        if (!car) return;
        const tier = state.workshopLevel;
        const damages = [];
        const hit = (cat, amt, label) => {
          car[cat] = clamp(car[cat] - amt);
          damages.push(`${label} -${amt}`);
        };
        if (tier === "curb") {
          hit("body", 8, "Rust crept into the body");
          hit("paint", 6, "Paint weathered");
          hit("chrome", 4, "Trim oxidized");
        } else if (tier === "carport") {
          hit("body", 4, "Moisture tagged the body");
          hit("paint", 3, "Finish dulled");
        } else if (tier === "storage") {
          hit("paint", 2, "Dust and damp got to the finish");
          hit("chrome", 2, "Trim spotted up");
        } else if (tier === "garage") {
          hit("engine", 1, "A heater hose cracked over winter");
        } else {
          hit("engine", 1, "A tiny hose dried out in storage");
        }
        state.winterStorageReport = damages;
        state.winterAppliedForSeason = true;
      }
      function formatRemaining(ms) {
        if (ms <= 0) return "ready now";
        const sec = Math.ceil(ms / 1000);
        if (sec < 30) return "almost done";
        if (sec < 60) return "~30 sec left";
        const min = Math.round(sec / 60);
        if (min < 2) return "~1 min left";
        if (min < 60) return `~${min} min left`;
        const hr = Math.floor(min / 60);
        const remMin = Math.round((min % 60) / 5) * 5;
        return remMin === 0 ? `~${hr}h left` : `~${hr}h ${remMin}m left`;
      }
      function getRestorationProgress(task) {
        const total = Math.max(1, task.finishTime - task.startTime);
        const done = Math.min(total, Math.max(0, Date.now() - task.startTime));
        return Math.max(0, Math.min(1, done / total));
      }
      function getRivalBaseScore() {
        return Math.min(
          95,
          Math.round(
            32 + (state.week - 1) * 2.5 + state.rival.showsEntered * 1.5,
          ),
        );
      }
      function getShowCounts() {
        return {
          coffee: state.history.filter((h) => h.tier === "Cars & Coffee")
            .length,
          local: state.history.filter((h) => h.tier === "Local").length,
          regional: state.history.filter((h) => h.tier === "Regional").length,
          national: state.history.filter((h) => h.tier === "National").length,
        };
      }
      function showProgressRequirement(show) {
        const counts = getShowCounts();
        if (show.tier === "Local" && counts.coffee < 2) {
          return {
            ok: false,
            msg: `Need 2 Cars & Coffee events completed (${counts.coffee}/2).`,
          };
        }
        if (show.tier === "Regional" && counts.local < 3) {
          return {
            ok: false,
            msg: `Need 3 Local shows completed (${counts.local}/3).`,
          };
        }
        if (show.tier === "National" && counts.regional < 3) {
          return {
            ok: false,
            msg: `Need 3 Regional shows completed (${counts.regional}/3).`,
          };
        }
        return { ok: true, msg: "" };
      }

      function getCurrentShows() {
        return SHOWS_MASTER.map((show) => {
          // Shows fall into two scheduling models:
          //   - Fixed weekly cadence (Cars & Coffee, Local, Regional)
          //   - Late-season window (National) — only available within a
          //     specific stretch of weeks at the end of the season,
          //     mirroring how real-world Nationals cluster in late summer.
          let weeksUntil;
          let seasonClosed = false;
          if (show.seasonWindow) {
            if (state.week < show.seasonWindow.start) {
              weeksUntil = show.seasonWindow.start - state.week;
            } else if (state.week <= show.seasonWindow.end) {
              weeksUntil = 0;
            } else {
              weeksUntil = null;
              seasonClosed = true;
            }
          } else {
            const offset = state.week % show.cadence;
            weeksUntil = offset === 0 ? 0 : show.cadence - offset;
          }
          return {
            ...show,
            weeksUntil,
            seasonClosed,
            enteredThisWeek: state.enteredShowsThisWeek.includes(show.id),
          };
        });
      }

      // The 22-week season runs early spring → late summer. Rather
      // than bare "Week 4/22", surface where in the calendar the
      // player sits and what's about to close. Phases line up with
      // the Nationals window (weeks 20–22) at the back end.
      function getSeasonPhase() {
        const w = state.week;
        const len = state.seasonLength;
        const remaining = Math.max(0, len - w);
        let phase;
        if (w <= 4) phase = "Early Spring";
        else if (w <= 9) phase = "Spring";
        else if (w <= 13) phase = "Early Summer";
        else if (w <= 19) phase = "Summer";
        else phase = "Late Summer · Nationals";
        return { phase, remaining };
      }

      function getUpcomingSummary() {
        const shows = getCurrentShows();
        const open = shows.filter((s) => s.weeksUntil !== null);
        // Prefer the highest-tier upcoming show the player qualifies for —
        // gives the chalkboard a target rather than just "the next thing on
        // the calendar." Tiebreak by soonest, then cheapest.
        const TIER_RANK = {
          National: 3,
          Regional: 2,
          Local: 1,
          "Cars & Coffee": 0,
        };
        const car = currentCar();
        const overall = car ? getOverall(car) : 0;
        const eligible = open.filter((s) => overall >= (s.minScore || 0));
        const pool = eligible.length ? eligible : open.length ? open : shows;
        const sorted = pool.slice().sort((a, b) => {
          const tA = TIER_RANK[a.tier] ?? 0;
          const tB = TIER_RANK[b.tier] ?? 0;
          if (tA !== tB) return tB - tA;
          return (
            (a.weeksUntil ?? 99) - (b.weeksUntil ?? 99) || a.fee - b.fee
          );
        });
        const next = sorted[0];
        let txt;
        if (next.weeksUntil === null) {
          txt = `${next.name} closed for the season`;
        } else if (next.weeksUntil === 0) {
          txt = `${next.name} this week`;
        } else if (next.weeksUntil === 1) {
          txt = `${next.name} next week`;
        } else {
          txt = `${next.name} in ${next.weeksUntil} weeks`;
        }
        return { shows, nextShow: next, nextShowText: txt };
      }

      /* ═══════════════════════════════════════════
     PERSISTENCE
  ═══════════════════════════════════════════ */

      function flashSaved() {
        state.lastSaved = Date.now();
        state.saveFlashUntil = Date.now() + 1200;
      }

      function serializeState() {
        return JSON.parse(JSON.stringify(state));
      }

      let lastSavedPayload = "";
      let chromeHeaderSignature = "";
      let chromeTabsSignature = "";
      let modalLayerSignature = "";
      let worldRefreshTimer = null;
      let backgroundTickTimer = null;
      let marketplacePingTimer = null;
      let worldTickerTimer = null;
      let worldTickerPaused = false;
      let hoodClickCount = 0;
      let hoodClickReset = 0;
      let cheatPromptOpen = false;

      function saveGame(force = false) {
        try {
          const payload = JSON.stringify({
            version: SAVE_VERSION,
            lastSaved: Date.now(),
            state: serializeState(),
          });
          if (!force && payload === lastSavedPayload) return false;
          localStorage.setItem(SAVE_KEY, payload);
          lastSavedPayload = payload;
          flashSaved();
          return true;
        } catch (err) {
          console.warn("Save failed", err);
          return false;
        }
      }

      function loadGame() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.state) return false;
          const savedHasTutorialField = Object.prototype.hasOwnProperty.call(
            parsed.state,
            "tutorialComplete",
          );
          Object.assign(state, makeDefaultState(), parsed.state);
          if (!savedHasTutorialField) state.tutorialComplete = true;
          const ensureArray = (key) => {
            if (!Array.isArray(state[key])) state[key] = [];
          };
          ensureArray("activeRestorations");
          ensureArray("enteredShowsThisWeek");
          ensureArray("partsInventory");
          ensureArray("marketplaceListings");
          ensureArray("legacyBuilds");
          // Backfill wonNational on legacy entries saved before the snapshot
          // fix — a build whose best result was a 1st-place National counts.
          state.legacyBuilds.forEach((b) => {
            if (!b.wonNational && b.bestPlace === 1 && b.bestTier === "National") {
              b.wonNational = true;
            }
          });
          ensureArray("noticeQueue");
          if (
            !state.nextShowAvailableWeek ||
            typeof state.nextShowAvailableWeek !== "object" ||
            Array.isArray(state.nextShowAvailableWeek)
          ) {
            state.nextShowAvailableWeek = {};
          }
          ensureArray("eventQueue");
          ensureArray("history");
          ensureArray("rivalFeed");
          ensureArray("buyerHistory");
          ensureArray("ownedTools");
          ensureArray("giftedTools");
          ensureArray("junkyardStock");
          ensureArray("swapMeetStock");
          ensureArray("yardPulls");
          ensureArray("postHistory");
          ensureArray("cars");
          // Backfill new stat categories on cars from old saves
          state.cars.forEach((c) => {
            CATS.forEach((cat) => {
              if (typeof c[cat] !== "number") c[cat] = 18;
            });
            if (!Array.isArray(c.installedParts)) c.installedParts = [];
          });
          if (!state.recentLines || typeof state.recentLines !== "object") {
            state.recentLines = {};
          }
          if (!state.buck || typeof state.buck !== "object") {
            state.buck = {
              metOnce: false,
              firstImpression: null,
              beatenCount: 0,
              lostToCount: 0,
              boughtPartCount: 0,
            };
          }
          if (!state.mechanic || typeof state.mechanic !== "object") {
            state.mechanic = {
              metOnce: false,
              trust: 0,
              shopVisits: 0,
              milestoneSeen: false,
            };
          }
          if (!state.milestones || typeof state.milestones !== "object") {
            state.milestones = {
              firstShow: false,
              hit50: false,
              wonRegional: false,
              threeSponsors: false,
              homeGarage: false,
              wonNational: false,
            };
          }
          if (!state.rival || typeof state.rival !== "object") {
            state.rival = { score: 32, showsEntered: 0, lastPlace: null };
          }
          if (!state.seasonStats || typeof state.seasonStats !== "object") {
            state.seasonStats = {
              moneyStart: state.money || 0,
              moneyEarned: 0,
              showsEntered: 0,
              bestPlace: null,
              bestTier: null,
              startOverall: 0,
            };
          }
          if (!state.settings || typeof state.settings !== "object") {
            state.settings = { musicVolume: 0.6, sfxVolume: 0.7, paused: false };
          } else {
            if (typeof state.settings.musicVolume !== "number") state.settings.musicVolume = 0.6;
            if (typeof state.settings.sfxVolume !== "number") state.settings.sfxVolume = 0.7;
            if (typeof state.settings.paused !== "boolean") state.settings.paused = false;
          }
          state.settingsOpen = false;
          if (typeof state.pausedAt !== "number") state.pausedAt = 0;
          if (typeof state.weekStartMoney !== "number") state.weekStartMoney = state.money || 0;
          if (!currentCar() && state.cars.length) {
            state.carId = state.cars[0].id;
          }
          applyAudioSettings();
          resolveCompletedRestorations(false);
          lastSavedPayload = raw;
          return true;
        } catch (err) {
          console.warn("Load failed", err);
          return false;
        }
      }

      function completeRestorationTask(task, showToast = true) {
        const car = getCarById(task.carId);
        const part = PARTS.find((p) => p.id === task.partId);
        if (!car || !part) return;
        if (!car.installedParts.includes(part.id)) {
          // Yard pulls and other used parts apply a permanent condition
          // discount on the stat lift. New = 1.0, used yard part = 0.7.
          const conditionMult = task.conditionMult || 1;
          const appliedImp = Math.max(1, Math.round(part.imp * conditionMult));
          car[part.category] = clamp(car[part.category] + appliedImp);
          car.installedParts.push(part.id);
          if (task.source !== "junkyard") addRemovedPartItem(part, car);
          state.freshHeadline = `${part.name} finished`;
          maybeTriggerBuildTierMoment(car);
          if (showToast) playSfx("wrench");
          if (showToast) {
            const conditionNote =
              conditionMult < 1
                ? ` (yard part — +${appliedImp} instead of the +${part.imp} a new one would've given)`
                : "";
            toast(
              `${part.name} wrapped up on your ${car.year} ${car.make}. It feels a little more legit now. +${appliedImp} ${CAT_LABELS[part.category]}${conditionNote}.`,
              "ok",
            );
          }
          if (task.method === "diy" && !state.starterHelpReceived) {
            maybeTriggerNeighborHelp(car);
          }
          state.installsDone = (state.installsDone || 0) + 1;
          state.lastGain = { cat: part.category, label: CAT_LABELS[part.category], amt: appliedImp, at: Date.now(), overall: getOverall(car) };
        }
        task.completed = true;
      }

      function maybeTriggerNeighborHelp(car) {
        if (state.starterHelpReceived) return;
        // Pick the most-needed tool the player doesn't own and can use right now
        const need = Object.create(null);
        const installed = new Set(car ? car.installedParts : []);
        PARTS.forEach((p) => {
          if (installed.has(p.id)) return;
          if (p.tier !== "Budget") return;
          (p.tools || []).forEach((tid) => {
            need[tid] = (need[tid] || 0) + 1;
          });
        });
        const wsIdx = getWorkspaceIndex(state.workshopLevel);
        const candidates = TOOLS_LIST.filter(
          (t) =>
            !state.ownedTools.includes(t.id) &&
            getWorkspaceIndex(t.workshop) <= wsIdx,
        )
          .map((t) => ({ tool: t, score: need[t.id] || 0 }))
          .sort((a, b) => b.score - a.score);
        const pick = candidates.length ? candidates[0].tool : null;
        state.starterHelpReceived = true;
        state.money += 125;
        recordMoneyChange(125, "Neighbor starter help");
        if (pick && state.ownedTools.length < toolStorageData().maxTools) {
          state.ownedTools.push(pick.id);
          toast(
            `An old neighbor saw the garage light on. Walked over with a clean ${pick.name} he wasn't using and slid you $125 for parts. "Pay me back when the truck wins something."`,
            "event-good",
          );
        } else {
          toast(
            `An old neighbor saw the garage light on. Walked over and slid you $125 for parts. "Pay me back when the truck wins something."`,
            "event-good",
          );
        }
      }

      function resolveCompletedRestorations(showToast = true) {
        if (state.settings && state.settings.paused) return false;
        let changed = false;
        state.activeRestorations.forEach((task) => {
          if (!task.completed && Date.now() >= task.finishTime) {
            completeRestorationTask(task, showToast);
            changed = true;
          }
        });
        if (changed) {
          state.lastRestoreFxAt = Date.now();
          if (state.lastGain) state.lastGain.at = state.lastRestoreFxAt;
          state.activeRestorations = state.activeRestorations.filter(
            (t) => !t.completed,
          );
          checkMilestones();
          saveGame();
        }
        return changed;
      }

      function activeTasksForCar(carId) {
        return state.activeRestorations
          .filter((t) => t.carId === carId && !t.completed)
          .sort((a, b) => a.finishTime - b.finishTime);
      }

      function startRestoration(id, method, isFree = false) {
        const part = PARTS.find((p) => p.id === id);
        const car = currentCar();
        if (!car)
          return toast(
            "No car, no wrenching. Drag home a project first.",
            "err",
          );
        if (car.installedParts.includes(part.id))
          return toast("Already completed.", "err");
        if (findActiveTask(car.id, part.id))
          return toast("That restoration is already in progress.", "err");
        if (method === "diy" && activeTasksByMethod(car.id, "shop").length) {
          return toast(
            "The car is currently at the auto shop. Wait for those jobs to finish first.",
            "err",
          );
        }
        if (method === "shop" && activeTasksByMethod(car.id, "diy").length) {
          return toast(
            "Finish your DIY work before sending the car to the shop.",
            "err",
          );
        }
        if (
          method !== "shop" &&
          activeTasksForCar(car.id).length >= workspaceData().maxActive
        )
          return toast(
            `${workspaceData().name} is already full. Upgrade your work space for more simultaneous restorations.`,
            "err",
          );
        const starterFree =
          state.starterHelpReceived &&
          id === 2 &&
          !car.installedParts.includes(2) &&
          !findActiveTask(car.id, 2) &&
          !state.starterCarbUsed;
        const cost = isFree || starterFree ? 0 : partCost(part, method);
        if (!isFree && state.money < cost)
          return toast("Not enough cash.", "err");
        if (method === "diy") {
          const missing = (part.tools || []).filter(
            (tid) => !state.ownedTools.includes(tid),
          );
          if (missing.length > 0) {
            const names = missing
              .map((id) => TOOLS_LIST.find((t) => t.id === id)?.name)
              .join(", ");
            return toast(`Missing: ${names}`, "err");
          }
        }
        if (car[part.category] >= 100)
          return toast("Already maxed out.", "err");
        if (!(isFree || starterFree)) {
          state.money -= cost;
          recordMoneyChange(
            -cost,
            `${method === "shop" ? "Auto shop" : "DIY"} start: ${part.name}`,
          );
        }
        if (isFree) state.freePart = false;
        if (starterFree) state.starterCarbUsed = true;
        const now = Date.now();
        const duration = taskDurationMs(part, method);
        state.activeRestorations.push({
          id: `task_${now}_${Math.random().toString(36).slice(2, 7)}`,
          carId: car.id,
          partId: part.id,
          method,
          startTime: now,
          finishTime: now + duration,
          weeksRequired: taskWeeks(part),
          completed: false,
        });
        if (method === "diy") state.diyTried = true;
        else if (method === "shop") state.shopTried = true;
        if (
          Math.random() < 0.16 &&
          (part.tier === "Quality" || part.tier === "Show Grade")
        ) {
          queueScene({
            title: "While I'm In Here...",
            emoji: "🌀",
            text: `You opened up ${part.name.toLowerCase()} and immediately found one more thing that technically should be handled while everything is apart.`,
            choices: [
              {
                label: "Do it right",
                money: -60,
                lore: 6,
                statBoost: { cat: part.category, amt: 3 },
                note: "It got more expensive, but the job came out better.",
              },
              {
                label: "Button it up and move on",
                lore: 3,
                note: "You chose peace, or denial. Hard to say.",
              },
              {
                label: "Pretend you never saw it",
                pendingPenalty: { cat: part.category, amt: 2 },
                lore: 5,
                note: "Future You just got a new problem to inherit.",
              },
            ],
          });
        }
        if (method === "shop") {
          if (!state.mechanic) state.mechanic = { metOnce: false, trust: 0, shopVisits: 0, milestoneSeen: false };
          state.mechanic.shopVisits = (state.mechanic.shopVisits || 0) + 1;
          if (!state.mechanic.metOnce) {
            state.mechanic.metOnce = true;
            queueScene({
              id: DALE_INTRO_SCENE.id,
              title: DALE_INTRO_SCENE.title,
              emoji: DALE_INTRO_SCENE.emoji,
              text: DALE_INTRO_SCENE.text,
              choices: DALE_INTRO_SCENE.choices.map((c) => ({
                label: c.label,
                lore: c.lore,
                note: c.note,
                mechanicTrust: c.mechanicTrust,
              })),
            });
          } else {
            state.mechanic.trust = Math.min(10, (state.mechanic.trust || 0) + 1);
            if (
              state.mechanic.trust >= 5 &&
              !state.mechanic.milestoneSeen
            ) {
              state.mechanic.milestoneSeen = true;
              queueScene({
                id: DALE_MILESTONE_SCENE.id,
                title: DALE_MILESTONE_SCENE.title,
                emoji: DALE_MILESTONE_SCENE.emoji,
                text: DALE_MILESTONE_SCENE.text,
                choices: DALE_MILESTONE_SCENE.choices.map((c) => ({
                  label: c.label,
                  lore: c.lore,
                  note: c.note,
                })),
              });
            } else if (Math.random() < 0.35) {
              toast(pickFresh(DALE_SHOP_FLAVOR, "daleShop"), "ok");
            }
          }
        }
        toast(
          `${part.name} started — ${restorationStartLine(method)}.`,
          "event-good",
        );
        saveGame();
        requestRender("full");
      }

      function payOffLoan(kind, cap) {
        const balance =
          kind === "shark"
            ? state.sharkLoanBalance
            : kind === "truck"
              ? state.toolTruckBalance
              : kind === "ring"
                ? state.ringPawnBalance
                : state.bankLoanBalance;
        if (balance <= 0) return;
        const limit = cap > 0 ? Math.min(cap, balance) : balance;
        const pay = Math.min(limit, state.money);
        if (pay <= 0) return toast("You don't have any cash to put on it.", "err");
        state.money -= pay;
        if (kind === "shark") state.sharkLoanBalance -= pay;
        else if (kind === "truck") state.toolTruckBalance -= pay;
        else if (kind === "ring") state.ringPawnBalance -= pay;
        else state.bankLoanBalance -= pay;
        const label =
          kind === "shark"
            ? "Shark loan"
            : kind === "truck"
              ? "Tool truck tab"
              : kind === "ring"
                ? "Pawn ticket"
                : "Bank loan";
        const remaining =
          kind === "shark"
            ? state.sharkLoanBalance
            : kind === "truck"
              ? state.toolTruckBalance
              : kind === "ring"
                ? state.ringPawnBalance
                : state.bankLoanBalance;
        recordMoneyChange(-pay, `${label} payment`);
        const cleared = remaining === 0;
        const ringClearedNote =
          kind === "ring" && cleared
            ? " Picked up the ring on the way home. She didn't say anything when you put it back on the dresser, but you saw her smile."
            : "";
        toast(
          `${label} paid down by $${fmt(pay)}.${cleared ? " Debt cleared." : ""}${ringClearedNote}`,
          "event-good",
        );
        saveGame();
        requestRender("full");
      }

      /* ═══════════════════════════════════════════
     WEEKLY EVENT LOGIC
  ═══════════════════════════════════════════ */
      function maybeRollEvent() {
        if (state.pendingScene || state.pendingEvent) return;
        if (Math.random() < 0.22) {
          const ev =
            CAR_CULTURE_EVENTS[
              Math.floor(Math.random() * CAR_CULTURE_EVENTS.length)
            ];
          queueScene({
            title: ev.title,
            emoji: ev.emoji,
            text: ev.text,
            choices: ev.choices,
          });
          return;
        }
        if (Math.random() > 0.32) return;
        const ev =
          WEEKLY_EVENTS[Math.floor(Math.random() * WEEKLY_EVENTS.length)];
        queueWeeklyEvent(ev);
      }

      function resolveEvent(payForFix) {
        const ev = state.pendingEvent;
        if (!ev) return;
        const car = currentCar();

        if (ev.type === "good") {
          if (ev.cashGain) {
            state.money += ev.cashGain;
          }
          if (ev.followersGain) {
            state.followers += ev.followersGain;
            clampFollowers();
          }
          if (ev.statBoost) {
            car[ev.statBoost.cat] = clamp(
              car[ev.statBoost.cat] + ev.statBoost.amt,
            );
          }
        } else {
          if (ev.choice) {
            if (payForFix) {
              if (state.money >= ev.cost) state.money -= ev.cost;
              else applyEventPenalty(ev, car); // can't afford the fix, so take the hit
            } else {
              applyEventPenalty(ev, car);
            }
          } else {
            applyEventPenalty(ev, car);
          }
        }

        state.pendingEvent = null;
        processEventQueue();
        drainWeekAdvanceQueue("queued");
        checkMilestones();
        checkGameOver();
        saveGame();
        requestRender("full");
      }

      function applyEventPenalty(ev, car) {
        if (ev.penalty) {
          car[ev.penalty.cat] = clamp(car[ev.penalty.cat] - ev.penalty.amt);
        }
        if (ev.also) {
          car[ev.also.cat] = clamp(car[ev.also.cat] - ev.also.amt);
        }
        if (ev.fuelLoss) {
          state.fuel = Math.max(0, state.fuel - ev.fuelLoss);
        }
        if (ev.paycheckSlip) {
          state.paycheckProgress = Math.max(
            0,
            state.paycheckProgress - ev.paycheckSlip,
          );
        }
      }

      /* ═══════════════════════════════════════════
     MILESTONES
  ═══════════════════════════════════════════ */
      function checkMilestones() {
        const m = state.milestones;
        const car = currentCar();
        const overall = car ? getOverall(car) : 0;
        const unlocked = [];

        if (!m.firstShow && state.history.length >= 1) {
          m.firstShow = true;
          unlocked.push("🏁 First Show entered!");
        }
        if (!m.hit50 && overall >= 50) {
          m.hit50 = true;
          unlocked.push("⭐ Reached 50 overall!");
          maybeAddBuckReaction("hit50");
        }
        if (
          !m.wonRegional &&
          state.history.some((h) => h.place === 1 && h.tier === "Regional")
        ) {
          m.wonRegional = true;
          unlocked.push("🥇 Won a Regional!");
        }
        if (!m.threeSponsors && activeSponsors().length >= 3) {
          m.threeSponsors = true;
          unlocked.push("🤝 Three sponsors active!");
          maybeAddBuckReaction("firstSponsor");
        }
        if (
          !m.homeGarage &&
          workshopIdx() >= WORKSPACE_LEVELS.findIndex((w) => w.id === "garage")
        ) {
          m.homeGarage = true;
          unlocked.push("🏠 Home Garage unlocked!");
          maybeAddBuckReaction("homeGarage");
        }
        if (
          !m.wonNational &&
          (state.won ||
            state.history.some(
              (h) => h.tier === "National" && h.place === 1,
            ))
        ) {
          m.wonNational = true;
          unlocked.push("🏆 Won the National Show!");
        }

        unlocked.forEach((msg) => toast(`Milestone: ${msg}`, "ok"));
      }

      /* ═══════════════════════════════════════════
     GAME OVER / BROKE CHECK
  ═══════════════════════════════════════════ */
      function checkGameOver() {
        if (state.gameOver) return;
        const weeksUntilPay = PAYCHECK_CYCLE - state.paycheckProgress;
        const cantAffordAnything = state.money < 40; // cheapest part
        const payTooFarOut = weeksUntilPay > 2;
        const noFuel = state.fuel < 4;
        if (cantAffordAnything && payTooFarOut && noFuel && state.week > 4) {
          state.gameOver = true;
        }
      }

      function restartGame() {
        Object.assign(state, makeDefaultState());
        localStorage.removeItem(SAVE_KEY);
        requestRender("full");
      }

      function continueSeason() {
        const car = currentCar();
        // Surface the winter storage damage as a click-through notice
        // before clearing it — the recap screen no longer shows it inline.
        if (
          Array.isArray(state.winterStorageReport) &&
          state.winterStorageReport.length
        ) {
          pushNotice(
            `Pulled the cover off after the off-season. ${state.winterStorageReport.join(" · ")}.`,
            "bad",
          );
        }
        state.seasonWrap = false;
        state.week = 1;
        state.view = "workshop";
        state.result = null;
        state.pendingAdvanceReason = null;
        state.postShowWeekLocked = false;
        state.enteredShowsThisWeek = [];
        state.winterStorageReport = [];
        state.seasonStats = {
          moneyStart: state.money,
          moneyEarned: 0,
          showsEntered: 0,
          bestPlace: null,
          bestTier: null,
          startOverall: car ? getOverall(car) : 0,
        };
        saveGame();
        requestRender("full");
      }

      /* ═══════════════════════════════════════════
     WEEK ADVANCE
  ═══════════════════════════════════════════ */
      function performWeekAdvance(reason = "time") {
        resolveCompletedRestorations(false);
        state.pendingAdvanceReason = null;
        const previousWeek = state.week;
        const missedSocialPost =
          state.creatorPostedWeek !== previousWeek &&
          state.collabDoneWeek !== previousWeek;
        state.week += 1;
        {
          // Wife approval drifts toward neutral; strong feelings fade.
          const wa = wifeApprovalVal();
          if (wa > 55) state.wifeApproval = Math.max(55, wa - 2);
          else if (wa < 55) state.wifeApproval = Math.min(55, wa + 1);
          if (wa >= 80 && Math.random() < 0.25) {
            state.money += 120;
            recordMoneyChange(120, "Grocery money in the toolbox");
            nudgeWife(0, `Found $120 in the toolbox with a note: "for the loud thing the truck needs." Keep her.`);
          } else if (wa <= 25 && Math.random() < 0.3) {
            const cost = Math.min(90, state.money);
            state.money -= cost;
            recordMoneyChange(-cost, "Flowers and a dinner to smooth things over");
            nudgeWife(4, `Flowers and a dinner ran you $${cost}. Cheaper than the alternative. (approval +4)`);
          }
        }
        state.weekRecap = state.tutorialComplete
          ? {
              week: state.week - 1,
              money: state.money - (typeof state.weekStartMoney === "number" ? state.weekStartMoney : state.money),
              followers: state.followers - (typeof state.weekStartFollowers === "number" ? state.weekStartFollowers : state.followers),
              wife: wifeApprovalVal() - (typeof state.weekStartWife === "number" ? state.weekStartWife : wifeApprovalVal()),
              installs: (state.installsDone || 0) - (typeof state.weekStartInstalls === "number" ? state.weekStartInstalls : state.installsDone || 0),
            }
          : null;
        state.totalWeeks = (state.totalWeeks || 0) + 1;
        state.weekStartFollowers = state.followers;
        state.weekStartWife = wifeApprovalVal();
        state.weekStartInstalls = state.installsDone || 0;
        state.weekStartMoney = state.money;
        state.enteredShowsThisWeek = [];
        state.polishesThisWeek = 0;
        state.rival.score = getRivalBaseScore();
        state.postShowWeekLocked = false;

        if (state.week > state.seasonLength) {
          applyWinterStorageDamage();
          state.seasonWrap = true;
          return;
        }

        // Tool truck tab — charged weekly, not per paycheck (snap-it truck shows up
        // every week regardless).
        if (state.toolTruckBalance > 0) {
          const truckPay = Math.min(
            state.toolTruckPayment || 90,
            state.toolTruckBalance,
          );
          state.toolTruckBalance -= truckPay;
          state.money -= truckPay;
          recordMoneyChange(-truckPay, "Tool truck weekly");
        }
        // Pawn ticket on the wedding ring — slow weekly bleed
        if (state.ringPawnBalance > 0) {
          const ringPay = Math.min(
            state.ringPawnPayment || 50,
            state.ringPawnBalance,
          );
          state.ringPawnBalance -= ringPay;
          state.money -= ringPay;
          recordMoneyChange(-ringPay, "Pawn shop weekly");
        }

        state.paycheckProgress += 1;
        if (state.paycheckProgress >= PAYCHECK_CYCLE) {
          state.paycheckProgress = 0;
          let paycheckNet = PAYCHECK_AMOUNT;
          let loanNotes = [];
          if (state.bankLoanBalance > 0) {
            const payment = Math.min(
              state.bankLoanPayment,
              state.bankLoanBalance,
            );
            state.bankLoanBalance -= payment;
            paycheckNet -= payment;
            loanNotes.push(`$${fmt(payment)} bank payment`);
          }
          if (state.sharkLoanBalance > 0) {
            const payment = Math.min(
              state.sharkLoanPayment,
              state.sharkLoanBalance,
            );
            state.sharkLoanBalance -= payment;
            paycheckNet -= payment;
            loanNotes.push(`$${fmt(payment)} shark payment`);
          }
          state.money += paycheckNet;
          recordMoneyChange(paycheckNet, "Weekly paycheck");
          const loanNote = loanNotes.length
            ? ` after ${loanNotes.join(" + ")}`
            : "";
          toast(
            `Week ${state.week}. Payday hit — $${fmt(paycheckNet)} cleared${loanNote}.`,
            "ok",
          );
        } else {
          toast(`Week ${state.week} — ${reason}.`, "ok");
        }

        maybeTriggerRivalBeat();
        maybeRollEvent();
        maybeTriggerGarageMoment();
        maybeGenerateMarketplaceOffer();
        regenerateScavengeStock();
        maybeTriggerFollowerPayout();
        maybeOfferBrandDeal();
        maybeOfferCollab();
        maybeOfferRingPawn();
        maybeTriggerBirthday();
        if (missedSocialPost) {
          toast(
            "You rolled into a new week without dropping any content. The algorithm forgot you for a minute.",
            "event-bad",
          );
        }
        checkMilestones();
        checkGameOver();
      }

      function drainWeekAdvanceQueue(reason = "time") {
        if (state.weekAdvanceInProgress || state.gameOver || state.seasonWrap)
          return;
        if (!state.weekAdvanceQueue) return;
        if (!canAdvanceWeekCheck(true)) {
          state.weekAdvanceQueue = 0;
          return;
        }
        state.weekAdvanceInProgress = true;
        try {
          while (
            state.weekAdvanceQueue > 0 &&
            !state.gameOver &&
            !state.seasonWrap
          ) {
            state.weekAdvanceQueue -= 1;
            performWeekAdvance(reason);
          }
        } finally {
          state.weekAdvanceInProgress = false;
        }
        processEventQueue();
        saveGame();
        requestRender("full");
      }

      function advanceWeek(reason = "time") {
        state.weekAdvanceQueue = (state.weekAdvanceQueue || 0) + 1;
        drainWeekAdvanceQueue(reason);
      }

      function buyTool(id) {
        const tool = TOOLS_LIST.find((t) => t.id === id);
        const check = canOwnTool(tool);
        if (!check.ok) return toast(check.msg, "err");
        state.money -= tool.cost;
        recordMoneyChange(-tool.cost, `Tool purchase: ${tool.name}`);
        state.ownedTools.push(tool.id);
        if (!state.firstToolPurchased) {
          state.firstToolPurchased = true;
          state.money += 40;
          recordMoneyChange(40, "First real tool purchase rebate");
          toast(
            "First real tool in the box. You sold enough random junk to get $40 back.",
            "event-good",
          );
        }
        checkMilestones();
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }

      function buyFuel(amount) {
        const room = MAX_FUEL - state.fuel;
        const actual = Math.min(amount, room);
        if (actual <= 0) return toast("Fuel tank is already full.", "err");
        const cost = actual * FUEL_PRICE;
        if (state.money < cost)
          return toast("Not enough cash for fuel.", "err");
        state.money -= cost;
        recordMoneyChange(-cost, `Fuel purchase (${actual} gal)`);
        state.fuel += actual;
        saveGame();
        requestRender(state.view === "shows" ? "full" : "chrome");
      }

      function upgradeWorkspace() {
        const next = nextWorkshop();
        if (!next) return toast("Already maxed out.", "err");
        if (state.money < next.cost) return toast("Not enough cash.", "err");
        state.money -= next.cost;
        recordMoneyChange(-next.cost, `Workspace upgrade: ${next.name}`);
        state.workshopLevel = next.id;
        checkMilestones();
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }


      function upgradeToolStorage() {
        const next = nextToolStorage();
        if (!next) return toast("Tool storage is already maxed out.", "err");
        if (state.money < next.cost) return toast("Not enough cash.", "err");
        state.money -= next.cost;
        state.toolStorageLevel = next.id;
        toast(
          `${next.name} rolled in. Restorations will finish faster now.`,
          "ok",
        );
        saveGame();
        requestRender(state.view === "workshop" ? "full" : "chrome");
      }

      function canOwnTool(tool) {
        const wd = toolStorageData();
        if (state.ownedTools.includes(tool.id))
          return { ok: false, msg: "Already own this." };
        if (state.money < tool.cost)
          return { ok: false, msg: "Not enough cash." };
        if (state.ownedTools.length >= wd.maxTools)
          return { ok: false, msg: `${wd.name} is out of tool space.` };
        if (
          getWorkspaceIndex(state.workshopLevel) <
          getWorkspaceIndex(tool.workshop)
        ) {
          const req = WORKSPACE_LEVELS.find(
            (w) => w.id === tool.workshop,
          )?.name;
          return { ok: false, msg: `Requires ${req}.` };
        }
        return { ok: true };
      }

      function getDiscount(part) {
        let d = 0;
        const sp = activeSponsors();
        if (sp.find((s) => s.id === 3) && part.category === "paint")
          d = Math.max(d, 0.2);
        if (sp.find((s) => s.id === 4) && part.category === "transmission")
          d = Math.max(d, 0.15);
        if (sp.find((s) => s.id === 5) && part.category === "brakes")
          d = Math.max(d, 0.15);
        if (sp.find((s) => s.id === 7)) d = Math.max(d, 0.15);
        return d;
      }

      function mechanicDiscount() {
        const t = (state.mechanic && state.mechanic.trust) || 0;
        if (t >= 8) return 0.15;
        if (t >= 5) return 0.1;
        if (t >= 3) return 0.05;
        return 0;
      }

      function partCost(p, method) {
        const base =
          method === "diy"
            ? p.diy
            : p.shop != null
              ? p.shop
              : Math.round(p.diy * p.mult);
        let cost = base * (1 - getDiscount(p));
        if (method === "shop") cost *= 1 - mechanicDiscount();
        return Math.round(cost);
      }

      function installPart(id, method, isFree = false) {
        startRestoration(id, method, isFree);
      }

      function claimFreePart() {
        if (!state.freePart)
          return toast("No sponsor part to claim.", "err");
        const car = currentCar();
        if (!car)
          return toast("Need a car in the garage to claim a free part.", "err");
        if (activeTasksByMethod(car.id, "diy").length) {
          return toast(
            "Finish your DIY work before sending the car to the shop.",
            "err",
          );
        }
        const eligible = PARTS.find(
          (p) =>
            p.tier === "Budget" &&
            car[p.category] < 100 &&
            !car.installedParts.includes(p.id) &&
            !findActiveTask(car.id, p.id),
        );
        if (!eligible) {
          return toast(
            "No Budget jobs left to claim on. Pick the part yourself once one frees up.",
            "err",
          );
        }
        installPart(eligible.id, "shop", true);
      }

     SOCIAL

      function calcCollabReward() {
        const base = 1500;
        const rate = 0.08;
        const cap = 12000;
        return Math.min(cap, Math.round(base + (state.followers || 0) * rate));
      }

      function calcCreatorReward(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return { cash: 0, followers: 0 };
        const car = currentCar();
        const overall = car ? getOverall(car) : 0;
        const qualityMult = 0.5 + overall / 100;
        const ms = activeSponsors().find((s) => s.socialBoost);
        const sponsorMult = ms ? 1 + ms.socialBoost : 1;
        // Snapgram is a visual platform — high paint = photogenic = more
        // engagement = more cash. 0.5x at no paint, 1.0x at 50, 1.5x at 100.
        const paintMult =
          type === "insta" && car
            ? 0.5 + (car.paint || 0) / 100
            : 1;
        const cashRaw = Math.max(cfg.cashMin, state.followers * cfg.cashRate);
        const cash = Math.min(cfg.cashCap, Math.round(cashRaw * qualityMult * sponsorMult * paintMult));
        const folRaw = cfg.followerFlat + state.followers * cfg.followerRate;
        const followers = Math.min(cfg.followerCap, Math.max(1, Math.round(folRaw * qualityMult * sponsorMult)));
        return { cash, followers };
      }

      function creatorPostBlockedReason(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return "Unknown post type.";
        if (state.creatorPostedWeek === state.week) return "Already dropped content this week.";
        if (cfg.moneyCost && state.money < cfg.moneyCost) return `Need $${cfg.moneyCost} for props.`;
        if (cfg.fuelCost && state.fuel < cfg.fuelCost) return `Need ${cfg.fuelCost} gal for b-roll.`;
        if (type === "youtube") {
          const car = currentCar();
          if (!car || !roadworthy(car)) return "Car must be roadworthy to film a MotorTube build.";
          if (state.youtubeCooldownUntil && state.week < state.youtubeCooldownUntil) {
            const wait = state.youtubeCooldownUntil - state.week;
            return `Production cycle — next MotorTube video in ${wait} week${wait === 1 ? "" : "s"}.`;
          }
        }
        return null;
      }

      function doCreatorPost(type) {
        const cfg = CREATOR_POSTS[type];
        if (!cfg) return;
        const blocked = creatorPostBlockedReason(type);
        if (blocked) return toast(blocked, "err");
        const { cash, followers } = calcCreatorReward(type);
        const variance = 0.85 + Math.random() * 0.4;
        const finalCash = Math.max(1, Math.round(cash * variance));
        const finalFollowers = Math.max(1, Math.round(followers * variance));
        if (cfg.moneyCost) state.money -= cfg.moneyCost;
        if (cfg.fuelCost) state.fuel -= cfg.fuelCost;
        state.money += finalCash;
        state.followers += finalFollowers;
        clampFollowers();
        state.totalCreatorEarnings = (state.totalCreatorEarnings || 0) + finalCash;
        state.creatorPostedWeek = state.week;
        if (type === "youtube") state.youtubeCooldownUntil = state.week + 2;
        // Capture the post for the phone's per-app feeds. Newest first
        // so the latest drop sits at the top of the Snapgram/CarTok/
        // MotorTube screens. Capped to keep the list scrollable.
        const carForPost = currentCar();
        if (!Array.isArray(state.postHistory)) state.postHistory = [];
        state.postHistory.unshift({
          id: `post_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
          type,
          week: state.week,
          cash: finalCash,
          followers: finalFollowers,
          carYear: carForPost ? carForPost.year : null,
          carMake: carForPost ? carForPost.make : null,
          carModel: carForPost ? carForPost.model : null,
          carEmoji: carForPost ? carForPost.emoji : "🚗",
          carPalette: carForPost ? carForPost.palette : "truck",
          carStyle: carForPost ? carForPost.style : "truck",
        });
        if (state.postHistory.length > 30) state.postHistory.length = 30;
        recordMoneyChange(finalCash - (cfg.moneyCost || 0), `${cfg.label} payout`);
        addGarageLore(type === "youtube" ? 3 : type === "reel" ? 2 : 1);
        toast(
          `${cfg.emoji} ${cfg.label} went live. +$${fmt(finalCash)} · +${fmtF(finalFollowers)} followers.`,
          "event-good",
        );
        checkMilestones();
        saveGame();
        requestRender("full");
      }

      function doCollab() {
        if (!state.collabAvailable) return;

      function getCategoryCompletion(car, cat) {
        if (!car) return null;
        const partsInCat = PARTS.filter((p) => p.category === cat);
        if (!partsInCat.length) return null;
        const installed = new Set(car.installedParts || []);
        const allDone = partsInCat.every((p) => installed.has(p.id));
        return { allDone, current: car[cat] || 0 };
      }

      function polishCategory(cat) {
        const car = currentCar();
        if (!car) return toast("No car in the garage to polish.", "err");
        const status = getCategoryCompletion(car, cat);
        if (!status || !status.allDone)
          return toast(
            "Need every part installed in that category before fine-tuning.",
            "err",
          );
        if (car[cat] >= 100) return toast("That category is maxed out.", "err");
        if ((state.polishesThisWeek || 0) >= POLISH_PER_WEEK)
          return toast(
            `Out of fine-tuning time this week (${POLISH_PER_WEEK} per week).`,
            "err",
          );
        if (state.money < POLISH_COST)
          return toast(`Need $${POLISH_COST} for the supplies.`, "err");
        state.money -= POLISH_COST;
        car[cat] = Math.min(100, car[cat] + POLISH_GAIN);
        state.polishesThisWeek = (state.polishesThisWeek || 0) + 1;
        recordMoneyChange(-POLISH_COST, `Fine tune: ${CAT_LABELS[cat]}`);
        playSfx("wrench");
        toast(
          `${POLISH_ACTIONS[cat]?.verb || "Polished"} on ${CAT_LABELS[cat]}. +${POLISH_GAIN} (${car[cat]}/100).`,
